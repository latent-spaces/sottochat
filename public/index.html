              onComplete: () => el.remove(),
            });
          } else {
            el.remove();
          }
        }
      }

      // FLIP snapshot: capture top of every persisting card BEFORE we mutate
      // the DOM, so we can animate them from their previous slot to the new
      // one when an insert/remove pushes them around. mirrors motion's `layout`
      // prop on AnimatedListItem (vendor/magicui/animated-list.tsx).
      const flipBefore = new Map();
      const canFlip = typeof gsap !== "undefined" && !reduceMotion();
      if (canFlip) {
        for (const [id, el] of cardEls) {
          flipBefore.set(id, el.getBoundingClientRect().top);
        }
      }

      // partition: user-driven cards on top, server-spawned sdk subprocesses
      // (observer + chat agents) below a divider. inside each group
      // the original lastEventTs sort is preserved.
      const realList = list.filter(s => !isInternalSession(s));
      const internalList = list.filter(s => isInternalSession(s));
      const orderedList = realList.concat(internalList);
      const internalCount = internalList.length;

      // upsert + reorder
      let anchor = null;        // last placed card; new cards insert after it
      let staggerIdx = 0;       // stagger this tick's new cards (e.g. on first hello)
      const SEPARATOR_ID = "__internal-separator__";
      let separatorEl = document.getElementById(SEPARATOR_ID);
      if (internalCount === 0 && separatorEl) {
        separatorEl.remove();
        separatorEl = null;
      }
      let separatorPlaced = false;
      for (let i = 0; i < orderedList.length; i++) {
        const sess = orderedList[i];
        const id = sess.info.sessionId;
        const opts = { showSource, selected: id === sel };
        let card = cardEls.get(id);
        let isNew = false;
        if (!card) {
          card = buildCard(sess, opts);
          cardEls.set(id, card);
          isNew = true;
        } else {
          updateCard(card, sess, opts);
        }

        // first internal card → drop in the separator just before it.
        if (!separatorPlaced && internalCount > 0 && i === realList.length) {
          if (!separatorEl) {
            separatorEl = document.createElement("div");
            separatorEl.id = SEPARATOR_ID;
            separatorEl.className = "inbox-separator";
            separatorEl.innerHTML =
              '<span class="inbox-separator-label">internal · sdk subprocesses</span>';
          }
          const sepTarget = anchor ? anchor.nextSibling : cardsEl.firstChild;
          if (separatorEl !== sepTarget) cardsEl.insertBefore(separatorEl, sepTarget);
          anchor = separatorEl;
          separatorPlaced = true;
        }

        // place this card right after the previous one (or at the start)
        const target = anchor ? anchor.nextSibling : cardsEl.firstChild;
        if (card !== target) cardsEl.insertBefore(card, target);
        anchor = card;

        if (isNew && typeof gsap !== "undefined" && !reduceMotion()) {
          // spring-y enter, magicui AnimatedList flavour: scale up from 0.55,
          // small y-drop, opacity 0 → 1, with back.out for the soft overshoot.
          // transformOrigin pinned to top so the card grows down into its slot
          // (mirrors motion's `originY: 0` in vendor/magicui/animated-list.tsx)
          // instead of expanding from its center.
          gsap.from(card, {
            opacity: 0,
            y: -22,
            scale: 0.55,
            filter: "blur(6px)",
            transformOrigin: "50% 0%",
            duration: 1.4,
            ease: "back.out(1.3)",
            delay: staggerIdx * 0.07,
            clearProps: "transform,opacity,filter",
          });
          staggerIdx++;
        }
      }

      // FLIP playback: any card that was already in the DOM and has shifted
      // gets animated from its old top to the new one. new cards are skipped
      // (they have no `before` entry — their enter animation handles them).
      //
      // bug we hit: refresh runs every 5s, list reorders frequently. the old
      // version used gsap.from with overwrite: "auto" but no clearProps. when a
      // new FLIP fired mid-flight, the previous tween's residual translate3d()
      // stuck on the inline style — cards drifted out of layout, leaving gaps
      // and ghost overlaps. fix:
      //   1. killTweensOf on the y/transform channel before starting a new tween
      //      (overwrite:"auto" alone doesn't always catch transform tweens).
      //   2. clearProps:"transform" on completion so the inline style resets.
      if (canFlip && flipBefore.size) {
        for (const [id, el] of cardEls) {
          const before = flipBefore.get(id);
          if (before == null) continue;
          const after = el.getBoundingClientRect().top;
          const delta = before - after;
          if (Math.abs(delta) > 0.5) {
            gsap.killTweensOf(el, "y,transform");
            gsap.fromTo(
              el,
              { y: delta },
              {
                y: 0,
                duration: 0.55,
                ease: "power3.out",
                clearProps: "transform",
              }
            );
          }
        }
      }
    }

    // last-viewed tracking
    function lastViewedKey(sessionId) { return "viewed:" + sessionId; }
    function markViewed(sessionId) {
      try { localStorage.setItem(lastViewedKey(sessionId), String(Date.now())); } catch {}
    }
    function getLastViewed(sessionId) {
      try {
        const v = localStorage.getItem(lastViewedKey(sessionId));
        return v ? Number(v) : 0;
      } catch { return 0; }
    }

    let lastDetailSessionId = null;     // remembers what's currently open so we
                                        // only blur-fade when the open session changes
    function renderDetail() {
      const sessionId = selectedSessionId();
      if (!sessionId) {
        const wasOpen = lastDetailSessionId !== null;
        detailEmpty.hidden = false;
        detailContent.hidden = true;
        if (wasOpen) blurFadeIn(detailEmpty, { duration: 0.9 });
        lastDetailSessionId = null;
        return;
      }
      const sess = findSessionBySessionId(sessionId);
      if (!sess) {
        detailEmpty.hidden = false;
        detailContent.hidden = true;
        lastDetailSessionId = null;
        return;
      }
      const opening = sessionId !== lastDetailSessionId;
      lastDetailSessionId = sessionId;
      detailEmpty.hidden = true;
      detailContent.hidden = false;
      detailContent.style.cssText = sessionColorVars(sessionId);
      const events = sess.events || [];
      dName.textContent = sessionName(sess);
      const sourceEl = document.getElementById("d-source");
      if (sourceEl) sourceEl.textContent = sess?.info?.source || "claude-code";
      dElapsed.textContent = fmtElapsed(sess);
      const turns = deriveTurns(events);

      const latestFlag = latestOpenInsight(sess.observerDecisions);

      dChart.innerHTML = turns.length >= 2 ? renderChartHtml(turns, CHART_TURNS) : "";
      dCodeChart.innerHTML = renderCodeChartHtml(turns, CHART_TURNS);

      const hasComplexity = !!dChart.innerHTML;
      const hasCode = !!dCodeChart.innerHTML;
      const hasCharts = hasComplexity || hasCode;
      // hide whichever slot is empty so the surviving chart can claim full width
      // via the .single-chart grid override.
      dChart.hidden = !hasComplexity;
      dCodeChart.hidden = !hasCode;
      dChartsBand.classList.toggle("single-chart", hasCharts && !(hasComplexity && hasCode));
      dChartsToggle.hidden = !hasCharts;
      if (!hasCharts) chartsBandExpanded.delete(sessionId);
      // first-look intro: when the band first has anything to show for a fresh
      // session, open it so the user notices it, then auto-collapse after a
      // beat. skipped if the user has already opened the band manually — that
      // also marks them as introduced. flag persists in localStorage so
      // reloads stay calm.
      let firingIntro = false;
      if (hasCharts && !chartsIntroducedHas(sessionId)) {
        if (!chartsBandExpanded.has(sessionId)) {
          chartsBandExpanded.add(sessionId);
          firingIntro = true;
        }
        chartsIntroducedSet(sessionId);
      }
      applyChartsBandExpanded(sessionId);
      if (firingIntro) {
        // animate the entrance in the next frame so the band has been unhidden
        // by applyChartsBandExpanded above; schedule the auto-collapse after
        // the user has had a beat to see the charts.
        requestAnimationFrame(() => animateExpandChartsBand(sessionId, opening));
        setTimeout(() => {
          if (selectedSessionId() !== sessionId) return;
          if (!chartsBandExpanded.has(sessionId)) return; // user closed it manually
          chartsBandExpanded.delete(sessionId);
          animateCollapseChartsBand(sessionId);
        }, 2200);
      }

      const lastViewed = getLastViewed(sessionId);
      const untouchedMs = lastViewed ? (Date.now() - lastViewed) : 0;
      if (lastViewed && untouchedMs >= 5 * 60 * 1000) {
        dUntouched.hidden = false;
        dUntouchedMins.textContent = fmtAge(untouchedMs);
      } else {
        dUntouched.hidden = true;
      }

      renderVideoPane(sess);
      renderConversation(sess, turns);
      renderChatThread(sess);
      // hide the chat-input while we're waiting for the upstream agent to reply —
      // the conversation panel above already shows the typing indicator.
      const lastTurn = turns.length ? turns[turns.length - 1] : null;
      const waitingForAgent = !!(lastTurn && lastTurn.userText && !lastTurn.agentText);
      dChatInput.hidden = waitingForAgent;
      if (!waitingForAgent) renderChatInput(sess, latestFlag);

      // the cake perch is re-mounted every refresh tick (chart/chat-input
      // innerHTML wipes wreck DOM nodes inside them every 5s). animate only on
      // session-open — silent re-mount on refresh keeps the cake visually
      // pinned without replaying the entrance.
      placeCakePerch(sessionId, { animate: opening });

      // when the open session changes (or first opens), blur-fade the detail
      // pane in with a two-tier cascade — the region step is the spine, the
      // leaf step gives every component its own beat. magicui BlurFade flavour,
      // ported. crucial: pre-hide leaves synchronously inside this same frame
      // so detailContent unhiding doesn't flash a fully-visible state for one
      // tick before the stagger starts.
      if (opening && typeof gsap !== "undefined" && !reduceMotionOn()) {
        const REGION_STEP = 0.12;
        const LEAF_STEP = 0.04;
        const plan = [
          { sel: ".session-head",  pick: r => r.querySelectorAll("#d-name, .source") },
          { sel: ".charts-band",   pick: r => r.querySelectorAll("#d-chart, #d-code-chart") },
          { sel: ".video-pane",    pick: r => r.children },
          { sel: ".conversation",  pick: r => r.children },
          { sel: ".chat-thread",   pick: r => r.children },
          { sel: ".chat-input",    pick: r => r.children },
        ];
        let regionIdx = 0;
        for (const { sel, pick } of plan) {
          const region = detailContent.querySelector(sel);
          if (!region || region.hidden) continue;
          const leaves = Array.from(pick(region));
          if (!leaves.length) continue;
          const base = REGION_STEP * regionIdx;
          gsap.set(leaves, { opacity: 0, filter: "blur(6px)", y: -6 });
          leaves.forEach((el, i) => {
            gsap.to(el, {
              opacity: 1,
              filter: "blur(0px)",
              y: 0,
              duration: 0.75,
              delay: base + LEAF_STEP * i,
              ease: "power2.out",
              clearProps: "filter,y,opacity",
            });
          });
          regionIdx++;
        }
      }
    }

    const DEFAULT_PREFILL = "walk me through, one piece at a time. pause for my take after each turn";
    const chatDrafts = new Map();
    // chat thread state — sessionKey → array of {role, text, ts}.
    // populated by ws "chat:chunk" messages (the server echoes user sends and streams assistant replies).
    const chatThreadByKey = new Map();
    // scripts state — sessionKey → Map<turnId, ScriptPayload>. populated by
    // hello/session:upsert snapshots and the script:beats / script:ready /
    // script:error ws msgs.
    const scriptsByKey = new Map();
    // per-session: which script is currently visible in the video-pane (turnId).
    // default = latest by ts. user-driven changes (older-script picker) go here.
    const activeScriptByKey = new Map();
    // karaoke runtime — keyed by sessionKey. holds the audio element ref, the
    // rAF id, beat boundaries, last-painted indices, etc. so we don't double-mount
    // audio elements on re-render.
    const videoRuntime = new Map();
    // mp4 exports state — sessionKey → Map<turnId, ExportPayload>. populated by
    // hello/session:upsert snapshots and the export:rendering / export:ready /
    // export:error ws msgs. each ExportPayload looks like:
    //   { turnId, status: "rendering"|"ready"|"error", hash?, mp4Url?, durationS?,
    //     bytes?, errorMessage?, ts, startedTs }
    const exportsByKey = new Map();
    // per-session beat bookmarks — sessionKey → Map<turnId, sorted asc number[]>.
    // populated by hello/session:upsert snapshots and bookmark:setting ws msgs.
    // server is the source of truth; clicks POST /debug/bookmark and the
    // resulting broadcast lands here.
    const bookmarksByKey = new Map();
    function bookmarksForKey(sessionKey, turnId) {
      const m = bookmarksByKey.get(sessionKey);
      if (!m) return [];
      const arr = m.get(turnId);
      return Array.isArray(arr) ? arr : [];
    }
    function setBookmarksForKey(sessionKey, turnId, list) {
      let m = bookmarksByKey.get(sessionKey);
      if (!m) { m = new Map(); bookmarksByKey.set(sessionKey, m); }
      const sorted = Array.from(new Set(list)).sort((a, b) => a - b);
      m.set(turnId, sorted);
    }
    // setTimeout chain id (per sessionKey) used to tick the rendering-elapsed
    // label. NOT rAF — 1Hz is plenty and we don't want to compete with the
    // karaoke loop or run while the tab is hidden.
    const exportElapsedTimers = new Map();
    function clearExportElapsedTimer(sessionKey) {
      const t = exportElapsedTimers.get(sessionKey);
      if (t) {
        clearTimeout(t);
        exportElapsedTimers.delete(sessionKey);
      }
    }
    function scheduleExportElapsedTick(sessionKey) {
      clearExportElapsedTimer(sessionKey);
      const tick = () => {
        const m = exportsByKey.get(sessionKey);
        if (!m) return;
        // pick the latest rendering payload (only one expected at a time).
        let target = null;
        for (const ep of m.values()) {
          if (ep.status === "rendering") {
            if (!target || (ep.ts || 0) > (target.ts || 0)) target = ep;
          }
        }
        if (!target) {
          clearExportElapsedTimer(sessionKey);
          return;
        }
        const btn = dVideoPane.querySelector(
          '.video-export[data-export-turn="' + cssAttr(target.turnId) + '"]'
        );
        if (btn) {
          const elapsedS = Math.max(0, Math.floor((Date.now() - (target.startedTs || target.ts || 0)) / 1000));
          const lbl = btn.querySelector(".ve-label");
          if (lbl) lbl.textContent = "rendering " + vbFmtTime(elapsedS);
        }
        const id = setTimeout(tick, 1000);
        exportElapsedTimers.set(sessionKey, id);
      };
      // first tick immediately (so the user doesn't sit on "rendering 0:00" for
      // a full second), subsequent every 1000ms.
      const id = setTimeout(tick, 1000);
      exportElapsedTimers.set(sessionKey, id);
    }
    // attribute-safe quote escaper for the data-export-turn lookup. turnIds are
    // model-emitted ULIDs in practice but be defensive in case of demo-/x ids.
    function cssAttr(s) {
      return String(s).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }
    // marker-style preference — "pill" (default, current behaviour, inline chip
    // before the beat), "banner" (slide-in overlay across the stage on entry),
    // "corner" (small glyph in head + tinted active-word highlight), "stamp"
    // (rubber-stamp svg landing inline on entry), "ticker" (pill scrolling
    // across the stage bottom), or "halo" (pulsing accent box-shadow on the
    // active beat for the beat's full duration). seeded from URL query
    // (?marker=…) on load, persisted in localStorage under
    // VIDEO_MARKER_STYLE_KEY. applyMarkerStyle() persists + re-renders.
    const VIDEO_MARKER_STYLE_KEY = "cutCakeMarkerStyle";
    const VIDEO_MARKER_STYLES = ["pill", "banner", "corner", "stamp", "ticker", "halo"];
    let markerStyle = (function () {
      try {
        const fromUrl = new URLSearchParams(window.location.search).get("marker");
        if (fromUrl && VIDEO_MARKER_STYLES.includes(fromUrl)) {
          localStorage.setItem(VIDEO_MARKER_STYLE_KEY, fromUrl);
          return fromUrl;
        }
        const stored = localStorage.getItem(VIDEO_MARKER_STYLE_KEY);
        if (stored && VIDEO_MARKER_STYLES.includes(stored)) return stored;
      } catch {}
      return "pill";
    })();
    function applyMarkerStyle(style) {
      if (!VIDEO_MARKER_STYLES.includes(style) || style === markerStyle) return;
      markerStyle = style;
      try { localStorage.setItem(VIDEO_MARKER_STYLE_KEY, style); } catch {}
      // when leaving banner/corner/stamp/ticker/halo, reset trackers so the
      // next render mounts a fresh treatment for the active beat.
      for (const [, rt] of videoRuntime.entries()) {
        if (rt) {
          rt.lastBannerBeatIdx = -1;
          rt.lastCornerBeatIdx = -1;
          rt.lastStampBeatIdx = -1;
          rt.lastTickerBeatIdx = -1;
          rt.lastHaloBeatIdx = -1;
        }
      }
      refresh();
    }

    // scriptifier prompt-preset preference. controls which system prompt the
    // server sends to the scriptifier subprocess for the NEXT closed turn.
    // affects future scripts only — existing beats/audio aren't re-rendered.
    // authoritative value is the server's `activeScriptStyle`; the client
    // seeds optimistically from localStorage and overwrites on the hello
    // payload + scriptstyle:setting ws msgs (mirrors the autosend pattern).
    const VIDEO_SCRIPT_STYLE_KEY = "cutCakeScriptStyle";
    const VIDEO_SCRIPT_STYLES = ["default", "cinematic", "tldr", "deep-dive", "comedic", "noir", "kids"];
    let scriptStyle = (function () {
      try {
        const stored = localStorage.getItem(VIDEO_SCRIPT_STYLE_KEY);
        if (stored && VIDEO_SCRIPT_STYLES.includes(stored)) return stored;
      } catch {}
      return "default";
    })();
    function setScriptStyleLocal(style) {
      if (!VIDEO_SCRIPT_STYLES.includes(style)) return false;
      if (style === scriptStyle) return true;
      scriptStyle = style;
      try { localStorage.setItem(VIDEO_SCRIPT_STYLE_KEY, style); } catch {}
      return true;
    }
    async function applyScriptStyle(style) {
      const prev = scriptStyle;
      if (!setScriptStyleLocal(style)) return;
      // optimistic repaint of the picker; ws msg will reconfirm.
      refresh();
      try {
        const res = await fetch("/debug/script-style", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ style }),
        });
        if (!res.ok) {
          console.warn("[script-style] post failed", res.status);
          setScriptStyleLocal(prev);
          refresh();
        }
      } catch (err) {
        console.warn("[script-style] post error", err);
        setScriptStyleLocal(prev);
        refresh();
      }
    }

    // marker-vocabulary preference. parallel to scriptStyle but orthogonal:
    // controls which set of marker tokens the scriptifier prompt asks for and
    // — until the server-side dispatch is wired — which token names the client
    // displays for inbound markers. "design" = INSIGHT/BE_CAREFUL/STEP/NOTE
    // (current behaviour, current default). "story" = PUNCHLINE/GOTCHA/PIVOT
    // /ASIDE (story-arc names). authoritative value will live on the server
    // (snapshot.markerVocab + markervocab:setting ws msgs); for now the client
    // seeds optimistically from localStorage and absorbs hello/ws updates if
    // they arrive. POST to /debug/marker-vocab is fire-and-forget — failures
    // are tolerated so the UI swap still happens locally.
    const VIDEO_MARKER_VOCAB_KEY = "cutCakeMarkerVocab";
    const VIDEO_MARKER_VOCABS = ["design", "story"];
    // per-vocab display labels for the in-flight marker tokens. when vocab
    // is "design" we render the model's emitted token verbatim. when vocab
    // is "story" we translate any design-vocab tokens that arrive (e.g. from
    // a server still on the old dispatch) to their story-vocab equivalent.
    const MARKER_DISPLAY = {
      design: { INSIGHT: "INSIGHT", BE_CAREFUL: "BE_CAREFUL", STEP: "STEP", NOTE: "NOTE",
                PUNCHLINE: "PUNCHLINE", GOTCHA: "GOTCHA", PIVOT: "PIVOT", ASIDE: "ASIDE" },
      story:  { INSIGHT: "PUNCHLINE", BE_CAREFUL: "GOTCHA", STEP: "PIVOT", NOTE: "ASIDE",
                PUNCHLINE: "PUNCHLINE", GOTCHA: "GOTCHA", PIVOT: "PIVOT", ASIDE: "ASIDE" },
    };
    let markerVocab = (function () {
      try {
        const stored = localStorage.getItem(VIDEO_MARKER_VOCAB_KEY);
        if (stored && VIDEO_MARKER_VOCABS.includes(stored)) return stored;
      } catch {}
      return "design";
    })();
    function setMarkerVocabLocal(vocab) {
      if (!VIDEO_MARKER_VOCABS.includes(vocab)) return false;
      if (vocab === markerVocab) return true;
      markerVocab = vocab;
      try { localStorage.setItem(VIDEO_MARKER_VOCAB_KEY, vocab); } catch {}
      return true;
    }
    // map an inbound marker token to its display label under the active vocab.
    // the server may emit either set's tokens (the parser accepts both); the
    // active vocab is just a UI preference for which name to surface.
    function markerLabelFor(token) {
      if (!token) return token;
      const map = MARKER_DISPLAY[markerVocab] || MARKER_DISPLAY.design;
      return map[token] || token;
    }
    async function applyMarkerVocab(vocab) {
      const prev = markerVocab;
      if (!setMarkerVocabLocal(vocab)) return;
      // optimistic repaint of the picker + chips/banners; ws msg will reconfirm
      // once the server-side dispatch is wired.
      refresh();
      try {
        const res = await fetch("/debug/marker-vocab", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ vocab }),
        });
        if (!res.ok) {
          // server may not yet wire the endpoint — treat as a soft failure.
          // the local UI swap still applies; the next turn will use whichever
          // vocab the server happens to be running.
          if (res.status !== 404) {
            console.warn("[marker-vocab] post failed", res.status);
            setMarkerVocabLocal(prev);
            refresh();
          }
        }
      } catch (err) {
        console.warn("[marker-vocab] post error", err);
      }
    }

    // per-session TTS voice preference. authoritative value lives on the server
    // (snapshot.voice + voice:setting ws msgs). the local Map mirrors what we
    // know so the picker paints without a round-trip. unknown sessionKeys fall
    // back to DEFAULT_VOICE. the picker swap POSTs to /debug/voice; the next
    // turn's tts uses the new voice. existing scripts keep their old wav.
    const DEFAULT_VOICE = "af_heart";
    const AVAILABLE_VOICES = [
      { id: "af_heart",   label: "warm",  accent: "en-US ♀" }, // friendly default
      { id: "am_michael", label: "calm",  accent: "en-US ♂" }, // thoughtful narrator
      { id: "bf_emma",    label: "crisp", accent: "en-GB ♀" }, // gravitas
    ];
    const VOICE_IDS = AVAILABLE_VOICES.map(v => v.id);
    const voiceBySessionKey = new Map();
    // sessionKeys whose voice menu is currently open. cleared on outside-click /
    // selection / refresh. one-at-a-time would also work but a Set is cheap.
    const openVoiceMenus = new Set();
    function voiceForSession(sessionKey) {
      const v = voiceBySessionKey.get(sessionKey);
      return v && VOICE_IDS.includes(v) ? v : DEFAULT_VOICE;
    }
    function voiceMeta(id) {
      return AVAILABLE_VOICES.find(v => v.id === id) || AVAILABLE_VOICES[0];
    }
    async function applyVoice(sessionKey, nextVoice) {
      if (!sessionKey || !VOICE_IDS.includes(nextVoice)) return;
      const prev = voiceForSession(sessionKey);
      if (prev === nextVoice) {
        openVoiceMenus.delete(sessionKey);
        refresh();
        return;
      }
      voiceBySessionKey.set(sessionKey, nextVoice);
      openVoiceMenus.delete(sessionKey);
      refresh();
      try {
        const res = await fetch("/debug/voice", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ sessionKey, voice: nextVoice }),
        });
        if (!res.ok) {
          console.warn("[voice] post failed", res.status);
          voiceBySessionKey.set(sessionKey, prev);
          refresh();
        }
      } catch (err) {
        console.warn("[voice] post error", err);
        voiceBySessionKey.set(sessionKey, prev);
        refresh();
      }
    }
    function toggleVoiceMenu(sessionKey) {
      if (openVoiceMenus.has(sessionKey)) {
        openVoiceMenus.delete(sessionKey);
      } else {
        openVoiceMenus.clear();
        openVoiceMenus.add(sessionKey);
      }
      refresh();
    }
    // outside-click closes any open voice menu. listen on the document so a
    // click anywhere off the menu (including elsewhere in the video-pane) shuts it.
    document.addEventListener("click", (e) => {
      if (openVoiceMenus.size === 0) return;
      const t = e.target;
      if (t && t.closest && t.closest(".video-voice-picker")) return;
      openVoiceMenus.clear();
      refresh();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && openVoiceMenus.size > 0) {
        openVoiceMenus.clear();
        refresh();
      }
    });

    // shared cue-audio context for the corner-style entry beep. instantiated
    // lazily on first need so we don't trip the autoplay policy on page load.
    let _markerCueCtx = null;
    function getMarkerCueCtx() {
      if (_markerCueCtx) return _markerCueCtx;
      try {
        const Ctor = window.AudioContext || window.webkitAudioContext;
        if (!Ctor) return null;
        _markerCueCtx = new Ctor();
      } catch { _markerCueCtx = null; }
      return _markerCueCtx;
    }
    function playMarkerCue() {
      if (reduceMotionOn()) return;
      const ctx = getMarkerCueCtx();
      if (!ctx) return;
      try {
        // resume() is a no-op if already running; required after autoplay block.
        if (ctx.state === "suspended") { ctx.resume().catch(() => {}); }
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = 200;
        // 8% peak volume, ~120ms blip with a short attack + release so it
        // doesn't click. envelope is 8ms attack, 100ms decay-to-zero.
        const now = ctx.currentTime;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.08, now + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.13);
      } catch {}
    }
    // svg glyphs for the corner-style indicator. each pair (design vocab +
    // story vocab) shares a glyph since they name the same semantic beat:
    // INSIGHT/PUNCHLINE = lightbulb, BE_CAREFUL/GOTCHA = warning triangle,
    // STEP/PIVOT = numbered chevron, NOTE/ASIDE = small dot.
    const MARKER_CORNER_GLYPHS = {
      INSIGHT: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.7.6 1 1.5 1 2.3v1h6v-1c0-.8.3-1.7 1-2.3A7 7 0 0 0 12 2z"/></svg>',
      BE_CAREFUL: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.7 3h16.96a2 2 0 0 0 1.7-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      STEP: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 6 15 12 9 18"/></svg>',
      NOTE: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="3"/></svg>',
    };
    MARKER_CORNER_GLYPHS.PUNCHLINE = MARKER_CORNER_GLYPHS.INSIGHT;
    MARKER_CORNER_GLYPHS.GOTCHA    = MARKER_CORNER_GLYPHS.BE_CAREFUL;
    MARKER_CORNER_GLYPHS.PIVOT     = MARKER_CORNER_GLYPHS.STEP;
    MARKER_CORNER_GLYPHS.ASIDE     = MARKER_CORNER_GLYPHS.NOTE;
    // marker → solid colour (for the banner background and the corner tint)
    // so JS reads from a single source of truth instead of duplicating CSS.
    // both vocabularies map to the same colors — a story-vocab PUNCHLINE
    // beat reads in the same yellow as a design-vocab INSIGHT beat.
    const MARKER_COLORS = {
      INSIGHT:    { bg: "#fde68a", fg: "#78350f" },
      BE_CAREFUL: { bg: "#fed7aa", fg: "#7c2d12" },
      STEP:       { bg: "#dbeafe", fg: "#1e3a8a" },
      NOTE:       { bg: null,      fg: null      }, // dashed paper, no tint
      PUNCHLINE:  { bg: "#fde68a", fg: "#78350f" },
      GOTCHA:     { bg: "#fed7aa", fg: "#7c2d12" },
      PIVOT:      { bg: "#dbeafe", fg: "#1e3a8a" },
      ASIDE:      { bg: null,      fg: null      },
    };
    // sessionKeys whose chat-thread the user has explicitly expanded. default
    // is collapsed: only the last RECENT_VISIBLE chunks render, with a "show
    // N earlier" toggle. send (manual or quick-pill) resets to collapsed so a
    // fresh send always lands a clean view of "your last + the response".
    const RECENT_VISIBLE_CHUNKS = 2;
    const expandedThreads = new Set();
    const chatStatusByKey = new Map();
    let convoLastSession = null;
    let convoLastTurnCount = 0;
    // remember which conv-bodies the user has expanded so 5s refresh doesn't snap them shut.
    // keyed (sessionId, role, turnId).
    const expandedBodies = new Set();

    function renderAgentBody(text) {
      // markdown for agent text — feels like inside a claude session.
      // marked is loaded via cdn; if it didn't load, fall back to plain pre-wrap.
      if (typeof marked !== "undefined") {
        const html = marked.parse(String(text || ""), { breaks: true, gfm: true });
        return '<div class="conv-md">' + html + '</div>';
      }
      return '<div class="conv-text">' + escapeHtml(text) + '</div>';
    }

    function renderConversation(sess, turns) {
      const sessionId = sess.info?.sessionId || "";
      const lastTurn = turns.length ? turns[turns.length - 1] : null;
      const hasUser = !!(lastTurn && lastTurn.userText);
      const hasAgent = !!(lastTurn && lastTurn.agentText);
      // waiting = user spoke this turn, agent hasn't replied yet. drives the
      // typing indicator + chat-input hide below.
      const waitingForAgent = hasUser && !hasAgent;

      const headTitle = waitingForAgent ? "waiting for agent…" : "latest exchange";
      const ageMs = lastTurn ? Date.now() - (lastTurn.endTs || lastTurn.startTs || 0) : 0;
      const ageLabel = !lastTurn ? "" : (ageMs < 5000 ? "just now" : fmtAge(ageMs) + " ago");

      const headHtml =
        '<div class="conv-head">' +
          '<span class="conv-head-icon">' + ICON_AGENT + '</span>' +
          '<span class="conv-head-title">' + escapeHtml(headTitle) + '</span>' +
          (ageLabel ? '<span class="conv-head-time">' + escapeHtml(ageLabel) + '</span>' : '') +
        '</div>';

      if (!lastTurn) {
        dConversation.innerHTML = headHtml + '<p class="conv-empty">no turns yet</p>';
        convoLastSession = sessionId;
        convoLastTurnCount = 0;
        return;
      }

      const parts = [headHtml, '<div class="conv-stream">'];
      if (hasAgent) {
        // closed turn — show only the agent reply (with blur/truncation tail).
        // the user's message belongs to the past; the surface here is the
        // agent's latest output, ready to be reacted to.
        const expandKey = sessionId + "::" + lastTurn.id + "::L";
        const expanded = expandedBodies.has(expandKey);
        const bodyCls = "conv-body" + (expanded ? " is-expanded" : "");
        parts.push(
          '<div class="conv-msg from-agent">' +
            '<span class="conv-msg-meta">agent</span>' +
            '<div class="conv-bubble">' +
              '<div class="' + bodyCls + '" data-expand-key="' + escapeHtml(expandKey) + '" data-conv-idx="0">' +
                renderAgentBody(lastTurn.agentText) +
              '</div>' +
              '<button class="conv-toggle hidden" data-conv-idx="0">show full</button>' +
            '</div>' +
          '</div>'
        );
      } else if (waitingForAgent) {
        // user just sent something — show their message on the right and a
        // typing indicator standing in for the not-yet-arrived agent reply.
        parts.push(
          '<div class="conv-msg from-you">' +
            '<span class="conv-msg-meta">you</span>' +
            '<div class="conv-bubble">' + escapeHtml(lastTurn.userText) + '</div>' +
          '</div>' +
          '<div class="conv-msg from-agent">' +
            '<span class="conv-msg-meta">agent</span>' +
            '<div class="conv-bubble">' +
              '<span class="typing-dots" aria-label="agent is typing"><span></span><span></span><span></span></span>' +
            '</div>' +
          '</div>'
        );
      }
      parts.push('</div>');

      dConversation.innerHTML = parts.join("");

      // measure each conv-body — if the rendered content overflows the cap,
      // mark it as truncated (turns on the fade) and reveal the toggle.
      // if the user previously expanded this body, keep it expanded and skip the toggle.
      dConversation.querySelectorAll('.conv-body').forEach((body) => {
        const idx = body.dataset.convIdx;
        const toggle = dConversation.querySelector('.conv-toggle[data-conv-idx="' + idx + '"]');
        const expandKey = body.dataset.expandKey;
        const alreadyExpanded = body.classList.contains('is-expanded');
        if (alreadyExpanded) {
          if (toggle) {
            toggle.classList.remove('hidden');
            toggle.textContent = 'show less';
            toggle.addEventListener('click', () => {
              body.classList.remove('is-expanded');
              body.classList.add('is-truncated');
              expandedBodies.delete(expandKey);
              toggle.textContent = 'show full';
            });
          }
          return;
        }
        const overflow = body.scrollHeight > body.clientHeight + 4;
        if (overflow) {
          body.classList.add('is-truncated');
          if (toggle) {
            toggle.classList.remove('hidden');
            toggle.textContent = 'show full';
            toggle.addEventListener('click', () => {
              body.classList.add('is-expanded');
              body.classList.remove('is-truncated');
              expandedBodies.add(expandKey);
              toggle.textContent = 'show less';
            });
          }
        }
      });

      convoLastSession = sessionId;
      convoLastTurnCount = turns.length;
    }

    /* ambient sprinkle layer — small dots/dashes drifting via gsap yoyo.
       respects prefers-reduced-motion. spawned once on first paint. */
    function spawnSprinkles() {
      const layer = document.querySelector("[data-sprinkles]");
      if (!layer) return;
      const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const COLORS = [
        "#ec4899", "#f9a8d4", "#a855f7", "#fbbf24", "#fde68a",
      ];
      const count = window.innerWidth < 720 ? 14 : 30;
      for (let i = 0; i < count; i++) {
        const s = document.createElement("span");
        s.className = Math.random() < 0.3 ? "sprinkle round" : "sprinkle";
        s.style.background = COLORS[i % COLORS.length];
        s.style.left = (Math.random() * 100) + "%";
        s.style.top = (Math.random() * 200) + "%";
        s.style.transform = "rotate(" + (Math.random() * 360) + "deg)";
        s.style.opacity = (0.5 + Math.random() * 0.35).toFixed(2);
        layer.appendChild(s);
        if (!reduce && typeof gsap !== "undefined") {
          gsap.to(s, {
            y: "+=" + (20 + Math.random() * 30),
            x: "+=" + (-10 + Math.random() * 20),
            rotation: "+=" + (30 + Math.random() * 60),
            duration: 4 + Math.random() * 4,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
            delay: Math.random() * 3,
          });
        }
      }
    }
    spawnSprinkles();

    // hover-burst: when the cursor enters a frosted bar, fling a handful of
    // sprinkles out of its frosting cap. delegated via mouseover (mouseenter
    // doesn't bubble), throttled per bar via dataset timestamp so re-entries
    // don't stack. only bars that actually carry a .bar-frost cap participate
    // (short bars below BAR_FROST_MIN_PCT are skipped automatically).
    const BURST_COLORS = ["#ec4899", "#f9a8d4", "#a855f7", "#fbbf24", "#5dd0c2", "#7c8cf0"];
    function burstSprinkles(bar) {
      if (typeof gsap === "undefined" || reduceMotionOn()) return;
      // radial burst: each sprinkle picks a random angle on the full circle
      // and radiates outward, no fan/fountain. produces a round pop instead of
      // an upward spray. one-stage tween — no second-stage fall.
      // colour palette is dominated by the bar's own color (read from computed
      // style — same source as the frosting `currentColor`), then sprinkled with
      // accent contrast picks from BURST_COLORS for variety.
      const barColor = getComputedStyle(bar).color || "#ec4899";
      const count = 9;
      for (let i = 0; i < count; i++) {
        const s = document.createElement("span");
        s.className = Math.random() < 0.4 ? "sprinkle-burst round" : "sprinkle-burst";
        // ~60% bar-color, ~40% accent palette mix-in
        s.style.background = Math.random() < 0.6
          ? barColor
          : BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
        // start from the rim — center of the bar's top edge.
        s.style.left = "50%";
        s.style.top = "-6px"; // matches the frosting cap rim
        s.style.opacity = "0";
        s.style.transform = "translate(-50%, 0) rotate(" + (Math.random() * 360) + "deg)";
        bar.appendChild(s);
        // angle distributed roughly uniformly on the full circle (small jitter
        // around the index slice so the ring doesn't look perfectly geometric).
        const slice = (Math.PI * 2) / count;
        const angle = slice * i + (Math.random() - 0.5) * slice * 0.7;
        const dist = 30 + Math.random() * 22;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;
        const rot = (Math.random() < 0.5 ? -1 : 1) * (180 + Math.random() * 220);
        const dur = 0.6 + Math.random() * 0.25;
        gsap.timeline({
          onComplete: () => s.remove(),
        })
          .to(s, { opacity: 1, duration: 0.08, ease: "power1.out" }, 0)
          .to(
            s,
            {
              x: dx,
              y: dy,
              rotation: "+=" + rot,
              duration: dur,
              ease: "power2.out",
            },
            0
          )
          .to(s, { opacity: 0, duration: 0.25, ease: "power1.in" }, "-=0.3");
      }
    }
    document.addEventListener("mouseover", (ev) => {
      const target = ev.target;
      if (!(target instanceof Element)) return;
      const bar = target.closest(".cx-bar");
      if (!bar) return;
      if (!bar.querySelector(".bar-frost")) return; // only frosted bars
      const last = parseInt(bar.dataset.burstTs || "0", 10);
      if (Date.now() - last < 800) return; // cooldown so re-entries don't stack
      bar.dataset.burstTs = String(Date.now());
      burstSprinkles(bar);
    });

    // brand mark hover: jump up + 360° roll + drop (port of cutcake's brandJumpRoll).
    // trigger on the brand area (logo + wordmark) so hovering either fires it.
    function brandJumpRoll() {
      if (typeof gsap === "undefined" || reduceMotionOn()) return;
      const mark = document.querySelector(".top-nav .nav-logo");
      const trigger = document.querySelector(".top-nav .nav-left");
      if (!mark || !trigger) return;
      let playing = false;
      trigger.addEventListener("mouseenter", () => {
        if (playing) return;
        playing = true;
        gsap.timeline({
          onComplete: () => {
            gsap.set(mark, { rotation: 0 });
            playing = false;
          },
        })
          .to(mark, { y: -16, duration: 0.28, ease: "expo.out" })
          .to(mark, { rotation: 360, duration: 0.55, ease: "power2.inOut" }, "<0.05")
          .to(mark, { y: 0, duration: 0.45, ease: "expo.out" }, "-=0.25");
      });
    }
    brandJumpRoll();

    // sidebar card mascot hover: jump + front-flip + bouncy landing. distinct
    // from the top-nav brand-jump-roll: rotates around X (front flip / coin
    // spin) instead of around Z (planar spin), pops a slight scale pulse, and
    // lands with back.out(2.4) for extra boing. delegated via mouseover so
    // newly-rendered cards (every 5s) get the listener for free.
    document.addEventListener("mouseover", (ev) => {
      if (typeof gsap === "undefined" || reduceMotionOn()) return;
      const t = ev.target;
      if (!(t instanceof Element)) return;
      const card = t.closest("#cards .card");
      if (!card) return;
      const mascot = card.querySelector(".card-mascot");
      if (!mascot) return; // only selected cards mount a mascot
      if (mascot.dataset.flipping === "1") return; // cooldown until current flip ends
      mascot.dataset.flipping = "1";
      gsap.timeline({
        onComplete: () => {
          gsap.set(mascot, { rotationY: 0, scale: 1, y: 0, opacity: 1 });
          mascot.dataset.flipping = "0";
        },
      })
        // jump + scale.
        .to(mascot, { y: -9, scale: 1.07, duration: 0.3, ease: "power2.out" })
        // opacity eases IN to 45% on its own track — gradual, not snapped.
        .to(mascot, { opacity: 0.45, duration: 0.4, ease: "power2.inOut" }, "<")
        // y-axis flip while opacity holds at 0.45.
        .to(mascot, { rotationY: 360, duration: 0.6, ease: "power2.inOut" }, "<0.05")
        // landing: drop + settle.
        .to(mascot, { y: 0, scale: 1, duration: 0.5, ease: "back.out(1.2)" }, "-=0.18")
        // opacity eases OUT back to 100% over the landing — also gradual.
        .to(mascot, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, "<");
    });

    // wandering cake-perch hover: pool of 15 mild reactions, picked at random
    // each time so it doesn't feel scripted. all animate the inner <img> (the
    // outer span owns positional transforms set in CSS — animating it would
    // clobber the `translate(-50%) rotate(tilt)` chain). cleanup `gsap.set`
    // resets every prop any pool member touches so leftover state never leaks
    // between picks. delegated so the perch keeps the listener after every 5s
    // re-mount inside the detail pane.
    const PERCH_REACTIONS = [
      // 1. walk left → flip → walk right → flip back → small step home.
      function walkFlip(img) {
        return gsap.timeline()
          .to(img, { x: -10, duration: 0.45, ease: "sine.inOut" })
          .to(img, { y: -2, duration: 0.12, ease: "sine.inOut", yoyo: true, repeat: 3 }, "<")
          .to(img, { rotationY: 180, duration: 0.3, ease: "power2.inOut" })
          .to(img, { x: 10, duration: 0.6, ease: "sine.inOut" })
          .to(img, { y: -2, duration: 0.12, ease: "sine.inOut", yoyo: true, repeat: 4 }, "<")
          .to(img, { rotationY: 360, duration: 0.3, ease: "power2.inOut" })
          .to(img, { x: 0, duration: 0.32, ease: "sine.inOut" });
      },
      // 2. soft head-tilt nod — small z-axis sway.
      function nod(img) {
        return gsap.timeline()
          .to(img, { rotation: 8, duration: 0.22, ease: "sine.inOut" })
          .to(img, { rotation: -6, duration: 0.3, ease: "sine.inOut" })
          .to(img, { rotation: 4, duration: 0.25, ease: "sine.inOut" })
          .to(img, { rotation: 0, duration: 0.2, ease: "sine.inOut" });
      },
      // 3. tiny double-hop — two short bounces with a settle.
      function hop(img) {
        return gsap.timeline()
          .to(img, { y: -7, duration: 0.18, ease: "power2.out" })
          .to(img, { y: 0, duration: 0.22, ease: "back.out(2)" })
          .to(img, { y: -4, duration: 0.14, ease: "power2.out" }, "+=0.05")
          .to(img, { y: 0, duration: 0.2, ease: "back.out(2)" });
      },
      // 4. gentle breathe — scale up, then back down.
      function breathe(img) {
        return gsap.timeline()
          .to(img, { scale: 1.12, duration: 0.32, ease: "sine.inOut" })
          .to(img, { scale: 1, duration: 0.5, ease: "sine.out" });
      },
      // 5. peek — sidestep right, look back (flip), and slide home.
      function peek(img) {
        return gsap.timeline()
          .to(img, { x: 8, duration: 0.3, ease: "sine.inOut" })
          .to(img, { rotationY: 180, duration: 0.28, ease: "power2.inOut" })
          .to(img, { y: -2, duration: 0.18, ease: "sine.inOut", yoyo: true, repeat: 1 })
          .to(img, { rotationY: 360, duration: 0.28, ease: "power2.inOut" })
          .to(img, { x: 0, duration: 0.3, ease: "sine.inOut" });
      },
      // 6. wiggle — quick tail-wag rotation, decaying amplitude.
      function wiggle(img) {
        return gsap.timeline()
          .to(img, { rotation: -6, duration: 0.1, ease: "sine.inOut" })
          .to(img, { rotation: 6, duration: 0.12, ease: "sine.inOut" })
          .to(img, { rotation: -4, duration: 0.12, ease: "sine.inOut" })
          .to(img, { rotation: 3, duration: 0.12, ease: "sine.inOut" })
          .to(img, { rotation: 0, duration: 0.16, ease: "sine.out" });
      },
      // 7. spin — slow gentle full z-axis rotation, no translate.
      function spin(img) {
        return gsap.timeline()
          .to(img, { rotation: 360, duration: 0.9, ease: "power2.inOut" });
      },
      // 8. squish — squash-and-stretch on the x/y scale axes.
      function squish(img) {
        return gsap.timeline()
          .to(img, { scaleX: 1.18, scaleY: 0.85, duration: 0.18, ease: "power2.out" })
          .to(img, { scaleX: 0.9, scaleY: 1.12, duration: 0.22, ease: "power2.inOut" })
          .to(img, { scaleX: 1, scaleY: 1, duration: 0.3, ease: "back.out(1.6)" });
      },
      // 9. lean — tilt and hold briefly, settle with overshoot.
      function lean(img) {
        return gsap.timeline()
          .to(img, { rotation: -15, duration: 0.32, ease: "power2.out" })
          .to(img, { rotation: 0, duration: 0.55, ease: "back.out(1.4)" }, "+=0.1");
      },
      // 10. shy — fade to half, scale down, then back up.
      function shy(img) {
        return gsap.timeline()
          .to(img, { opacity: 0.55, scale: 0.85, duration: 0.3, ease: "sine.inOut" })
          .to(img, { opacity: 1, scale: 1, duration: 0.5, ease: "sine.out" }, "+=0.1");
      },
      // 11. bobble — small circular path through four cardinal nudges.
      function bobble(img) {
        return gsap.timeline()
          .to(img, { x: -4, y: -3, duration: 0.16, ease: "sine.inOut" })
          .to(img, { x: 0,  y: -6, duration: 0.16, ease: "sine.inOut" })
          .to(img, { x: 4,  y: -3, duration: 0.16, ease: "sine.inOut" })
          .to(img, { x: 0,  y: 0,  duration: 0.18, ease: "sine.inOut" });
      },
      // 12. doubleFlip — two quick y-axis flips in place. on-complete reset
      //     handles the visual snap from 720° back to 0°.
      function doubleFlip(img) {
        return gsap.timeline()
          .to(img, { rotationY: 360, duration: 0.42, ease: "power2.inOut" })
          .to(img, { rotationY: 720, duration: 0.42, ease: "power2.inOut" });
      },
      // 13. shimmy — fast small horizontal jitter, decaying.
      function shimmy(img) {
        return gsap.timeline()
          .to(img, { x: -3, duration: 0.08, ease: "sine.inOut" })
          .to(img, { x: 3,  duration: 0.1,  ease: "sine.inOut" })
          .to(img, { x: -2, duration: 0.1,  ease: "sine.inOut" })
          .to(img, { x: 2,  duration: 0.1,  ease: "sine.inOut" })
          .to(img, { x: 0,  duration: 0.14, ease: "sine.out" });
      },
      // 14. stretch — pull tall briefly, then settle.
      function stretch(img) {
        return gsap.timeline()
          .to(img, { scaleY: 1.2,  scaleX: 0.95, duration: 0.32, ease: "sine.out" })
          .to(img, { scaleY: 1,    scaleX: 1,    duration: 0.45, ease: "back.out(1.4)" });
      },
      // 15. bow — tilt forward + slight scale-down (a small curtsy), straighten.
      function bow(img) {
        return gsap.timeline()
          .to(img, { rotation: 14, scale: 0.92, duration: 0.3, ease: "sine.out" })
          .to(img, { rotation: 0,  scale: 1,    duration: 0.45, ease: "back.out(1.6)" }, "+=0.1");
      },
    ];

    // over-the-top specials. picked with ~5% probability instead of the regular
    // pool — purely for delight, never gating any UX. side effects (sparkles,
    // confetti, ring) are fixed-position spans appended to body so they can
    // cover the whole viewport without being clipped by perch ancestors. each
    // returns a timeline tied to the mascot itself so the standard onComplete
    // cleanup still fires once the mascot animation settles.
    const SPARKLE_COLORS = [
      "#ec4899", "#f9a8d4", "#a855f7", "#fbbf24",
      "#5dd0c2", "#7c8cf0", "#fb923c", "#34d399",
    ];
    function spawnFlyer(originX, originY, opts) {
      const s = document.createElement("span");
      s.className = "sprinkle-burst" + (opts.round ? " round" : "");
      s.style.position = "fixed";
      s.style.left = originX + "px";
      s.style.top = originY + "px";
      s.style.background = opts.color;
      s.style.opacity = "0";
      s.style.zIndex = "1000";
      s.style.pointerEvents = "none";
      document.body.appendChild(s);
      gsap.set(s, { xPercent: -50, yPercent: -50, rotation: Math.random() * 360 });
      gsap.timeline({ onComplete: () => s.remove() })
        .to(s, { opacity: 1, duration: 0.1 }, 0)
        .to(s, {
          x: opts.dx, y: opts.dy,
          rotation: "+=" + opts.rot,
          duration: opts.dur,
          ease: opts.ease || "power2.out",
        }, 0)
        .to(s, { opacity: 0, duration: 0.35, ease: "power1.in" }, opts.dur - 0.35);
    }
    const PERCH_SPECIALS = [
      // A. fullscreen sparkle explosion radiating from the perch.
      function sparkleExplosion(img, perch) {
        const r = perch.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const count = 36;
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.4;
          const dist = 220 + Math.random() * 380;
          spawnFlyer(cx, cy, {
            round: Math.random() < 0.4,
            color: SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)],
            dx: Math.cos(angle) * dist,
            dy: Math.sin(angle) * dist,
            rot: (Math.random() < 0.5 ? -1 : 1) * (360 + Math.random() * 540),
            dur: 0.85 + Math.random() * 0.5,
          });
        }
        return gsap.timeline()
          .to(img, { y: -22, scale: 1.45, duration: 0.32, ease: "back.out(2)" })
          .to(img, { rotation: 720, duration: 0.7, ease: "power2.inOut" }, "<")
          .to(img, { y: 0, scale: 1, duration: 0.5, ease: "back.out(1.6)" }, "-=0.2");
      },
      // B. confetti rain — pieces fall from the top of the viewport, mascot
      //    does a celebratory hop with a small head-shake.
      function confettiRain(img, perch) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const count = 42;
        for (let i = 0; i < count; i++) {
          const startX = Math.random() * w;
          spawnFlyer(startX, -20, {
            round: Math.random() < 0.5,
            color: SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)],
            dx: (Math.random() - 0.5) * 220,
            dy: h + 60,
            rot: (Math.random() < 0.5 ? -1 : 1) * (360 + Math.random() * 720),
            dur: 1.4 + Math.random() * 0.9,
            ease: "power1.in",
          });
        }
        return gsap.timeline()
          .to(img, { y: -16, scale: 1.2, duration: 0.28, ease: "power2.out" })
          .to(img, { rotation: -10, duration: 0.16, ease: "sine.inOut", yoyo: true, repeat: 3 }, "<")
          .to(img, { y: 0, scale: 1, rotation: 0, duration: 0.5, ease: "back.out(1.6)" });
      },
      // C. disco spin — three full z-rotations, scale pop, hue-rotate filter
      //    sweeps through the rainbow then unwinds. proxy-tween drives the
      //    filter since gsap doesn't natively interpolate hue-rotate strings.
      function discoSpin(img) {
        const proxy = { hue: 0 };
        const tl = gsap.timeline({
          onComplete: () => { img.style.filter = ""; },
        });
        tl.to(img, { scale: 1.3, y: -10, duration: 0.22, ease: "power2.out" })
          .to(img, { rotation: 1080, duration: 1.0, ease: "power2.inOut" }, "<")
          .to(proxy, {
            hue: 720, duration: 1.0,
            onUpdate: () => {
              img.style.filter = "hue-rotate(" + proxy.hue + "deg) saturate(1.4)";
            },
          }, "<")
          .to(img, { scale: 1, y: 0, duration: 0.4, ease: "back.out(1.6)" });
        return tl;
      },
      // D. comic burst — POW-style scale spike, brief shake, plus an expanding
      //    accent ring that emanates from the perch's screen position.
      function comicBurst(img, perch) {
        const r = perch.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const ring = document.createElement("span");
        ring.style.position = "fixed";
        ring.style.left = cx + "px";
        ring.style.top = cy + "px";
        ring.style.width = "30px";
        ring.style.height = "30px";
        ring.style.border = "3px solid var(--accent, #ec4899)";
        ring.style.borderRadius = "50%";
        ring.style.pointerEvents = "none";
        ring.style.zIndex = "999";
        document.body.appendChild(ring);
        gsap.set(ring, { xPercent: -50, yPercent: -50, scale: 1, opacity: 0.9 });
        gsap.to(ring, {
          scale: 9, opacity: 0,
          duration: 0.6, ease: "power2.out",
          onComplete: () => ring.remove(),
        });
        return gsap.timeline()
          .to(img, { scale: 2.2, duration: 0.18, ease: "back.out(2.5)" })
          .to(img, { rotation: -8, duration: 0.05 })
          .to(img, { rotation: 8,  duration: 0.05 })
          .to(img, { rotation: -5, duration: 0.05 })
          .to(img, { rotation: 3,  duration: 0.05 })
          .to(img, { rotation: 0, scale: 1, duration: 0.42, ease: "back.out(1.8)" });
      },
    ];

    function resetPerchImg(img) {
      gsap.set(img, {
        rotationY: 0, rotation: 0,
        x: 0, y: 0,
        scale: 1, scaleX: 1, scaleY: 1,
        opacity: 1,
      });
    }

    document.addEventListener("mouseover", (ev) => {
      if (typeof gsap === "undefined" || reduceMotionOn()) return;
      const t = ev.target;
      if (!(t instanceof Element)) return;
      const perch = t.closest("#cake-perch");
      if (!perch) return;
      const img = perch.querySelector("img");
      if (!img) return;
      if (perch.dataset.spinning === "1") return;

      // 1/20 lottery: over-the-top reaction. plays in place; doesn't count
      // against the wander threshold (specials are the reward, not the bait).
      if (Math.random() < 1 / 20) {
        perch.dataset.spinning = "1";
        const special = PERCH_SPECIALS[Math.floor(Math.random() * PERCH_SPECIALS.length)];
        const tl = special(img, perch);
        tl.eventCallback("onComplete", () => {
          resetPerchImg(img);
          perch.dataset.spinning = "0";
        });
        return;
      }

      // pestering bait: 2-5 hovers (rerolled each trigger) inside a 10s window
      // and the mascot relocates to a fresh anchor instead of reacting in place.
      if (recordPerchHover()) {
        const sid = selectedSessionId();
        if (sid) {
          wanderPerch(sid);
          return;
        }
      }

      // regular reaction pool.
      perch.dataset.spinning = "1";
      const pick = PERCH_REACTIONS[Math.floor(Math.random() * PERCH_REACTIONS.length)];
      const tl = pick(img);
      tl.eventCallback("onComplete", () => {
        resetPerchImg(img);
        perch.dataset.spinning = "0";
      });
    });

    function renderChatInput(sess, latestFlag) {
      const sessionKey = sess.key || (sess.info ? sess.info.source + ":" + sess.info.path : "");
      // prefill is a one-shot suggestion for the FIRST send only. once the
      // chat-thread has any activity, the textarea stays clean — the user is
      // mid-conversation and shouldn't see the same starter text on every tick.
      const threadStarted = (chatThreadByKey.get(sessionKey) || []).length > 0;
      const prefill = (latestFlag && latestFlag.prefill) || DEFAULT_PREFILL;
      const fallback = threadStarted ? "" : prefill;
      const initial = chatDrafts.has(sessionKey) ? chatDrafts.get(sessionKey) : fallback;

      // quick-reply pills appear once the conversation is live so the user can
      // nudge it forward without typing the same one-liners ("next" /
      // "explain more") every time.
      const quickHtml = threadStarted
        ? '<div class="chat-quickreplies">' +
            '<button type="button" class="quick-pill" data-quick="next">next</button>' +
            '<button type="button" class="quick-pill" data-quick="explain more">explain more</button>' +
          '</div>'
        : '';

      dChatInput.innerHTML =
        quickHtml +
        '<div class="chat-input-row">' +
          '<textarea rows="2" placeholder="message…">' + escapeHtml(initial) + '</textarea>' +
          '<button class="send-btn" title="send" aria-label="send">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
              '<line x1="12" y1="19" x2="12" y2="5"/>' +
              '<polyline points="5 12 12 5 19 12"/>' +
            '</svg>' +
          '</button>' +
        '</div>';

      const ta = dChatInput.querySelector('textarea');
      const btn = dChatInput.querySelector('.send-btn');
      const pills = Array.from(dChatInput.querySelectorAll('.quick-pill'));

      // shared send path. caller passes the text directly; for the textarea
      // path, we read .value here. caller can also pass a control to disable
      // while the request is in flight (avoids double-click).
      async function sendChatText(text, ctrl) {
        const trimmed = (text || "").trim();
        if (!trimmed) return;
        if (ctrl) ctrl.disabled = true;
        pills.forEach(p => { p.disabled = true; });
        try {
          const res = await fetch('/chat/send', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ sessionKey, text: trimmed }),
          });
          if (!res.ok) {
            const body = await res.text();
            console.warn('[chat] send failed', res.status, body);
            if (ctrl) ctrl.disabled = false;
            pills.forEach(p => { p.disabled = false; });
            return;
          }
          // server broadcasts chat:chunk back — clear the textarea draft so the
          // next ask starts clean. also re-collapse any previously expanded
          // history for this session so the new user/agent pair is the only
          // visible exchange.
          chatDrafts.delete(sessionKey);
          expandedThreads.delete(sessionKey);
          if (ta) ta.value = '';
        } catch (err) {
          console.warn('[chat] send error', err);
          if (ctrl) ctrl.disabled = false;
          pills.forEach(p => { p.disabled = false; });
        }
      }

      if (ta) {
        ta.addEventListener('input', e => {
          chatDrafts.set(sessionKey, e.target.value);
        });
        ta.addEventListener('keydown', e => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            btn?.click();
          }
        });
      }
      if (btn) {
        btn.addEventListener('click', () => sendChatText(ta?.value || '', btn));
      }
      pills.forEach(p => {
        p.addEventListener('click', () => sendChatText(p.dataset.quick || '', p));
      });
    }

    function renderChatThread(sess) {
      const sessionKey = sess.key || (sess.info ? sess.info.source + ":" + sess.info.path : "");
      const thread = chatThreadByKey.get(sessionKey) || [];
      const status = chatStatusByKey.get(sessionKey);
      if (!thread.length && (!status || status.status === "idle" || status.status === "spawned")) {
        dChatThread.innerHTML = "";
        return;
      }
      const renderRow = (c) => {
        const role = c.role === "user" ? "you" : "agent";
        const cls = c.role === "user" ? "chat-row you" : "chat-row agent";
        const autoBadge = c.role === "user" && c.kind === "auto"
          ? '<span class="chat-auto-tag" title="auto-sent by observer flag">auto</span>'
          : '';
        const body = c.role === "assistant" && typeof marked !== "undefined"
          ? '<div class="chat-body conv-md">' + marked.parse(c.text || "", { breaks: true, gfm: true }) + '</div>'
          : '<div class="chat-body">' + escapeHtml(c.text || "") + '</div>';
        return '<div class="' + cls + '">' +
                 '<div class="chat-role">' + role + autoBadge + '</div>' +
                 body +
               '</div>';
      };

      // collapse older history. when expanded, the full thread renders; when
      // collapsed (default), only the last RECENT_VISIBLE_CHUNKS render. send
      // resets to collapsed so a fresh send always re-anchors on the latest
      // exchange.
      const expanded = expandedThreads.has(sessionKey);
      const visible = thread.length > RECENT_VISIBLE_CHUNKS && !expanded
        ? thread.slice(-RECENT_VISIBLE_CHUNKS)
        : thread;

      let toggleHtml = "";
      if (thread.length > RECENT_VISIBLE_CHUNKS) {
        const hidden = thread.length - RECENT_VISIBLE_CHUNKS;
        const label = expanded
          ? "hide earlier"
          : "show " + hidden + " earlier message" + (hidden === 1 ? "" : "s");
        toggleHtml =
          '<button class="chat-history-toggle" type="button">' +
            escapeHtml(label) +
          '</button>';
      }
      const visibleHtml = visible.map(renderRow).join("");

      let statusHtml = "";
      if (status && status.status === "thinking") {
        // typing bubble — same paper-tint as agent rows, dots animate (and
        // freeze under prefers-reduced-motion via the .typing-dots rule).
        statusHtml =
          '<div class="chat-status thinking">' +
            '<span class="typing-dots" aria-label="agent is typing"><span></span><span></span><span></span></span>' +
          '</div>';
      } else if (status && status.status === "respawning") {
        statusHtml = '<div class="chat-status respawn">reconnecting…</div>';
      } else if (status && status.status === "error") {
        statusHtml = '<div class="chat-status error">error: ' + escapeHtml(status.message || "agent stopped") + '</div>';
      }
      dChatThread.innerHTML = toggleHtml + visibleHtml + statusHtml;

      const toggleBtn = dChatThread.querySelector('.chat-history-toggle');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          if (expandedThreads.has(sessionKey)) expandedThreads.delete(sessionKey);
          else expandedThreads.add(sessionKey);
          renderChatThread(sess);
        });
      }
    }

    // ---------- video-pane (karaoke) ----------
    // utility: split a beat's text into word tokens. uses /\s+/ — matches the
    // way we count "words per beat" for the boundary mapping. punctuation stays
    // attached to its neighboring word (good enough for highlight purposes).
    function vbTokenize(text) {
      return String(text || "").trim().split(/\s+/).filter(Boolean);
    }
    function vbFmtTime(s) {
      if (!isFinite(s) || s < 0) s = 0;
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ":" + (sec < 10 ? "0" : "") + sec;
    }
    // pause every other session's audio so only the current session's runtime
    // can play. preserves the runtime entries (so user toggling back resumes).
    function pauseOtherVideoRuntimes(currentKey) {
      for (const [k, rt] of videoRuntime.entries()) {
        if (k === currentKey) continue;
        if (rt && rt.audio && !rt.audio.paused) {
          try { rt.audio.pause(); } catch {}
        }
        if (rt && rt.rafId) {
          cancelAnimationFrame(rt.rafId);
          rt.rafId = 0;
        }
      }
    }

    // build the voice picker html. shared by the full-pane render (with a
    // script in flight) and the empty-pane render (no script yet, just the
    // voice picker so the user can pre-set their preference). animation hookup
    // is handled by the caller after this gets injected into the DOM.
    function buildVoicePickerHtml(sessionKey) {
      const escAttr = s => String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const currentVoiceId = voiceForSession(sessionKey);
      const currentVoice = voiceMeta(currentVoiceId);
      const voiceMenuOpen = openVoiceMenus.has(sessionKey);
      const voiceMenuHtml = voiceMenuOpen
        ? '<div class="video-voice-menu" role="menu">' +
            AVAILABLE_VOICES.map(v => (
              '<button type="button" class="video-voice-option" role="menuitemradio" ' +
                'data-voice-id="' + escAttr(v.id) + '" ' +
                'aria-pressed="' + (v.id === currentVoiceId ? 'true' : 'false') + '">' +
                '<span class="vvp-label">' + escapeHtml(v.label) + '</span>' +
                '<span class="vvp-accent">' + escapeHtml(v.accent) + '</span>' +
              '</button>'
            )).join('') +
          '</div>'
        : '';
      return '<div class="video-voice-picker">' +
          '<button type="button" class="video-voice-current" ' +
              'aria-haspopup="menu" aria-expanded="' + (voiceMenuOpen ? 'true' : 'false') + '" ' +
              'data-voice-toggle="' + escAttr(sessionKey) + '">' +
            '<span>' + escapeHtml(currentVoice.label) + '</span>' +
            '<svg class="vvp-chev" viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">' +
              '<polyline points="1.5 3 4 5.5 6.5 3"/>' +
            '</svg>' +
          '</button>' +
          voiceMenuHtml +
        '</div>';
    }
    function wireVoicePicker(sessionKey) {
      const voiceToggleBtn = dVideoPane.querySelector(".video-voice-current[data-voice-toggle]");
      if (voiceToggleBtn) {
        voiceToggleBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const k = voiceToggleBtn.getAttribute("data-voice-toggle");
          if (k) toggleVoiceMenu(k);
        });
      }
      const voiceOptionBtns = dVideoPane.querySelectorAll(".video-voice-option[data-voice-id]");
      voiceOptionBtns.forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const next = btn.getAttribute("data-voice-id");
          if (next) applyVoice(sessionKey, next);
        });
      });
      if (openVoiceMenus.has(sessionKey)) {
        const menuEl = dVideoPane.querySelector(".video-voice-menu");
        if (menuEl && typeof gsap !== "undefined" && !reduceMotionOn()) {
          gsap.fromTo(menuEl,
            { opacity: 0, y: -4 },
            { opacity: 1, y: 0, duration: 0.14, ease: "power2.out", clearProps: "y,opacity" }
          );
        }
      }
    }

    // empty-pane render: no script yet, just show the voice picker so the user
    // can pre-set their preference. tears down any stale runtime to be safe.
    function renderVideoPaneEmpty(sessionKey) {
      const existing = videoRuntime.get(sessionKey);
      if (existing) {
        if (existing.rafId) cancelAnimationFrame(existing.rafId);
        if (existing.audio) { try { existing.audio.pause(); } catch {} }
        videoRuntime.delete(sessionKey);
      }
      dVideoPane.hidden = false;
      dVideoPane.innerHTML =
        '<div class="video-pane-head">' +
          '<span class="video-label">video</span>' +
          '<span class="video-status-pill"><span class="vsp-dot"></span><span>waiting for first turn…</span></span>' +
          buildVoicePickerHtml(sessionKey) +
        '</div>';
      try { dVideoPane.style.removeProperty("--marker-tint"); } catch {}
      wireVoicePicker(sessionKey);
    }

    function renderVideoPane(sess) {
      const sessionKey = sess.key || (sess.info ? sess.info.source + ":" + sess.info.path : "");
      pauseOtherVideoRuntimes(sessionKey);
      const m = scriptsByKey.get(sessionKey);
      if (!m || m.size === 0) {
        // no scripts yet — render a minimal head row with the voice picker
        // only, so the user can pre-set the per-session voice before the
        // first turn lands. status pill says "waiting for first turn".
        renderVideoPaneEmpty(sessionKey);
        return;
      }
      // pick the active script — user override (older-script picker is hour 3)
      // falls back to latest by closedTs (turn close-time, stable). older
      // payloads without closedTs fall back to ts so we don't drop them.
      let script = null;
      const overrideTurnId = activeScriptByKey.get(sessionKey);
      if (overrideTurnId && m.has(overrideTurnId)) {
        script = m.get(overrideTurnId);
      } else {
        const ord = (s) => (typeof s.closedTs === "number" ? s.closedTs : (s.ts || 0));
        for (const s of m.values()) {
          if (!script || ord(s) > ord(script)) script = s;
        }
      }
      if (!script || !Array.isArray(script.beats) || script.beats.length === 0) {
        renderVideoPaneEmpty(sessionKey);
        return;
      }

      dVideoPane.hidden = false;

      // status pill copy.
      let statusHtml = "";
      if (script.status === "drafting") {
        statusHtml = '<span class="video-status-pill rendering"><span class="vsp-dot"></span><span>drafting beats…</span></span>';
      } else if (script.status === "rendering") {
        statusHtml = '<span class="video-status-pill rendering"><span class="vsp-dot"></span><span>rendering audio…</span></span>';
      } else if (script.status === "ready") {
        statusHtml = '<span class="video-status-pill ready"><span class="vsp-dot"></span><span>ready</span></span>';
      } else if (script.status === "error") {
        statusHtml = '<span class="video-status-pill error"><span class="vsp-dot"></span><span>audio failed</span></span>';
      }

      const durStr = (typeof script.durationS === "number" && script.durationS > 0)
        ? vbFmtTime(script.durationS)
        : "—:—";

      // build word index → beat index mapping. tokenize each beat to count its
      // word slots; the mapping uses our token count (resilient to transcribe
      // tokenization differences). if script.words.length !== sum, log warn but
      // still render — fall back to even time-distribution if needed.
      const beats = script.beats;
      const beatTokens = beats.map(b => vbTokenize(b.text));
      const beatBoundaries = [];
      let cursor = 0;
      for (let i = 0; i < beats.length; i++) {
        const len = beatTokens[i].length;
        beatBoundaries.push({ startWordIdx: cursor, endWordIdx: cursor + len, beatIdx: i });
        cursor += len;
      }
      const totalTokenCount = cursor;
      const words = Array.isArray(script.words) ? script.words : [];
      if (words.length && words.length !== totalTokenCount) {
        console.warn("[video] word/beat token count mismatch", { wordCount: words.length, beatTokenCount: totalTokenCount });
      }
      // populate startS/endS on each beatBoundary by reading the timings of the
      // first and last word in the beat. fallback: even split across duration
      // if word count is off.
      const fallbackPerBeat = (script.durationS && beats.length > 0)
        ? script.durationS / beats.length
        : 0;
      for (let i = 0; i < beatBoundaries.length; i++) {
        const bb = beatBoundaries[i];
        const startW = words[bb.startWordIdx];
        const endW = words[bb.endWordIdx - 1];
        if (startW && endW) {
          bb.startS = startW.startS;
          bb.endS = endW.endS;
        } else if (fallbackPerBeat > 0) {
          bb.startS = i * fallbackPerBeat;
          bb.endS = (i + 1) * fallbackPerBeat;
        } else {
          bb.startS = 0;
          bb.endS = 0;
        }
      }

      // build beat html. words wrap in <span class="vb-word" data-word-idx>;
      // emphasis words add .emph (compared case-insensitively, stripped of
      // punctuation on both sides for fuzzier matches).
      // marker chip is only rendered inline when markerStyle === "pill"; the
      // banner / corner / stamp / ticker / halo styles render the marker
      // indicator elsewhere (overlay, head-row glyph, inline svg stamp,
      // bottom ticker, or pulsing box-shadow on the beat itself).
      const escAttr = s => String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const normalize = w => String(w || "").toLowerCase().replace(/^[^\p{L}\p{N}]+|[^\p{L}\p{N}]+$/gu, "");
      const inlinePill = markerStyle === "pill";
      // active bookmark indices for this script — drives the "is-on" state on
      // each per-beat icon and the chips row below.
      const bookmarkSet = new Set(bookmarksForKey(sessionKey, script.turnId));
      // small ribbon icon. outline by default; the .is-on class on the button
      // flips colour to accent (full state).
      const BOOKMARK_SVG_OUTLINE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h12v18l-6-4-6 4z"/></svg>';
      const BOOKMARK_SVG_FILLED  = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h12v18l-6-4-6 4z"/></svg>';
      let globalWordIdx = 0;
      const beatsHtml = beats.map((b, i) => {
        const tokens = beatTokens[i];
        const emphSet = new Set((Array.isArray(b.emphasis) ? b.emphasis : []).map(normalize).filter(Boolean));
        const wordSpans = tokens.map(tok => {
          const isEmph = emphSet.size > 0 && emphSet.has(normalize(tok));
          const cls = "vb-word" + (isEmph ? " emph" : "");
          const html = '<span class="' + cls + '" data-word-idx="' + globalWordIdx + '">' + escapeHtml(tok) + '</span>';
          globalWordIdx++;
          return html;
        }).join(" ");
        const showInlinePill = inlinePill && !!b.marker;
        // marker text is mapped through markerLabelFor() so the active vocab
        // controls which token name displays — even if the inbound beat carries
        // the other vocab's token (e.g. server still on design while UI prefers
        // story). class still uses the raw token so the per-marker CSS hits.
        const markerHtml = showInlinePill
          ? '<span class="video-marker ' + escAttr(b.marker) + '">' + escapeHtml(markerLabelFor(b.marker).toLowerCase().replace(/_/g, " ")) + '</span>'
          : "";
        const markerCls = showInlinePill ? " has-marker" : "";
        const isOn = bookmarkSet.has(i);
        const bookmarkBtnHtml = '<button type="button" class="vb-bookmark' + (isOn ? ' is-on' : '') + '" data-bookmark-idx="' + i + '" aria-label="' + (isOn ? 'remove bookmark' : 'bookmark beat') + '" aria-pressed="' + (isOn ? 'true' : 'false') + '">' + (isOn ? BOOKMARK_SVG_FILLED : BOOKMARK_SVG_OUTLINE) + '</button>';
        const inner = showInlinePill ? markerHtml + '<div class="vb-line">' + wordSpans + '</div>' : wordSpans;
        return '<div class="video-beat future' + markerCls + '" data-beat-idx="' + i + '" data-marker="' + (b.marker ? escAttr(b.marker) : '') + '">' +
                 inner + bookmarkBtnHtml +
               '</div>';
      }).join("");

      // chip row above the controls: one chip per bookmarked beat, with a tiny
      // "clear" link at the right end. hidden when zero bookmarks. chip click
      // seeks audio to that beat's startS; the clear link POSTs the bulk-clear
      // endpoint.
      const sortedBookmarks = Array.from(bookmarkSet).sort((a, b) => a - b);
      const bookmarksRowHtml = sortedBookmarks.length > 0
        ? '<div class="video-bookmarks" role="group" aria-label="bookmarked beats">' +
            '<span class="video-bookmarks-label">bookmarks</span>' +
            sortedBookmarks.map(idx =>
              '<button type="button" class="video-bookmark-chip" data-bookmark-seek="' + idx + '" aria-label="seek to beat ' + (idx + 1) + '">' +
                escapeHtml('📑 #' + (idx + 1)) +
              '</button>'
            ).join('') +
            '<button type="button" class="video-bookmark-clear" aria-label="clear all bookmarks">clear</button>' +
          '</div>'
        : '';

      const stageId = "vp-stage-" + cssIdSafe(sessionKey);
      const ctrlsId = "vp-controls-" + cssIdSafe(sessionKey);

      const errorHtml = (script.status === "error" && script.errorMessage)
        ? '<div class="video-error-msg">' + escapeHtml(script.errorMessage) + '</div>'
        : "";

      // controls only meaningful once we have audio. while drafting/rendering
      // show a disabled play button so the layout doesn't pop in.
      const hasAudio = script.status === "ready" && !!script.audioUrl;
      const playDisabled = hasAudio ? "" : " disabled";
      // mp4 export status — only meaningful once the script is ready (audio
      // and word timings are required to render the composition).
      const exportPayload = (() => {
        const m = exportsByKey.get(sessionKey);
        return (m && m.get(script.turnId)) || null;
      })();
      const exportHtml = hasAudio ? buildExportButtonHtml(script.turnId, exportPayload) : "";
      const controlsHtml = errorHtml +
        '<div class="video-pane-controls" id="' + ctrlsId + '">' +
          '<button class="video-play-btn" type="button" aria-label="play"' + playDisabled + '>' +
            '<span class="play-frost" aria-hidden="true"></span>' +
