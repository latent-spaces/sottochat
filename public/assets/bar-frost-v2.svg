<?xml version="1.0" encoding="UTF-8"?>
<!--
  bar-frost: dripping-icing cap for the bar plots in cut-the-cake.
  this file is the source of truth — it is loaded as a css `mask-image` for
  every bar (see `.bar-frost` in public/index.html). the masked element's
  background-color fills the silhouette, so the fill below is only there so
  the shape renders in vector editors.

  geometry (viewBox 36 × 12, irregular profile + two pendant drips):
    M0 12 L0 7              bottom-left up to baseline
    C1 3 3 3 5 5            left soft puff
    Q5 9 6.5 9 Q8 9 8 6     small drip (rounded tongue)
    C10 4 13 4 15 6         low rolling bump
    C18 1 24 1 27 5         tall main puff
    Q27 11 29 11 Q31 11 31 5  big drip
    C33 7 35 7 36 6         right edge gentle dip
    L36 12 Z                close at bottom-right
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 12" width="360" height="120" preserveAspectRatio="none">
  <path d="M0 12 L0 7 C1 3 3 3 5 5 Q5 9 6.5 9 Q8 9 8 6 C10 4 13 4 15 6 C18 1 24 1 27 5 Q27 11 29 11 Q31 11 31 5 C33 7 35 7 36 6 L36 12 Z" fill="#EC4899"/>
</svg>
