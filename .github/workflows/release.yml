name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - name: Verify tag matches package version
        run: |
          version="$(bun -e 'import pkg from "./package.json"; process.stdout.write(pkg.version)')"
          test "v$version" = "$GITHUB_REF_NAME" || {
            echo "Tag $GITHUB_REF_NAME does not match package version v$version" >&2
            exit 1
          }

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: sottochat-darwin-arm64
          - target: bun-darwin-x64
            artifact: sottochat-darwin-x64
          - target: bun-linux-arm64
            artifact: sottochat-linux-arm64
          - target: bun-linux-x64-baseline
            artifact: sottochat-linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build standalone binary
        run: |
          mkdir -p "dist/${{ matrix.artifact }}"
          bun build --compile --minify \
            --target="${{ matrix.target }}" \
            src/cli.ts \
            --outfile="dist/${{ matrix.artifact }}/sottochat"
      - name: Package binary
        run: tar -C "dist/${{ matrix.artifact }}" -czf "dist/${{ matrix.artifact }}.tar.gz" sottochat
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create checksums
        working-directory: release
        run: sha256sum *.tar.gz > checksums.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release/*
          --repo "$GITHUB_REPOSITORY"
          --generate-notes
          --verify-tag

  npm-publish:
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Inspect package contents
        run: npm pack --dry-run
      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
