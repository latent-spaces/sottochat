<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>sottochat</title>
  <link rel="icon" type="image/webp" href="/assets/logo.webp" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      /* paper / surface */
      --bg: #fdf9fa;
      --surface: #ffffff;
      --fg: #1a1a1f;
      --fg-soft: #6e6e7a;
      --fg-muted: #9090a0;
      --border: #efe8eb;
      --border-strong: #dcd2d6;
      --chip-tint: #f5eef1;
      /* operative voice */
      --accent: #ec4899;          /* strawberry */
      --accent-hover: #db2777;
      --accent-soft: #fce7f3;
      /* chart-only second voice */
      --plum: #a855f7;
      /* glass — top nav only */
      --glass-paper: rgba(253, 249, 250, 0.72);
      /* data colors — quarantined to code-changes chart */
      --diff-green: #10b981;
      --diff-red: #ef4444;
      /* type stacks */
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      /* radii */
      --r-input: 8px;
      --r-card: 10px;
      --r-panel: 14px;
      --r-pill: 999px;
      /* motion */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    /* the UA [hidden] rule loses to any explicit `display:` on a class — force it. */
    [hidden] { display: none !important; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      min-height: 100vh;
    }

    /* soft ambient layers — three large blurred blobs sit behind the page,
       a sprinkle layer drifts above them but below cards. neither catches
       pointer events; both respect prefers-reduced-motion. */
    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }
    .blob-1 { width: 520px; height: 520px; background: oklch(94% 0.05 0); top: -120px; left: -160px; opacity: 0.55; }
    .blob-2 { width: 420px; height: 420px; background: oklch(94% 0.06 305); top: 40px; right: -120px; opacity: 0.5; }
    .blob-3 { width: 600px; height: 600px; background: oklch(94% 0.04 280); top: 60vh; left: 28%; opacity: 0.35; }

    .sprinkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .sprinkle {
      position: absolute;
      width: 5px;
      height: 14px;
      border-radius: 999px;
      will-change: transform;
    }
    .sprinkle.round { width: 6px; height: 6px; }

    /* hover-burst sprinkles spawned out of a bar's frosting cap. positioned
       absolute inside the bar — the bar uses overflow:visible already so they
       can fly above the rim. removed from DOM after the gsap timeline finishes. */
    .sprinkle-burst {
      position: absolute;
      pointer-events: none;
      width: 4px;
      height: 9px;
      border-radius: 999px;
      will-change: transform, opacity;
    }
    .sprinkle-burst.round { width: 5px; height: 5px; }

    /* a single cake icon perches somewhere in the detail pane, picked at random
       on every session-open. lives inside its target so it scrolls with it.
       size + anchor are set per-target via inline custom props + an anchor class.
       gsap entrance: drop in from above with blur-fade + soft overshoot. */
    .cake-perch {
      position: absolute;
      width: var(--cake-size, 26px);
      height: var(--cake-size, 26px);
      /* hover trigger needs pointer events; the inner img is what visually
         responds with the jump-roll, so we keep the outer span clickable but
         the cursor stays default. */
      pointer-events: auto;
      cursor: default;
      z-index: 5;
      transform-origin: 50% 100%;
      filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.12));
    }
    .cake-perch img {
      width: 100%;
      height: 100%;
      display: block;
      transform-origin: 50% 100%;
      will-change: transform;
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
    }
    /* anchor variants — left/top/right resolved relative to the target's offset parent. */
    .cake-perch.bar-top {
      left: 50%;
      top: calc(-1 * var(--cake-size, 26px) - 2px);
      transform: translate(-50%, 0) rotate(var(--cake-tilt, 0deg));
    }
    .cake-perch.card-top-right {
      right: 12px;
      top: calc(-1 * var(--cake-size, 36px) * 0.55);
      transform: rotate(var(--cake-tilt, 0deg));
    }
    .cake-perch.head-right {
      right: -8px;
      top: calc(-1 * var(--cake-size, 30px) * 0.4);
      transform: rotate(var(--cake-tilt, 0deg));
    }
    .cake-perch.input-top-right {
      right: 14px;
      top: calc(-1 * var(--cake-size, 36px) * 0.6);
      transform: rotate(var(--cake-tilt, 0deg));
    }
    .cake-perch.legend-corner {
      right: -14px;
      top: -14px;
      transform: rotate(var(--cake-tilt, 0deg));
    }

    /* keep main content above the sprinkle layer */
    main.layout { position: relative; z-index: 1; }

    /* sticky frosted top nav — the only glass surface in the system. */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 56px;
      padding: 0 24px;
      background: var(--glass-paper);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .nav-logo {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      object-fit: contain;
      /* gsap brand-jump hovers will scale + spin from this anchor — cake bottom. */
      transform-origin: 50% 70%;
      will-change: transform;
    }
    .nav-wordmark {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-tag {
      font-size: 12px;
      color: var(--fg-soft);
      white-space: nowrap;
      margin-left: 6px;
    }
    @media (max-width: 720px) { .nav-tag { display: none; } }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .reconnect-indicator {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
    }
    .gh-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
      transition: border-color 200ms var(--ease-out);
    }
    .gh-pill:hover { border-color: var(--accent); }
    .gh-pill .gh-glyph {
      font-family: var(--mono);
      font-size: 13px;
    }
    .gh-pill .gh-star { color: #f4b942; }

    /* language pill in the top nav — picks the explanation language. persisted
       in localStorage and synced to the server over ws. */
    .nav-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-pill);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      cursor: pointer;
      transition: border-color 200ms var(--ease-out), background 200ms var(--ease-out);
    }
    .nav-toggle:hover { border-color: var(--accent); }
    .nav-toggle .toggle-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
      box-shadow: none;
      transition: background 160ms var(--ease-out), box-shadow 160ms var(--ease-out);
    }
    .nav-toggle[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .nav-toggle[aria-pressed="true"] .toggle-dot {
      background: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 28%, transparent);
    }
    .nav-toggle .toggle-glyph {
      font-family: var(--mono);
      font-size: 13px;
    }
    /* language pill: the .nav-toggle chrome (border, radius, surface) wraps a
       bare <select> so it reads as the same pill vocabulary, not a new button. */
    .lang-pill { position: relative; padding: 0; }
    .lang-pill::after {
      content: "▾";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 10px;
      color: var(--fg-muted);
    }
    .lang-pill select {
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      padding: 6px 26px 6px 12px;
      cursor: pointer;
    }
    .lang-pill select option { color: var(--fg); }

    main.layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 24px 96px;
      display: flex;
      gap: 0;
      align-items: flex-start;
    }
    /* the panes carry barely-there gradients of two different temperatures —
       sidebar trends rose, detail trends cream — separated by a hairline.
       at full opacity it would read as two coloured panels; at these alphas
       the eye reads "single surface, gently divided." */
    .sidebar {
      flex: 0 0 320px;
      position: sticky;
      top: 80px;
      padding: 4px 22px 20px 0;
      border-right: 1px solid rgba(244, 114, 182, 0.10);
      background: linear-gradient(180deg, rgba(252, 231, 243, 0.32) 0%, rgba(252, 231, 243, 0) 70%);
    }
    .detail-pane {
      flex: 1;
      min-width: 0;
      padding: 4px 0 20px 22px;
      background: linear-gradient(180deg, rgba(255, 244, 232, 0.30) 0%, rgba(255, 244, 232, 0) 70%);
    }
    @media (max-width: 880px) {
      main.layout { flex-direction: column; }
      .sidebar {
        flex: 1 1 auto;
        position: static;
        width: 100%;
        padding: 0 0 16px;
        border-right: none;
        border-bottom: 1px solid rgba(244, 114, 182, 0.10);
      }
      .detail-pane { padding: 16px 0 0; }
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 12px;
    }

    /* sessions rail — the header carries a chevron that collapses the sidebar
       to a thin strip of session color-dots. glanceable from across the desk;
       state persists in localStorage. */
    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sidebar-toggle {
      border: none;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 10px;
      line-height: 1;
      padding: 4px 5px;
      margin: 0 0 12px;
      border-radius: 6px;
      transition: color 0.15s var(--ease-out), background 0.15s var(--ease-out);
    }
    .sidebar-toggle:hover { color: var(--accent); background: var(--chip-tint); }

    .sidebar.collapsed { flex-basis: 52px; padding-right: 10px; }
    .sidebar.collapsed .section-label,
    .sidebar.collapsed .ambient-quiet,
    .sidebar.collapsed .inbox-separator-label,
    .sidebar.collapsed .inbox-separator-chevron,
    .sidebar.collapsed .empty-inbox { display: none; }
    .sidebar.collapsed .sidebar-head { justify-content: center; }
    .sidebar.collapsed .sidebar-toggle { transform: rotate(180deg); margin-bottom: 6px; }
    .sidebar.collapsed .inbox-separator { margin: 8px 0; }

    /* each card shrinks to a single accent dot (accent var comes from
       sessionColorVars). live = full opacity, others dimmed, selected = ring. */
    .sidebar.collapsed .card {
      padding: 0;
      min-height: 0;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      box-shadow: none;
    }
    .sidebar.collapsed .card > * { display: none; }
    .sidebar.collapsed .card::before {
      content: '';
      display: block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
      transition: transform 0.15s var(--ease-out);
    }
    .sidebar.collapsed .card:hover::before { transform: scale(1.25); }
    .sidebar.collapsed .card:has(.live-word)::before { opacity: 1; }
    .sidebar.collapsed .card.selected::before {
      box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--accent);
    }

    /* detail empty — italic prompt, no illustration */
    .detail-empty {
      padding: 64px 24px;
      text-align: center;
    }
    .detail-empty p {
      color: var(--fg-soft);
      font-style: italic;
      font-size: 14px;
      margin: 0;
    }

    /* inbox separator — divides user-driven sessions (top) from sdk
       subprocesses we spawned ourselves (bottom: chat-agent, observer).
       centered hairline label, mono, muted. sits inline in the cards-list
       flow so the FLIP layout snapshot still works. */
    .inbox-separator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 4px 6px;
      color: var(--fg-muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s var(--ease-out);
    }
    .inbox-separator:hover { color: var(--accent); }
    .inbox-separator::before,
    .inbox-separator::after {
      content: "";
      flex: 1 1 auto;
      height: 0;
      border-top: 1px dashed var(--border);
    }
    .inbox-separator-label {
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .inbox-separator-chevron {
      display: inline-block;
      transition: transform 0.15s var(--ease-out);
    }
    .inbox-separator.expanded .inbox-separator-chevron { transform: rotate(90deg); }

    /* internal cards are collapsed (hidden) by default — see
       ctc-internal-collapsed in localStorage. kept in the DOM so the
       insertBefore reconciliation in renderInbox stays untouched; only
       display is toggled here. */
    .cards.internal-collapsed .card.internal { display: none; }

    /* sidebar inbox */
    .cards { display: grid; gap: 8px; }
    .empty-inbox {
      text-align: center;
      padding: 32px 16px;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 13px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--r-card);
    }

    .card {
      position: relative;
      display: block;
      text-decoration: none;
      color: var(--fg);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 10px 12px;
      overflow: hidden;
      transition: border-color 400ms var(--ease-out),
                  background 200ms var(--ease-out),
                  opacity 400ms var(--ease-out);
    }
    .card:hover { border-color: var(--accent); opacity: 1; }
    .card.live { border-color: var(--accent); }
    .card.idle { opacity: 0.6; }
    /* update flash — fires when a card's data changes mid-session */
    .card.is-updated { animation: card-update 1.6s var(--ease-out); }
    @keyframes card-update {
      0%   { box-shadow: 0 0 0 0 var(--accent-soft); transform: scale(1); }
      18%  { box-shadow: 0 0 0 8px var(--accent-soft); transform: scale(1.022); }
      100% { box-shadow: 0 0 0 0 transparent; transform: scale(1); }
    }
    .card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      opacity: 1;
      /* mascot overlays the card via z-index — no padding reserve, so the
         model tag + other items keep their natural positions. */
    }
    .card-mascot {
      position: absolute;
      right: -2px;
      bottom: 1px;
      width: 36px;
      height: 36px;
      pointer-events: none;
      object-fit: contain;
      z-index: 2;      /* float over the card's text content */
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
      gap: 8px;
    }
    .card-head h3 {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .model-tag {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg-soft);
      background: var(--chip-tint);
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      text-transform: lowercase;
      letter-spacing: 0.04em;
    }
    .card-insight {
      font-size: 13px;
      color: var(--fg);
      line-height: 1.45;
      margin: 4px 0 6px;
    }
    .card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .card-foot {
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      margin: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .card-foot .live-word { color: var(--accent); font-weight: 600; }
    .card-foot .sep { opacity: 0.55; }
    .card-foot .card-cwd { overflow: hidden; text-overflow: ellipsis; }
    .card-meta .tok-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    /* detail-header working directory — full path, mono, under the source line. */
    .d-cwd-line {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
      margin: 2px 0 0;
      word-break: break-all;
    }

    /* chart cards — turn complexity + code changes, panel-style with header pills */
    .chart-card {
      background: linear-gradient(180deg, oklch(98% 0.014 350) 0%, var(--surface) 100%);
      border: 1px solid var(--accent-soft);
      border-radius: var(--r-panel);
      padding: 14px 16px 12px;
      min-width: 0;
    }
    .chart-card.code {
      background: linear-gradient(180deg, oklch(98% 0.012 155) 0%, var(--surface) 100%);
      border-color: oklch(92% 0.06 155);
    }
    .chart-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      min-width: 0;
    }
    .chart-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      flex-shrink: 0;
    }
    .chart-card.code .chart-icon { background: oklch(94% 0.07 155); color: oklch(60% 0.16 155); }
    .chart-icon svg { width: 16px; height: 16px; }
    .chart-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chart-card.code .chart-title { color: oklch(50% 0.14 155); }
    .chart-legend {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .legend-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-soft);
      line-height: 1;
    }
    .legend-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .legend-pill .dot-input { background: var(--accent); opacity: 0.55; }
    .legend-pill .dot-output { background: var(--plum); }
    .legend-pill .dot-added { background: var(--diff-green); }
    .legend-pill .dot-removed { background: var(--diff-red); }

    .chart-body {
      display: flex;
      gap: 8px;
      min-width: 0;
    }
    .cx-yaxis { flex: 0 0 36px; position: relative; height: 130px; }
    .cx-yaxis .tick {
      position: absolute;
      right: 4px;
      transform: translateY(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--fg-muted);
      line-height: 1;
    }
    .cx-yaxis .tick.top { top: 0; }
    .cx-yaxis .tick.mid { top: 50%; }
    .cx-yaxis .tick.bot { top: 100%; }
    .cx-plot {
      flex: 1 1 auto;
      position: relative;
      height: 130px;
      min-width: 0;
    }
    .cx-grid {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px dashed var(--border);
      pointer-events: none;
    }
    .cx-grid.top { top: 0; }
    .cx-grid.mid { top: 50%; }
    .cx-grid.bot { top: 100%; border-top-style: solid; }
    .cx-bars {
      position: absolute;
      inset: 0 0 0 0;
      display: flex;
      align-items: flex-end;
      gap: 4px;
    }
    /* flex distribution — bars share the available width without scrolling */
    .cx-pair {
      flex: 1 1 0;
      min-width: 4px;
      max-width: 56px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      height: 100%;
      position: relative;
    }
    .cx-bar {
      flex: 1 1 0;
      min-height: 1px;
      border-radius: 3px 3px 0 0;
      max-width: 22px;
      position: relative;
      overflow: visible;
    }
    /* dripping-icing cap — silhouette comes from /assets/frosting-new.svg used as
       a mask, the fill is the bar's own `currentColor` (so the bar's opacity
       carries through and frost == bar). edit the svg file to change shape;
       the inline rendering follows automatically. */
    /* the cap is 36px tall; 20% (≈7px) peeks above the bar top, 80% (≈29px) overlaps
       into the bar — most of the drip silhouette lives inside the bar, just the rim
       spills over. only added on bars whose height pct passes BAR_FROST_MIN_PCT
       (see render code) so short bars aren't dwarfed by their own frosting. */
    .bar-frost {
      position: absolute;
      left: -50%;
      right: -50%;
      top: -7px;
      width: 200%;
      height: 36px;
      pointer-events: none;
      display: block;
      /* lighter than the bar so the icing reads as icing, not paint. */
      background-color: currentColor; /* fallback */
      background-color: color-mix(in oklab, currentColor 60%, white 40%);
      -webkit-mask: url("/assets/frosting-new.svg") no-repeat bottom center / contain;
              mask: url("/assets/frosting-new.svg") no-repeat bottom center / contain;
    }
    .bar-input { background: var(--accent); color: var(--accent); opacity: 0.55; }
    .bar-output { background: var(--plum); color: var(--plum); opacity: 0.9; }
    .cx-pair.latest .bar-output { background: var(--plum); color: var(--plum); opacity: 1; }
    .bar-added { background: var(--diff-green); color: var(--diff-green); opacity: 0.9; }
    .bar-removed { background: var(--diff-red); color: var(--diff-red); opacity: 0.9; }

    .chart-foot {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
      padding-right: 4px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
    }

    /* detail page */
    .session-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin: 4px 0 24px;
    }
    .session-head h2 {
      font-size: 26px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--accent);
    }
    .session-head .source {
      font-size: 13px;
      color: var(--fg-soft);
      margin: 0;
      font-family: var(--mono);
    }
    .session-head .source .src-glyph { color: var(--accent); margin-right: 4px; }

    /* inline glance — agent-message bar + added/removed bars on each session card.
       latest-turn summary; the chevron in the detail header toggles the full charts band. */
    .mini-stats {
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      height: 16px;
      pointer-events: none;
    }
    .mini-stats .mini-bar {
      width: 4px;
      min-height: 2px;
      border-radius: 2px 2px 0 0;
      align-self: flex-end;
      transition: height 0.45s var(--ease-out);
    }
    .mini-stats .mb-output  { background: var(--plum); }
    .mini-stats .mb-added   { background: var(--diff-green); }
    .mini-stats .mb-removed { background: var(--diff-red); }
    .mini-stats .mini-sep {
      width: 1px;
      height: 10px;
      background: var(--border);
      align-self: flex-end;
      margin: 0 2px 1px;
    }

    .charts-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 22px;
      padding: 0 8px;
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--fg-soft);
      cursor: pointer;
      transition: background 0.15s var(--ease-out), color 0.15s var(--ease-out), border-color 0.15s var(--ease-out);
    }
    .charts-toggle:hover { background: var(--chip-tint); color: var(--accent); border-color: var(--accent-soft); }
    /* reset button in the title row — always visible; wipes the whole discussion
       (as if the session were untouched). mirrors the charts-toggle chrome. */
    .d-reset-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      padding: 0 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--fg-soft);
      cursor: pointer;
      transition: background 0.15s var(--ease-out), color 0.15s var(--ease-out), border-color 0.15s var(--ease-out);
    }
    .d-reset-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); }
    .d-reset-btn .reset-glyph { font-size: 13px; line-height: 1; }
    #d-chat-history[aria-expanded="true"] { color: var(--accent); border-color: var(--accent-soft); background: var(--accent-soft); }
    .chat-archives {
      margin: 10px 0;
      padding: 10px 12px;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }
    .chat-archives .archives-head {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-soft);
      margin-bottom: 8px;
    }
    .archive-item { padding: 6px 0; }
    .archive-item + .archive-item { border-top: 1px solid var(--border); }
    .archive-head {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .archive-when {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-soft);
      white-space: nowrap;
    }
    .archive-preview {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      color: var(--fg);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .archive-view, .archive-restore {
      height: 20px;
      padding: 0 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-soft);
      cursor: pointer;
      white-space: nowrap;
    }
    .archive-view:hover, .archive-restore:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); }
    .archive-thread { margin-top: 8px; opacity: 0.9; }
    .charts-toggle .chev { transition: transform 0.2s var(--ease-out); display: block; }
    .charts-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
    .charts-toggle[aria-expanded="true"] { color: var(--accent); border-color: var(--accent-soft); background: var(--accent-soft); }

    .untouched-line {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
      margin: 0 0 8px;
      padding-left: 2px;
    }

    /* instrument band — sits between the summary panel and the conversation strip.
       two columns always; if one chart has nothing to render, its slot stays
       empty rather than the other chart stretching to full width. */
    .charts-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 0 0 20px;
    }
    .charts-band > * { min-width: 0; }
    #d-chart { grid-column: 1; }
    #d-code-chart { grid-column: 2; }
    /* when only one of the two charts has content, give it the full row instead
       of leaving an empty half-column slot. */
    .charts-band.single-chart { grid-template-columns: 1fr; }
    .charts-band.single-chart > * { grid-column: 1; }
    @media (max-width: 880px) {
      .charts-band { grid-template-columns: 1fr; }
      #d-chart, #d-code-chart { grid-column: 1; }
    }

    /* conversation panel — last user/agent exchange, panel-style like the chart cards
       and chat-input. messages render as whatsapp-style chat bubbles: user on the
       right (accent tint), agent on the left (paper tint). when the latest signal
       is from the user, a typing indicator stands in for the not-yet-arrived agent
       reply and the chat-input below is hidden. */
    .conversation {
      background: linear-gradient(180deg, oklch(98% 0.014 350) 0%, var(--surface) 100%);
      border: 1px solid var(--accent-soft);
      border-radius: var(--r-panel);
      padding: 14px 16px 16px;
      margin: 0 0 20px;
    }
    .conv-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      min-width: 0;
    }
    .conv-head-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      flex-shrink: 0;
    }
    .conv-head-icon svg { width: 16px; height: 16px; }
    .conv-head-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 1 1 auto;
    }
    .conv-head-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      flex-shrink: 0;
    }
    .conv-stream {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .conv-msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }
    .conv-msg.from-agent { align-self: flex-start; align-items: flex-start; }
    .conv-msg.from-you   { align-self: flex-end;   align-items: flex-end; }
    .conv-msg-meta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin: 0 6px 3px;
    }
    .conv-msg.from-you .conv-msg-meta { color: var(--accent); }
    .conv-bubble {
      position: relative;
      padding: 10px 14px;
      border: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .conv-msg.from-agent .conv-bubble {
      background: oklch(98% 0.014 340);
      border-radius: 14px 14px 14px 4px;
    }
    .conv-msg.from-you .conv-bubble {
      background: var(--accent-soft);
      border-color: oklch(92% 0.07 340);
      color: var(--fg);
      border-radius: 14px 14px 4px 14px;
      white-space: pre-wrap;
    }
    /* typing indicator — three dots inside an agent-style bubble. */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--fg-muted);
      animation: conv-typing 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes conv-typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .typing-dots span { animation: none; opacity: 0.6; }
    }
    .conv-turn { display: flex; flex-direction: column; gap: 4px; }
    .conv-role {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .conv-role.you { color: var(--accent); }
    .conv-text {
      font-size: 14px;
      line-height: 1.55;
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .conv-empty {
      text-align: center;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 13px;
      padding: 16px 0 4px;
    }

    /* markdown body for agent messages — claude-session-style formatting */
    .conv-md { font-size: 14px; line-height: 1.6; color: var(--fg); max-width: 78ch; }
    .conv-md > *:first-child { margin-top: 0; }
    .conv-md > *:last-child { margin-bottom: 0; }
    .conv-md p { margin: 0 0 10px; }
    .conv-md h1, .conv-md h2, .conv-md h3, .conv-md h4 {
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 14px 0 6px;
    }
    .conv-md h1 { font-size: 17px; }
    .conv-md h2 { font-size: 16px; }
    .conv-md h3 { font-size: 15px; }
    .conv-md h4 { font-size: 14px; }
    .conv-md ul, .conv-md ol { padding-left: 22px; margin: 6px 0 10px; }
    .conv-md li { margin: 2px 0; }
    .conv-md li > p { margin: 0; }
    .conv-md code {
      font-family: var(--mono);
      font-size: 12.5px;
      background: var(--chip-tint);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .conv-md pre {
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.55;
      background: oklch(96% 0.012 340);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .conv-md pre code { background: none; padding: 0; border-radius: 0; font-size: 12.5px; }
    .conv-md a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .conv-md a:hover { color: var(--accent-hover); }
    .conv-md strong { font-weight: 600; }
    .conv-md em { font-style: italic; }
    .conv-md blockquote {
      margin: 8px 0;
      padding: 4px 0 4px 14px;
      border-left: 2px solid var(--border-strong);
      color: var(--fg-soft);
      font-style: italic;
    }
    .conv-md hr { border: 0; border-top: 1px dashed var(--border-strong); margin: 14px 0; }

    /* height-based tail: cap collapsed agent blocks, fade + toggle when truncated */
    .conv-body {
      position: relative;
      max-height: 240px;
      overflow: hidden;
      transition: max-height 280ms var(--ease-out);
    }
    /* tail fade lives on the (non-scrolling) bubble, not the scrolled conv-body:
       an ::after inside the overflow container scrolls away with the content when
       we pin to the bottom. this overlay stays put at the top edge. */
    .conv-msg.from-agent .conv-bubble.is-truncated::before {
      content: "";
      position: absolute;
      top: 1px;
      left: 1px;
      right: 1px;
      height: 66px;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(to top, transparent, oklch(98% 0.014 340) 88%);
      pointer-events: none;
      z-index: 1;
    }
    .conv-body.is-expanded { max-height: none; }
    .conv-body.is-expanded::after { display: none; }
    .conv-toggle {
      align-self: flex-start;
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
    }
    .conv-toggle:hover { color: var(--accent-hover); }
    .conv-toggle.hidden { display: none; }

    .ambient-quiet {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fg-muted);
      padding: 8px 2px;
      margin: 0;
    }

    /* chat input — single row below the conversation tail */
    .chat-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-panel);
      padding: 14px 16px;
    }
    /* preset chips + turns-in-context stepper — sit above the textarea, always
       shown. click a chip to send its text through the same /chat/send path. */
    .chat-quickreplies {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .quick-pill {
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s var(--ease-out), border-color 0.15s var(--ease-out), color 0.15s var(--ease-out);
    }
    .quick-pill:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
    .quick-pill:disabled { opacity: 0.5; cursor: not-allowed; }
    .qr-presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    /* preset chips read as the primary quick-action: filled accent tint, accent
       border, bolder text, and a solid-accent hover — clearly visible on the
       near-white chat surface (plain quick-pills stay subtle elsewhere). */
    .qr-presets .quick-pill {
      height: 28px;
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
    }
    .qr-presets .quick-pill:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--surface);
    }
    /* per-session "turns in context" stepper — mono micro-control, matches the
       quick-reply / clear chrome. sits at the end of the quick-reply row. */
    .ctx-turns {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
    }
    .ctx-turns-lbl { letter-spacing: 0.04em; opacity: 0.8; }
    .ctx-turns-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      padding: 0;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1;
      color: var(--accent);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s var(--ease-out), border-color 0.15s var(--ease-out);
    }
    .ctx-turns-btn:hover:not(:disabled) { background: var(--accent-soft); border-color: var(--accent-soft); }
    .ctx-turns-btn:disabled { opacity: 0.4; cursor: default; }
    .ctx-turns-val { min-width: 14px; text-align: center; color: var(--fg); font-variant-numeric: tabular-nums; }
    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .chat-input-row textarea {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      padding: 10px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-input);
      resize: vertical;
      min-height: 44px;
      background: var(--bg);
      color: var(--fg);
      transition: border-color 160ms var(--ease-out), background 160ms var(--ease-out);
    }
    .chat-input-row textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
    }
    .chat-input-row .send-btn {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      align-self: flex-end;
      background: var(--accent);
      border: none;
      border-radius: var(--r-input);
      cursor: pointer;
      box-shadow: 0 6px 20px -10px rgba(236, 72, 153, 0.55);
      transition: background 0.15s var(--ease-out), transform 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .chat-input-row .send-btn svg {
      width: 20px;
      height: 20px;
      color: #fff;
      pointer-events: none;
    }
    .chat-input-row .send-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px -12px rgba(236, 72, 153, 0.65);
    }
    .chat-input-row .send-btn:disabled {
      background: var(--border-strong);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .chat-input-row .send-btn:disabled svg { opacity: 0.5; }
    .chat-sent {
      margin-top: 8px;
      font-size: 12px;
      color: var(--fg-soft);
      font-style: italic;
    }

    /* chat thread — between conversation and chat input. populated by /chat/send
       replies. visually mirrors the conversation panel: user on the right with
       an accent-soft bubble, agent on the left with a paper-soft bubble. when
       the chat-agent is thinking, a typing bubble stands in for the next reply. */
    .chat-thread {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 0 0 16px;
    }
    .chat-thread:empty { display: none; }
    /* "show N earlier" toggle that appears at the top of a chat-thread once
       there are more than two messages. matches .conv-toggle's muted-mono
       look so it sits as a quiet meta-control above the bubbles. */
    .chat-history-toggle {
      align-self: center;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--fg-muted);
      background: none;
      border: 1px dashed var(--border);
      border-radius: 999px;
      cursor: pointer;
    }
    .chat-history-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    /* header row above the discussion: carries the "show N earlier" history
       toggle. clear/reset moved to the always-visible reset button in the title row. */
    .chat-thread-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }
    .chat-row {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }
    .chat-row.you   { align-self: flex-end;   align-items: flex-end; }
    .chat-row.agent { align-self: flex-start; align-items: flex-start; }
    .chat-row .chat-role {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin: 0 6px 3px;
    }
    .chat-row.you .chat-role { color: var(--accent); }
    .chat-row .chat-auto-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 999px;
      vertical-align: middle;
    }
    .chat-row .chat-body {
      position: relative;
      padding: 10px 14px;
      border: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.55;
      color: var(--fg);
      word-break: break-word;
    }
    .chat-row.agent .chat-body {
      background: oklch(98% 0.014 340);
      border-radius: 14px 14px 14px 4px;
    }
    .chat-row.you .chat-body {
      background: var(--accent-soft);
      border-color: oklch(92% 0.07 340);
      border-radius: 14px 14px 4px 14px;
      white-space: pre-wrap;
    }
    /* suggested-reply card — the message to paste back to the coding agent.
       always LTR (the agent's language, usually english), one-click copy. */
    .to-agent-card {
      margin-top: 8px;
      align-self: stretch;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
    }
    .to-agent-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
      background: var(--chip-tint);
      border-bottom: 1px solid var(--border);
    }
    .to-agent-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-muted);
    }
    .to-agent-copy {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--accent);
      background: none;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      padding: 2px 10px;
      cursor: pointer;
      transition: border-color 160ms var(--ease-out), color 160ms var(--ease-out);
    }
    .to-agent-copy:hover { border-color: var(--accent); }
    .to-agent-copy.copied { color: var(--diff-green); border-color: var(--diff-green); }
    .to-agent-body {
      margin: 0;
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      direction: ltr;
      text-align: left;
    }
    /* status row — paper-bubble with a typing dots animation while the
       chat-agent is generating, plain hairline note for respawn / error. */
    .chat-status {
      align-self: flex-start;
      max-width: 78%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
      background: oklch(98% 0.014 340);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
    }
    .chat-status.thinking { color: var(--fg-muted); }
    .chat-status.respawn,
    .chat-status.error { font-style: italic; }

    code, .mono { font-family: var(--mono); font-size: 13px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0ms !important;
        animation-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>
  <div class="sprinkles" aria-hidden="true" data-sprinkles></div>

  <header class="top-nav">
    <div class="nav-left">
      <img class="nav-logo" src="/assets/logo.webp" alt="" />
      <a class="nav-wordmark" href="#">sottochat</a>
      <span class="nav-tag">discuss the response, answer well</span>
    </div>
    <div class="nav-right">
      <span class="reconnect-indicator" id="reconnect-indicator" hidden>reconnecting…</span>
      <label class="nav-toggle lang-pill" title="explanation language">
        <select id="lang-select" aria-label="explanation language">
          <option value="he">עברית</option>
          <option value="en">english</option>
          <option value="ar">العربية</option>
          <option value="es">español</option>
          <option value="fr">français</option>
          <option value="ru">русский</option>
          <option value="de">deutsch</option>
          <option value="zh">中文</option>
        </select>
      </label>
      <a class="gh-pill" href="https://github.com/oronanschel/sottochat" target="_blank" rel="noreferrer noopener" aria-label="GitHub repo">
        <span class="gh-glyph">★</span>
        <span class="gh-star" id="gh-star">—</span>
      </a>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <h2 class="section-label">sessions</h2>
        <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="collapse sessions" aria-expanded="true">◀</button>
      </div>
      <p class="ambient-quiet" id="ambient-quiet" hidden>quiet</p>
      <div class="cards" id="cards">
        <div class="empty-inbox" id="inbox-empty">no active session detected — start claude code in a project</div>
      </div>
    </aside>

    <section class="detail-pane" id="detail-pane">
      <div class="detail-empty" id="detail-empty">
        <p>select a session</p>
      </div>
      <article class="detail-content" id="detail-content" hidden>
        <div class="session-head">
          <h2 id="d-name">—</h2>
          <p class="source"><span class="src-glyph">◆</span><span id="d-source">claude-code</span> · <span id="d-elapsed">—</span><span id="d-tokens" class="d-tokens"></span></p>
          <p class="d-cwd-line" id="d-cwd" hidden></p>
          <button class="charts-toggle" id="d-charts-toggle" type="button" aria-expanded="false" aria-controls="d-charts-band" title="show charts">
            <svg class="chev" viewBox="0 0 12 8" width="10" height="7" aria-hidden="true"><path d="M1 1.5l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="d-reset-btn" id="d-chat-history" type="button" hidden aria-expanded="false" title="past discussions for this session">
            <span class="history-label">history</span>
          </button>
          <button class="d-reset-btn" id="d-chat-reset" type="button" title="reset this discussion — clears everything you've asked, as if untouched">
            <span class="reset-glyph" aria-hidden="true">↺</span>reset
          </button>
        </div>

        <p class="untouched-line" id="d-untouched" hidden>untouched for <span id="d-untouched-mins">—</span></p>

        <div class="charts-band" id="d-charts-band" hidden>
          <div id="d-chart"></div>
          <div id="d-code-chart"></div>
        </div>

        <div class="conversation" id="d-conversation"></div>
        <div class="chat-archives" id="d-chat-archives" hidden></div>
        <div class="chat-thread" id="d-chat-thread"></div>
        <div class="chat-input" id="d-chat-input"></div>
      </article>
    </section>
  </main>

  <script src="/assets/vendor/marked.min.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/to-agent.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
