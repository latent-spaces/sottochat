            '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>' +
          '</button>' +
          '<div class="video-scrub" role="slider" aria-label="seek"><div class="video-scrub-fill"></div></div>' +
          '<div class="video-time">0:00 / ' + durStr + '</div>' +
          exportHtml +
        '</div>';

      // marker-style picker lives in the head row (right side, before the
      // duration pill). hidden if the active script has no markers — the
      // setting is irrelevant for a marker-less script.
      const hasAnyMarker = beats.some(b => !!b.marker);
      const pickerHtml = hasAnyMarker
        ? '<div class="video-marker-picker" role="group" aria-label="marker style">' +
            VIDEO_MARKER_STYLES.map((opt, idx) => (
              (idx > 0 ? '<span class="vmp-divider" aria-hidden="true"></span>' : '') +
              '<button type="button" class="vmp-btn" data-marker-style="' + opt + '" aria-pressed="' + (opt === markerStyle ? 'true' : 'false') + '">' + opt + '</button>'
            )).join('') +
          '</div>'
        : '';

      // script-style picker — controls the scriptifier prompt preset for the
      // NEXT closed turn. shown unconditionally (unlike the marker picker)
      // because the user might want to pre-set the style before the next
      // turn lands. shares .vmp-btn styling, keyed by data-script-style.
      const scriptStylePickerHtml =
        '<div class="video-marker-picker video-script-style-picker" role="group" aria-label="script style">' +
          VIDEO_SCRIPT_STYLES.map((opt, idx) => (
            (idx > 0 ? '<span class="vmp-divider" aria-hidden="true"></span>' : '') +
            '<button type="button" class="vmp-btn" data-script-style="' + opt + '" aria-pressed="' + (opt === scriptStyle ? 'true' : 'false') + '">' + opt + '</button>'
          )).join('') +
        '</div>';

      // marker-vocab picker — controls which marker vocabulary the scriptifier
      // is asked for and which token names the client surfaces in chips +
      // banners. orthogonal to script-style + marker-style (treatments). lives
      // alongside the marker-style picker; shown unconditionally so the user
      // can pre-set vocab before the next turn lands.
      const markerVocabPickerHtml =
        '<div class="video-marker-picker video-marker-vocab-picker" role="group" aria-label="marker vocab">' +
          VIDEO_MARKER_VOCABS.map((opt, idx) => (
            (idx > 0 ? '<span class="vmp-divider" aria-hidden="true"></span>' : '') +
            '<button type="button" class="vmp-btn" data-marker-vocab="' + opt + '" aria-pressed="' + (opt === markerVocab ? 'true' : 'false') + '">' + opt + '</button>'
          )).join('') +
        '</div>';

      // voice picker — per-session TTS voice override. compact at rest (current
      // label + chevron); click expands a popover with all three options.
      const voicePickerHtml = buildVoicePickerHtml(sessionKey);
      const currentVoiceId = voiceForSession(sessionKey);

      dVideoPane.innerHTML =
        '<div class="video-pane-head">' +
          '<span class="video-label">video</span>' +
          statusHtml +
          voicePickerHtml +
          scriptStylePickerHtml +
          markerVocabPickerHtml +
          pickerHtml +
          '<span class="video-duration">' + durStr + '</span>' +
        '</div>' +
        '<div class="video-pane-stage" id="' + stageId + '">' + beatsHtml + '</div>' +
        bookmarksRowHtml +
        controlsHtml +
        '<div class="video-attribution">narrated by scriptifier · ' + escapeHtml(currentVoiceId) + '</div>';

      // clear any stale --marker-tint on the pane container; paintKaraokeFrame
      // will re-set it for the corner style when sitting on a marked beat.
      try { dVideoPane.style.removeProperty("--marker-tint"); } catch {}

      // wire picker click → applyMarkerStyle.
      const pickerBtns = dVideoPane.querySelectorAll(".vmp-btn[data-marker-style]");
      pickerBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          const next = btn.getAttribute("data-marker-style");
          if (next) applyMarkerStyle(next);
        });
      });

      // wire marker-vocab picker click → applyMarkerVocab (POSTs + repaints).
      const markerVocabBtns = dVideoPane.querySelectorAll(".vmp-btn[data-marker-vocab]");
      markerVocabBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          const next = btn.getAttribute("data-marker-vocab");
          if (next) applyMarkerVocab(next);
        });
      });

      // wire script-style picker click → applyScriptStyle (POSTs to server).
      const scriptStyleBtns = dVideoPane.querySelectorAll(".vmp-btn[data-script-style]");
      scriptStyleBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          const next = btn.getAttribute("data-script-style");
          if (next) applyScriptStyle(next);
        });
      });

      // wire voice picker — toggle button opens/closes the popover; option
      // buttons POST to /debug/voice. menu opens with a 140ms fade+y:-4 unless
      // prefers-reduced-motion.
      wireVoicePicker(sessionKey);

      // wire bookmark controls — runs in every render path (icons exist on
      // every beat regardless of audio readiness; chips/clear only render
      // when there's at least one bookmark). icon-click toggles, chip-click
      // seeks the audio runtime, clear-link wipes the turn.
      wireBookmarkControls(sessionKey, script.turnId, beatBoundaries);

      // mount audio + wire controls. reuse existing runtime if turnId + audioUrl
      // match (so a refresh-tick doesn't interrupt playback).
      if (!hasAudio) {
        // teardown any stale runtime; nothing to play.
        const existing = videoRuntime.get(sessionKey);
        if (existing) {
          if (existing.rafId) cancelAnimationFrame(existing.rafId);
          if (existing.audio) { try { existing.audio.pause(); } catch {} }
          videoRuntime.delete(sessionKey);
        }
        return;
      }

      let rt = videoRuntime.get(sessionKey);
      const stageEl = document.getElementById(stageId);
      const ctrlsEl = document.getElementById(ctrlsId);
      const playBtn = ctrlsEl ? ctrlsEl.querySelector(".video-play-btn") : null;
      const scrubEl = ctrlsEl ? ctrlsEl.querySelector(".video-scrub") : null;
      const fillEl = ctrlsEl ? ctrlsEl.querySelector(".video-scrub-fill") : null;
      const timeEl = ctrlsEl ? ctrlsEl.querySelector(".video-time") : null;

      if (rt && rt.turnId === script.turnId && rt.audioUrl === script.audioUrl && rt.audio) {
        // reuse existing audio el; just rebind dom refs + boundaries.
        rt.beatBoundaries = beatBoundaries;
        rt.totalTokenCount = totalTokenCount;
        rt.words = words;
        rt.stageEl = stageEl;
        rt.ctrlsEl = ctrlsEl;
        rt.playBtn = playBtn;
        rt.scrubEl = scrubEl;
        rt.fillEl = fillEl;
        rt.timeEl = timeEl;
        rt.beats = beats;
        rt.lastBeatIdx = -1;
        rt.lastWordIdx = -1;
        // marker-style trackers need a fresh start: the stage was just rebuilt
        // so any banner / stamp / ticker DOM is gone, and the corner glyph
        // hangs off the head row which was also re-emitted.
        rt.lastBannerBeatIdx = -1;
        rt.lastCornerBeatIdx = -1;
        rt.lastStampBeatIdx = -1;
        rt.lastTickerBeatIdx = -1;
        rt.lastHaloBeatIdx = -1;
        rt.tickerQueueEndAt = 0;
      } else {
        // cleanup any prior runtime for this key.
        if (rt) {
          if (rt.rafId) cancelAnimationFrame(rt.rafId);
          if (rt.audio) { try { rt.audio.pause(); } catch {} }
        }
        const audio = document.createElement("audio");
        audio.preload = "metadata";
        audio.src = script.audioUrl;
        rt = {
          audio,
          turnId: script.turnId,
          audioUrl: script.audioUrl,
          beatBoundaries,
          totalTokenCount,
          words,
          beats,
          rafId: 0,
          stageEl, ctrlsEl, playBtn, scrubEl, fillEl, timeEl,
          lastBeatIdx: -1,
          lastWordIdx: -1,
          // marker-style trackers — initialised so the first beat-change after
          // mount triggers a fresh banner / corner-glyph / stamp / ticker /
          // halo entry. tickerQueueEndAt holds the timestamp at which the most
          // recently scheduled ticker pill finished its entrance, used to
          // stagger queued pills ~700ms apart.
          lastBannerBeatIdx: -1,
          lastCornerBeatIdx: -1,
          lastStampBeatIdx: -1,
          lastTickerBeatIdx: -1,
          lastHaloBeatIdx: -1,
          tickerQueueEndAt: 0,
          duration: script.durationS || 0,
        };
        videoRuntime.set(sessionKey, rt);

        audio.addEventListener("loadedmetadata", () => {
          if (isFinite(audio.duration) && audio.duration > 0) {
            rt.duration = audio.duration;
            if (rt.timeEl) rt.timeEl.textContent = "0:00 / " + vbFmtTime(audio.duration);
          }
        });
        audio.addEventListener("play", () => {
          if (rt.playBtn) rt.playBtn.setAttribute("aria-label", "pause");
          paintPlayGlyph(rt.playBtn, true);
          startKaraokeLoop(sessionKey);
        });
        audio.addEventListener("pause", () => {
          if (rt.playBtn) rt.playBtn.setAttribute("aria-label", "play");
          paintPlayGlyph(rt.playBtn, false);
          stopKaraokeLoop(sessionKey);
          paintKaraokeFrame(sessionKey); // settle final state
        });
        audio.addEventListener("ended", () => {
          stopKaraokeLoop(sessionKey);
          paintKaraokeFrame(sessionKey);
        });
      }

      // wire play/pause
      if (rt.playBtn) {
        rt.playBtn.onclick = () => {
          if (!rt.audio) return;
          if (rt.audio.paused) {
            rt.audio.play().catch(err => console.warn("[video] play failed", err));
          } else {
            rt.audio.pause();
          }
        };
        paintPlayGlyph(rt.playBtn, !rt.audio.paused);
      }
      // wire scrub click → seek
      if (rt.scrubEl) {
        rt.scrubEl.onclick = (ev) => {
          if (!rt.audio || !isFinite(rt.duration) || rt.duration <= 0) return;
          const rect = rt.scrubEl.getBoundingClientRect();
          const ratio = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
          rt.audio.currentTime = ratio * rt.duration;
          paintKaraokeFrame(sessionKey);
        };
      }

      // wire export button click. ready-state buttons are anchors with their
      // own native download behaviour, so we only attach a handler to the
      // idle/error buttons (idle → POST kicks off render).
      const exportBtn = dVideoPane.querySelector(".video-export[data-export-turn]");
      if (exportBtn && exportBtn.tagName !== "A" && !exportBtn.disabled) {
        exportBtn.onclick = () => {
          const turnId = exportBtn.getAttribute("data-export-turn");
          if (!turnId) return;
          requestExport(sessionKey, turnId);
        };
      }
      // kick the elapsed-time ticker if there's a rendering payload for this
      // session (post-reload + reconnect flow). idempotent; no-op when nothing
      // is rendering.
      scheduleExportElapsedTick(sessionKey);

      // initial paint reflects current audio.currentTime (may be 0 on first
      // mount, may be nonzero after a re-render mid-playback).
      paintKaraokeFrame(sessionKey);
    }

    // build the export-button html for a given (turnId, ExportPayload?).
    // returns "" when the payload is missing the bits we need (callers gate on
    // hasAudio externally — this just maps payload → html).
    function buildExportButtonHtml(turnId, ep) {
      const turnAttr = '"' + cssAttr(turnId) + '"';
      if (!ep || ep.status === "error") {
        const errMsg = ep && ep.errorMessage ? ep.errorMessage : "";
        const errSlot = errMsg
          ? '<span class="video-export-error-msg" title="' + escapeHtml(errMsg) + '">' + escapeHtml(errMsg) + '</span>'
          : '';
        const cls = ep && ep.status === "error" ? " is-error" : "";
        return errSlot +
          '<button type="button" class="video-export' + cls + '" data-export-turn=' + turnAttr +
            ' aria-label="export mp4">' +
            '<span class="ve-label">' + (ep && ep.status === "error" ? "retry export" : "export mp4") + '</span>' +
          '</button>';
      }
      if (ep.status === "rendering") {
        const elapsedS = Math.max(0, Math.floor((Date.now() - (ep.startedTs || ep.ts || Date.now())) / 1000));
        return '<button type="button" class="video-export is-rendering" data-export-turn=' + turnAttr +
          ' disabled aria-label="rendering">' +
            '<span class="ve-spinner" aria-hidden="true"></span>' +
            '<span class="ve-label">rendering ' + vbFmtTime(elapsedS) + '</span>' +
          '</button>';
      }
      // ready — anchor with download attribute. browser saves on click.
      const url = String(ep.mp4Url || "");
      const sizeKb = ep.bytes ? Math.round(ep.bytes / 1024) : 0;
      const sizeLabel = sizeKb > 0 ? " · " + sizeKb + "kb" : "";
      return '<a class="video-export is-ready" href="' + escapeHtml(url) + '" download data-export-turn=' + turnAttr +
        ' aria-label="download mp4">' +
          '<span class="ve-label">download mp4' + escapeHtml(sizeLabel) + '</span>' +
        '</a>';
    }

    // wire the per-beat bookmark icons + chips row + clear link. called from
    // renderVideoPane on every render. handlers POST /debug/bookmark or the
    // bulk-clear endpoint; the resulting bookmark:setting broadcast updates
    // bookmarksByKey + triggers a refresh. optimistic local update keeps the
    // icon snappy; on http error we revert.
    function wireBookmarkControls(sessionKey, turnId, beatBoundaries) {
      // icon click → toggle. delegate from .video-pane-stage so we don't have
      // to attach one listener per beat (and so re-renders don't leak handlers).
      const stage = dVideoPane.querySelector(".video-pane-stage");
      if (stage) {
        stage.onclick = (ev) => {
          const btn = ev.target && ev.target.closest ? ev.target.closest(".vb-bookmark") : null;
          if (!btn) return;
          ev.stopPropagation();
          const idxStr = btn.getAttribute("data-bookmark-idx");
          if (idxStr === null) return;
          const idx = Number(idxStr);
          if (!Number.isFinite(idx) || idx < 0) return;
          toggleBookmark(sessionKey, turnId, idx);
        };
      }
      // chip click → seek to that beat's startS (if audio is mounted).
      const chips = dVideoPane.querySelectorAll(".video-bookmark-chip[data-bookmark-seek]");
      chips.forEach(chip => {
        chip.onclick = () => {
          const idxStr = chip.getAttribute("data-bookmark-seek");
          if (idxStr === null) return;
          const idx = Number(idxStr);
          if (!Number.isFinite(idx) || idx < 0) return;
          const rt = videoRuntime.get(sessionKey);
          const bb = (beatBoundaries || [])[idx];
          if (rt && rt.audio && bb && typeof bb.startS === "number") {
            try { rt.audio.currentTime = Math.max(0, bb.startS); } catch {}
            paintKaraokeFrame(sessionKey);
          }
        };
      });
      // clear link → POST /debug/bookmarks/clear, then optimistic wipe.
      const clearBtn = dVideoPane.querySelector(".video-bookmark-clear");
      if (clearBtn) {
        clearBtn.onclick = async () => {
          const prev = bookmarksForKey(sessionKey, turnId).slice();
          setBookmarksForKey(sessionKey, turnId, []);
          refresh();
          try {
            const res = await fetch("/debug/bookmarks/clear", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ sessionKey, turnId }),
            });
            if (!res.ok) {
              setBookmarksForKey(sessionKey, turnId, prev);
              refresh();
            }
          } catch {
            setBookmarksForKey(sessionKey, turnId, prev);
            refresh();
          }
        };
      }
    }

    // optimistic toggle: flip the local set, repaint, then POST. on http error
    // revert. server broadcasts bookmark:setting → ws handler re-syncs the
    // canonical list (a no-op on success, corrects on failure).
    async function toggleBookmark(sessionKey, turnId, beatIdx) {
      const prev = bookmarksForKey(sessionKey, turnId).slice();
      const next = prev.includes(beatIdx)
        ? prev.filter(n => n !== beatIdx)
        : prev.concat(beatIdx);
      setBookmarksForKey(sessionKey, turnId, next);
      refresh();
      try {
        const res = await fetch("/debug/bookmark", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ sessionKey, turnId, beatIdx, action: "toggle" }),
        });
        if (!res.ok) {
          setBookmarksForKey(sessionKey, turnId, prev);
          refresh();
        }
      } catch {
        setBookmarksForKey(sessionKey, turnId, prev);
        refresh();
      }
    }

    // POST /debug/export-script for (sessionKey, turnId). server returns 202
    // and broadcasts export:rendering immediately; we still optimistically set
    // a local ExportPayload so the button repaints without waiting for the
    // round trip. on http error, surface a transient errorMessage so the
    // button's error state shows up without requiring a refresh.
    async function requestExport(sessionKey, turnId) {
      let m = exportsByKey.get(sessionKey);
      if (!m) { m = new Map(); exportsByKey.set(sessionKey, m); }
      const now = Date.now();
      m.set(turnId, { turnId, status: "rendering", ts: now, startedTs: now });
      refresh();
      try {
        const res = await fetch("/debug/export-script", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ sessionKey, turnId }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          const msg = (body && body.error) || ("http " + res.status);
          m.set(turnId, { turnId, status: "error", errorMessage: msg, ts: Date.now(), startedTs: now });
          refresh();
        }
      } catch (err) {
        m.set(turnId, {
          turnId,
          status: "error",
          errorMessage: err && err.message ? err.message : String(err),
          ts: Date.now(),
          startedTs: now,
        });
        refresh();
      }
    }

    // swap the play-btn glyph between play and pause shapes. uses a single
    // <svg> child so we just rewrite its innerHTML.
    function paintPlayGlyph(btn, playing) {
      if (!btn) return;
      const svg = btn.querySelector("svg");
      if (!svg) return;
      svg.innerHTML = playing
        ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
        : '<path d="M8 5v14l11-7z"/>';
    }

    function startKaraokeLoop(sessionKey) {
      const rt = videoRuntime.get(sessionKey);
      if (!rt || rt.rafId) return;
      const tick = () => {
        rt.rafId = 0;
        if (!rt.audio || rt.audio.paused) return;
        paintKaraokeFrame(sessionKey);
        rt.rafId = requestAnimationFrame(tick);
      };
      rt.rafId = requestAnimationFrame(tick);
    }
    function stopKaraokeLoop(sessionKey) {
      const rt = videoRuntime.get(sessionKey);
      if (!rt) return;
      if (rt.rafId) {
        cancelAnimationFrame(rt.rafId);
        rt.rafId = 0;
      }
    }
    // single repaint of the karaoke state at audio.currentTime. updates word
    // classes within the active beat, beat-level past/current/future classes,
    // scrub fill, and time label. only smooth-scrolls when the active beat
    // changes (debounced via rt.lastBeatIdx).
    function paintKaraokeFrame(sessionKey) {
      const rt = videoRuntime.get(sessionKey);
      if (!rt || !rt.audio || !rt.stageEl) return;
      const t = rt.audio.currentTime || 0;
      const dur = (isFinite(rt.duration) && rt.duration > 0)
        ? rt.duration
        : (isFinite(rt.audio.duration) ? rt.audio.duration : 0);
      // find current word index — linear scan is fine for typical 20–80 words.
      let wordIdx = -1;
      const ws = rt.words || [];
      for (let i = 0; i < ws.length; i++) {
        const w = ws[i];
        if (t < w.startS) { wordIdx = i - 1; break; }
        if (t >= w.startS && t < w.endS) { wordIdx = i; break; }
        if (i === ws.length - 1 && t >= w.endS) { wordIdx = ws.length - 1; }
      }
      // find current beat index from boundaries.
      let beatIdx = -1;
      const bbs = rt.beatBoundaries || [];
      if (wordIdx >= 0) {
        for (let i = 0; i < bbs.length; i++) {
          if (wordIdx >= bbs[i].startWordIdx && wordIdx < bbs[i].endWordIdx) { beatIdx = i; break; }
        }
      } else if (ws.length === 0 && bbs.length > 0 && dur > 0) {
        // fallback: even-time distribution when word timings are missing.
        for (let i = 0; i < bbs.length; i++) {
          if (t >= bbs[i].startS && t < bbs[i].endS) { beatIdx = i; break; }
        }
      }
      if (beatIdx < 0) beatIdx = 0;

      // paint beats — only touch classes that need to change. (full reset is
      // cheap at our beat counts but we use targeted updates to avoid
      // restarting css transitions every frame.)
      const beatEls = rt.stageEl.querySelectorAll(".video-beat");
      for (let i = 0; i < beatEls.length; i++) {
        const el = beatEls[i];
        const wantState = i < beatIdx ? "past" : (i === beatIdx ? "current" : "future");
        const has = el.classList.contains("past") ? "past"
                  : (el.classList.contains("current") ? "current" : "future");
        if (has !== wantState) {
          el.classList.remove("past", "current", "future");
          el.classList.add(wantState);
        }
      }

      // paint words within the current beat. clear played/active on all words
      // outside the current beat range; inside, mark earlier words .played and
      // the wordIdx-th .active.
      const allWordEls = rt.stageEl.querySelectorAll(".vb-word");
      const cur = bbs[beatIdx] || { startWordIdx: 0, endWordIdx: 0 };
      for (let i = 0; i < allWordEls.length; i++) {
        const el = allWordEls[i];
        const isInCurrent = i >= cur.startWordIdx && i < cur.endWordIdx;
        let want = "";
        if (i < wordIdx) want = "played";
        else if (i === wordIdx) want = "active";
        // outside the current beat we don't show played/active highlights;
        // beat-level dim styling carries the past/future signal.
        if (!isInCurrent) want = "";
        const hasPlayed = el.classList.contains("played");
        const hasActive = el.classList.contains("active");
        if (want === "played") {
          if (!hasPlayed) el.classList.add("played");
          if (hasActive) el.classList.remove("active");
        } else if (want === "active") {
          if (!hasActive) el.classList.add("active");
          if (hasPlayed) el.classList.remove("played");
        } else {
          if (hasPlayed) el.classList.remove("played");
          if (hasActive) el.classList.remove("active");
        }
      }

      // beat-change side effects: scroll into view + marker pulse.
      if (beatIdx !== rt.lastBeatIdx) {
        rt.lastBeatIdx = beatIdx;
        const beatEl = beatEls[beatIdx];
        if (beatEl) {
          if (reduceMotionOn()) {
            beatEl.scrollIntoView({ block: "center" });
          } else {
            beatEl.scrollIntoView({ behavior: "smooth", block: "center" });
          }
          // marker pulse — only when reduced-motion is OFF and gsap available.
          // pill-style only; banner/corner have their own entry animation.
          if (markerStyle === "pill") {
            const markerEl = beatEl.querySelector(".video-marker");
            if (markerEl && typeof gsap !== "undefined" && !reduceMotionOn()) {
              gsap.fromTo(markerEl,
                { scale: 1.0 },
                { scale: 1.08, duration: 0.14, ease: "back.out(2)", yoyo: true, repeat: 1, transformOrigin: "center" }
              );
            }
          }
        }
        // marker-style-specific hooks: fire only when crossing into a marked
        // beat (lastBannerBeatIdx / lastCornerBeatIdx track the previous fire
        // so the same beat doesn't re-trigger on rAF re-renders).
        const curBeat = (rt.beats || [])[beatIdx];
        const curMarker = curBeat && curBeat.marker;
        if (markerStyle === "banner") {
          if (curMarker && rt.lastBannerBeatIdx !== beatIdx) {
            rt.lastBannerBeatIdx = beatIdx;
            triggerMarkerBanner(sessionKey, beatIdx, curBeat);
          } else if (!curMarker) {
            rt.lastBannerBeatIdx = -1;
          }
        }
        if (markerStyle === "corner") {
          if (curMarker && rt.lastCornerBeatIdx !== beatIdx) {
            rt.lastCornerBeatIdx = beatIdx;
            triggerMarkerCorner(sessionKey, beatIdx, curBeat);
          } else if (!curMarker) {
            rt.lastCornerBeatIdx = -1;
            clearMarkerCorner(sessionKey);
          }
        }
        if (markerStyle === "stamp") {
          if (curMarker && rt.lastStampBeatIdx !== beatIdx) {
            rt.lastStampBeatIdx = beatIdx;
            triggerMarkerStamp(rt, beatIdx, curBeat);
          } else if (!curMarker) {
            rt.lastStampBeatIdx = -1;
          }
        }
        if (markerStyle === "ticker") {
          if (curMarker && rt.lastTickerBeatIdx !== beatIdx) {
            rt.lastTickerBeatIdx = beatIdx;
            triggerMarkerTicker(rt, curBeat, curBeat.text);
          } else if (!curMarker) {
            rt.lastTickerBeatIdx = -1;
          }
        }
        if (markerStyle === "halo") {
          if (curMarker && rt.lastHaloBeatIdx !== beatIdx) {
            rt.lastHaloBeatIdx = beatIdx;
            applyMarkerHalo(rt, beatIdx, curBeat);
          } else if (!curMarker) {
            rt.lastHaloBeatIdx = -1;
            clearMarkerHalo(rt);
          }
        }
      }
      // word-advance flourish — tiny 3-sprinkle pop from the active word's
      // center. throttled to 320ms so fast stretches don't strobe. uses the
      // shared spawnFlyer helper (fixed-position, auto-cleanup). reuses
      // BURST_COLORS — accent + plum + a couple of dessert hues — and skipped
      // under reduced-motion.
      if (
        wordIdx >= 0 && wordIdx !== rt.lastWordIdx &&
        typeof gsap !== "undefined" && !reduceMotionOn() &&
        typeof spawnFlyer === "function"
      ) {
        const nowTs = Date.now();
        if (nowTs - (rt.lastWordBurstTs || 0) >= 320) {
          const wEl = rt.stageEl.querySelector('.vb-word[data-word-idx="' + wordIdx + '"]');
          if (wEl) {
            const r = wEl.getBoundingClientRect();
            const cx = r.left + r.width / 2;
            const cy = r.top + r.height / 2;
            for (let i = 0; i < 3; i++) {
              const angle = (Math.PI * 2 / 3) * i + (Math.random() - 0.5) * 0.6;
              const dist = 16 + Math.random() * 6;
              spawnFlyer(cx, cy, {
                round: Math.random() < 0.5,
                color: BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)],
                dx: Math.cos(angle) * dist,
                dy: Math.sin(angle) * dist,
                rot: (Math.random() < 0.5 ? -1 : 1) * (120 + Math.random() * 180),
                dur: 0.7 + Math.random() * 0.15,
              });
            }
            rt.lastWordBurstTs = nowTs;
          }
        }
      }
      rt.lastWordIdx = wordIdx;

      // scrub fill + time label.
      if (rt.fillEl && dur > 0) {
        const pct = Math.max(0, Math.min(100, (t / dur) * 100));
        rt.fillEl.style.width = pct + "%";
      }
      if (rt.timeEl) {
        const dStr = dur > 0 ? vbFmtTime(dur) : "—:—";
        rt.timeEl.textContent = vbFmtTime(t) + " / " + dStr;
      }
    }

    // ---- marker-style triggers (banner + corner) ---------------------------
    // mount the banner overlay inside the current session's stage and animate
    // it in→hold→out. existing banner (if any) is removed first so back-to-back
    // marker beats don't stack. respects reduced-motion (just fade).
    function triggerMarkerBanner(sessionKey, beatIdx, beat) {
      const rt = videoRuntime.get(sessionKey);
      if (!rt || !rt.stageEl || !beat || !beat.marker) return;
      // remove any prior banner immediately so we don't stack two overlays.
      const prior = rt.stageEl.querySelector(":scope > .video-banner");
      if (prior) prior.remove();
      const banner = document.createElement("div");
      banner.className = "video-banner " + beat.marker;
      const labelText = String(markerLabelFor(beat.marker) || "").toLowerCase().replace(/_/g, " ");
      const labelSpan = document.createElement("div");
      labelSpan.className = "vbn-label";
      labelSpan.textContent = labelText;
      const textSpan = document.createElement("div");
      textSpan.className = "vbn-text";
      textSpan.textContent = String(beat.text || "");
      banner.appendChild(labelSpan);
      banner.appendChild(textSpan);
      rt.stageEl.appendChild(banner);

      const removeBanner = () => { try { banner.remove(); } catch {} };
      const reduce = reduceMotionOn();
      if (typeof gsap === "undefined") {
        // no gsap — just show then hide via setTimeout.
        setTimeout(removeBanner, reduce ? 900 : 1500);
        return;
      }
      if (reduce) {
        gsap.fromTo(banner,
          { opacity: 0 },
          { opacity: 1, duration: 0.15, ease: "none",
            onComplete: () => {
              gsap.to(banner, {
                opacity: 0, duration: 0.15, ease: "none", delay: 0.9,
                onComplete: removeBanner,
              });
            },
          });
        return;
      }
      gsap.fromTo(banner,
        { yPercent: -100, opacity: 0 },
        { yPercent: 0, opacity: 1, duration: 0.24, ease: "power3.out",
          onComplete: () => {
            gsap.to(banner, {
              yPercent: -100, opacity: 0,
              duration: 0.24, ease: "power3.in", delay: 1.1,
              onComplete: removeBanner,
            });
          },
        });
    }

    // mount/refresh the corner glyph in the head row, set --marker-tint on the
    // pane, pulse the glyph, and play a short audio cue. cleared by
    // clearMarkerCorner() when the active beat loses its marker.
    function triggerMarkerCorner(sessionKey, beatIdx, beat) {
      const rt = videoRuntime.get(sessionKey);
      if (!rt || !beat || !beat.marker) return;
      const head = dVideoPane.querySelector(".video-pane-head");
      if (!head) return;
      // remove any existing corner so we don't accumulate stale glyphs.
      const prior = head.querySelector(".video-marker-corner");
      if (prior) prior.remove();
      const labelText = String(markerLabelFor(beat.marker) || "").toLowerCase().replace(/_/g, " ");
      const glyph = MARKER_CORNER_GLYPHS[beat.marker] || MARKER_CORNER_GLYPHS.NOTE;
      const corner = document.createElement("span");
      corner.className = "video-marker-corner " + beat.marker;
      corner.innerHTML = glyph + '<span>' + escapeHtml(labelText) + '</span>';
      // insert before the duration pill so order reads: label · status · picker · corner · duration.
      const duration = head.querySelector(".video-duration");
      if (duration) head.insertBefore(corner, duration);
      else head.appendChild(corner);

      // tint the active-word highlight via CSS variable on the pane container.
      const colors = MARKER_COLORS[beat.marker];
      if (colors && colors.bg) {
        dVideoPane.style.setProperty("--marker-tint", colors.bg);
      } else {
        // NOTE doesn't tint — let the default accent-mix come through.
        dVideoPane.style.removeProperty("--marker-tint");
      }

      // pulse + audio cue. both gated on reduced-motion (cue silenced too).
      if (typeof gsap !== "undefined" && !reduceMotionOn()) {
        gsap.fromTo(corner,
          { scale: 1.0 },
          { scale: 1.15, duration: 0.11, ease: "back.out(2)", yoyo: true, repeat: 1, transformOrigin: "center" }
        );
      }
      playMarkerCue();
    }
    function clearMarkerCorner(sessionKey) {
      const rt = videoRuntime.get(sessionKey);
      if (!rt) return;
      const head = dVideoPane.querySelector(".video-pane-head");
      if (head) {
        const corner = head.querySelector(".video-marker-corner");
        if (corner) corner.remove();
      }
      try { dVideoPane.style.removeProperty("--marker-tint"); } catch {}
    }

    // ---- marker-style triggers (stamp + ticker + halo) ---------------------
    // mount an inline rubber-stamp svg at the start of the marked beat. the
    // stamp lives inside the beat element, ahead of the word-spans; the beat
    // gets .has-marker-stamp so it lays out as flex-row. on a re-fire (new
    // beat) any prior stamp on a sibling beat is cleared. animation: scale-in
    // from 1.6 + rotate(-8deg) → settle to scale 1 + rotate 2deg with a
    // back.out bounce. reduced-motion: opacity fade-in only.
    function triggerMarkerStamp(rt, beatIdx, beat) {
      if (!rt || !rt.stageEl || !beat || !beat.marker) return;
      // strip any prior stamp from sibling beats — only the active marked
      // beat carries a stamp at any given time.
      rt.stageEl.querySelectorAll(".video-stamp").forEach(el => { try { el.remove(); } catch {} });
      rt.stageEl.querySelectorAll(".video-beat.has-marker-stamp").forEach(el => {
        el.classList.remove("has-marker-stamp");
      });
      const beatEl = rt.stageEl.querySelector('.video-beat[data-beat-idx="' + beatIdx + '"]');
      if (!beatEl) return;
      const colors = MARKER_COLORS[beat.marker] || { bg: "#fde68a", fg: "#78350f" };
      const bg = colors.bg || "#ffffff";
      const fg = colors.fg || "#1a1a1f";
      const labelText = String(markerLabelFor(beat.marker) || "").toLowerCase().replace(/_/g, " ");
      // round-ish svg stamp: outer ring, dashed inner ring, mono label text.
      // colours come from MARKER_COLORS so the stamp reads as "this marker's
      // tint, dialled up". inline svg keeps it zero-asset.
      const stamp = document.createElement("span");
      stamp.className = "video-stamp";
      stamp.setAttribute("data-marker", beat.marker);
      stamp.innerHTML =
        '<svg viewBox="0 0 64 64" aria-hidden="true">' +
          '<circle cx="32" cy="32" r="28" fill="' + bg + '" stroke="' + fg + '" stroke-width="2.5"/>' +
          '<circle cx="32" cy="32" r="22" fill="none" stroke="' + fg + '" stroke-width="1" stroke-dasharray="2 2"/>' +
          '<text class="vst-text" x="32" y="33" fill="' + fg + '">' + escapeHtml(labelText) + '</text>' +
        '</svg>';
      beatEl.classList.add("has-marker-stamp");
      // mount as the first child so the stamp sits before the word-spans.
      if (beatEl.firstChild) beatEl.insertBefore(stamp, beatEl.firstChild);
      else beatEl.appendChild(stamp);

      const reduce = reduceMotionOn();
      if (typeof gsap === "undefined") return;
      if (reduce) {
        gsap.fromTo(stamp, { opacity: 0 }, { opacity: 1, duration: 0.18, ease: "none" });
        return;
      }
      gsap.fromTo(stamp,
        { scale: 1.6, rotate: -8, opacity: 0 },
        { scale: 1.0, rotate: 2, opacity: 1, duration: 0.32, ease: "back.out(2.4)", transformOrigin: "center" }
      );
    }

    // append a marker pill to the per-stage ticker track and animate it from
    // the right edge to the left across ~1.4s. multiple markers stack via
    // rt.tickerQueueEndAt: a new pill starts ~700ms after the previous one's
    // entrance kicked off, so they ride the bottom in sequence instead of
    // stomping each other. each pill self-removes on tween completion.
    // reduced-motion: park the pill on the right and cross-fade in/out.
    function triggerMarkerTicker(rt, beat, beatText) {
      if (!rt || !rt.stageEl || !beat || !beat.marker) return;
      // find/create the per-stage ticker track. it sits inside .video-pane-stage
      // (which is position:relative) so it inherits the stage clipping bounds.
      let track = rt.stageEl.querySelector(":scope > .video-ticker-track");
      if (!track) {
        track = document.createElement("div");
        track.className = "video-ticker-track";
        rt.stageEl.appendChild(track);
      }
      const labelText = String(markerLabelFor(beat.marker) || "").toLowerCase().replace(/_/g, " ");
      const pill = document.createElement("div");
      pill.className = "video-ticker " + beat.marker;
      pill.innerHTML =
        '<span class="vtk-label">' + escapeHtml(labelText) + '</span>' +
        '<span class="vtk-text">' + escapeHtml(String(beatText || "")) + '</span>';
      track.appendChild(pill);

      const reduce = reduceMotionOn();
      const removePill = () => { try { pill.remove(); } catch {} };
      if (typeof gsap === "undefined") {
        // no gsap — keep the pill visible for ~1.4s then drop it.
        setTimeout(removePill, 1400);
        return;
      }
      if (reduce) {
        // park at the right edge and cross-fade — no horizontal scroll under
        // reduced-motion.
        pill.style.right = "12px";
        pill.style.left = "auto";
        gsap.fromTo(pill,
          { opacity: 0 },
          { opacity: 1, duration: 0.18, ease: "none",
            onComplete: () => {
              gsap.to(pill, { opacity: 0, duration: 0.18, ease: "none", delay: 1.0, onComplete: removePill });
            },
          });
        return;
      }
      // queue: start ~700ms after the most-recently scheduled pill entered.
      const now = (typeof performance !== "undefined" && performance.now) ? performance.now() : Date.now();
      const delayMs = Math.max(0, (rt.tickerQueueEndAt || 0) - now);
      rt.tickerQueueEndAt = now + delayMs + 700;
      const delaySec = delayMs / 1000;
      // park at left:100% (off the right edge) then translate left by the
      // pill width plus track width — that exits off the left edge.
      pill.style.left = "100%";
      gsap.fromTo(pill,
        { x: 0, opacity: 1 },
        {
          x: () => -(pill.offsetWidth + (track.offsetWidth || 0)),
          duration: 1.4,
          delay: delaySec,
          ease: "power1.inOut",
          onComplete: removePill,
        });
    }

    // tween the active beat's box-shadow from transparent → coloured halo →
    // back to transparent across the beat's full duration. colour comes from
    // MARKER_COLORS[beat.marker] (NOTE falls back to soft yellow so the cue
    // stays visible). reduced-motion: hold a static soft glow for the beat's
    // life, no shadow tween.
    function applyMarkerHalo(rt, beatIdx, beat) {
      if (!rt || !rt.stageEl || !beat || !beat.marker) return;
      // only one beat halos at a time — clear any halo on sibling beats.
      rt.stageEl.querySelectorAll(".video-beat.video-halo").forEach(el => {
        if (typeof gsap !== "undefined") gsap.killTweensOf(el);
        el.classList.remove("video-halo");
        el.style.boxShadow = "";
      });
      const beatEl = rt.stageEl.querySelector('.video-beat[data-beat-idx="' + beatIdx + '"]');
      if (!beatEl) return;
      beatEl.classList.add("video-halo");

      const colors = MARKER_COLORS[beat.marker];
      const baseColor = (colors && colors.bg) ? colors.bg : "#fde68a";
      // ~60% alpha overlay via color-mix so the halo blends with the page.
      const haloColor = "color-mix(in oklab, " + baseColor + " 60%, transparent)";
      const transparent = "0 0 0 0 transparent";

      const bb = (rt.beatBoundaries || [])[beatIdx];
      const beatDurMs = (bb && isFinite(bb.endS) && isFinite(bb.startS) && bb.endS > bb.startS)
        ? Math.max(400, (bb.endS - bb.startS) * 1000)
        : 1800;
      const halfSec = (beatDurMs / 1000) / 2;

      const reduce = reduceMotionOn();
      if (typeof gsap === "undefined" || reduce) {
        // static soft glow for the beat life; cleared by clearMarkerHalo or
        // by the next halo apply.
        beatEl.style.boxShadow = "0 0 24px 4px " + haloColor;
        return;
      }
      gsap.fromTo(beatEl,
        { boxShadow: transparent },
        {
          boxShadow: "0 0 36px 8px " + haloColor,
          duration: halfSec,
          ease: "sine.inOut",
          onComplete: () => {
            gsap.to(beatEl, {
              boxShadow: transparent,
              duration: halfSec,
              ease: "sine.inOut",
            });
          },
        });
    }
    function clearMarkerHalo(rt) {
      if (!rt || !rt.stageEl) return;
      rt.stageEl.querySelectorAll(".video-beat.video-halo").forEach(el => {
        if (typeof gsap !== "undefined") gsap.killTweensOf(el);
        el.classList.remove("video-halo");
        el.style.boxShadow = "";
      });
    }

    // make a session key safe for use in an html id (sessions are keyed on
    // "source:absolute/path", which contains characters css selectors hate).
    function cssIdSafe(s) {
      return String(s).replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    function refresh() {
      renderInbox();
      renderDetail();
    }
    window.addEventListener("hashchange", () => {
      const sid = selectedSessionId();
      if (sid) markViewed(sid);
      refresh();
    });
    (() => { const sid = selectedSessionId(); if (sid) markViewed(sid); })();

    setInterval(refresh, 5000);

    function upsertSession(snap) {
      if (!snap || !snap.info) return;
      const key = keyForSnapshot(snap);
      sessionsByKey.set(key, {
        key,
        info: snap.info,
        events: Array.isArray(snap.events) ? snap.events.slice() : [],
        threads: Array.isArray(snap.threads) ? snap.threads.slice() : [],
        lastEventTs: snap.lastEventTs || 0,
        model: snap.model,
        contextTokens: snap.contextTokens || 0,
        totalOutputTokens: snap.totalOutputTokens || 0,
        observerDecisions: Array.isArray(snap.observerDecisions) ? snap.observerDecisions.slice() : [],
        displayName: snap.displayName || null,
      });
      // chat thread + status come alongside the snapshot — restore on hello
      // so a page reload doesn't wipe a live conversation.
      if (Array.isArray(snap.chatThread) && snap.chatThread.length) {
        chatThreadByKey.set(key, snap.chatThread.slice());
      }
      if (snap.chatStatus && typeof snap.chatStatus.status === "string") {
        chatStatusByKey.set(key, { status: snap.chatStatus.status, message: snap.chatStatus.message, ts: snap.chatStatus.ts || 0 });
      }
      // hydrate scriptifier scripts — the server's snapshot() includes a
      // `scripts` map keyed by turnId. merge into our local map so a reload
      // doesn't lose recently-narrated turns.
      if (snap.scripts && typeof snap.scripts === "object") {
        const m = scriptsByKey.get(key) || new Map();
        for (const [turnId, script] of Object.entries(snap.scripts)) {
          m.set(turnId, script);
        }
        scriptsByKey.set(key, m);
      }
      // hydrate per-session mp4 export status (from snapshot.exports). same
      // turnId-keyed shape as scripts; lets a reload pick up an in-flight
      // render without re-POSTing /debug/export-script.
      if (snap.exports && typeof snap.exports === "object") {
        const em = exportsByKey.get(key) || new Map();
        for (const [turnId, ep] of Object.entries(snap.exports)) {
          em.set(turnId, ep);
        }
        exportsByKey.set(key, em);
      }
      // hydrate per-session voice override. snapshot.voice always carries the
      // resolved voice (override OR server default), so unconditional set is
      // fine — picker stays in sync with whichever voice the next turn'll use.
      if (typeof snap.voice === "string" && VOICE_IDS.includes(snap.voice)) {
        voiceBySessionKey.set(key, snap.voice);
      }
      // hydrate per-session bookmarks. snapshot.bookmarks is { turnId: [idx,…] }
      // with arrays already sorted ascending; mirror straight into the local
      // Map so a refresh repaints chips + filled-icon state without waiting
      // for a fresh ws msg.
      if (snap.bookmarks && typeof snap.bookmarks === "object") {
        let m = bookmarksByKey.get(key);
        if (!m) { m = new Map(); bookmarksByKey.set(key, m); }
        for (const [turnId, list] of Object.entries(snap.bookmarks)) {
          if (Array.isArray(list)) m.set(turnId, list.slice());
        }
      }
    }

    function appendEvent(sessionKey, ev) {
      const s = sessionsByKey.get(sessionKey);
      if (!s) return false;
      s.events.push(ev);
      if (s.events.length > 6000) s.events.splice(0, s.events.length - 6000);
      if (typeof ev.ts === "number" && ev.ts > (s.lastEventTs || 0)) s.lastEventTs = ev.ts;
      if (ev.kind === "assistant_text") {
        if (ev.model) s.model = ev.model;
        if (typeof ev.inputTokens === "number") s.contextTokens = ev.inputTokens;
        if (typeof ev.tokens === "number") s.totalOutputTokens = (s.totalOutputTokens || 0) + ev.tokens;
      }
      return true;
    }

    function appendThread(sessionKey, thread) {
      const s = sessionsByKey.get(sessionKey);
      if (!s) return false;
      s.threads.push(thread);
      return true;
    }

    // recover from a stale URL hash: if `#session/<sid>` points at a sid the
    // server no longer has (e.g. after a server restart, or after the user
    // navigates from a bookmark to a session that's since been pruned), drop
    // the hash silently. earlier we tried reloading on every upstream agent
    // message but that nuked in-progress chat-agent threads on every cc
    // reply — the chat-agent state is server-side, but the textarea draft +
    // expand state are browser-side, and a reload mid-typing is brutal.
    function maybeRecoverStaleHash() {
      const sid = selectedSessionId();
      if (!sid) return;
      const known = new Set();
      for (const s of sessionsByKey.values()) {
        if (s?.info?.sessionId) known.add(s.info.sessionId);
      }
      if (!known.has(sid)) {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }

    function connect() {
      const ws = new WebSocket("ws://" + location.host + "/ws");
      ws.addEventListener("open", () => { reconnectIndicator.hidden = true; });
      ws.addEventListener("message", e => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.kind === "hello") {
          if (typeof msg.autoSendEnabled === "boolean") {
            autoSendEnabled = msg.autoSendEnabled;
            paintAutoSend();
          }
          if (typeof msg.scriptStyle === "string" && VIDEO_SCRIPT_STYLES.includes(msg.scriptStyle)) {
            // server is the source of truth — overwrite the localStorage seed.
            setScriptStyleLocal(msg.scriptStyle);
          }
          if (typeof msg.markerVocab === "string" && VIDEO_MARKER_VOCABS.includes(msg.markerVocab)) {
            // server is the source of truth when it ships the field; otherwise
            // the localStorage seed wins (server may pre-date this addition).
            setMarkerVocabLocal(msg.markerVocab);
          }
          sessionsByKey.clear();
          const list = Array.isArray(msg.sessions) ? msg.sessions : [];
          for (const snap of list) upsertSession(snap);
          maybeRecoverStaleHash();
          refresh();
        } else if (msg.kind === "session:upsert") {
          upsertSession(msg.session);
          refresh();
        } else if (msg.kind === "event") {
          if (appendEvent(msg.sessionKey, msg.event)) refresh();
        } else if (msg.kind === "thread:new") {
          if (appendThread(msg.sessionKey, msg.thread)) refresh();
        } else if (msg.kind === "observer:decision") {
          const s = sessionsByKey.get(msg.sessionKey);
          if (s) {
            if (!Array.isArray(s.observerDecisions)) s.observerDecisions = [];
            const idx = s.observerDecisions.findIndex(d => d.turnId === msg.decision.turnId);
            if (idx >= 0) s.observerDecisions[idx] = msg.decision;
            else s.observerDecisions.push(msg.decision);
            refresh();
          }
        } else if (msg.kind === "chat:chunk") {
          if (msg.chunk && typeof msg.chunk.role === "string" && typeof msg.chunk.text === "string") {
            let arr = chatThreadByKey.get(msg.sessionKey);
            if (!arr) { arr = []; chatThreadByKey.set(msg.sessionKey, arr); }
            arr.push({ role: msg.chunk.role, text: msg.chunk.text, ts: msg.chunk.ts || Date.now(), ...(msg.chunk.kind ? { kind: msg.chunk.kind } : {}) });
            if (arr.length > 200) arr.splice(0, arr.length - 200);
            refresh();
          }
        } else if (msg.kind === "chat:status") {
          if (typeof msg.status === "string") {
            chatStatusByKey.set(msg.sessionKey, { status: msg.status, message: msg.message, ts: msg.ts || Date.now() });
            refresh();
          }
        } else if (msg.kind === "autosend:setting") {
          if (typeof msg.enabled === "boolean") {
            autoSendEnabled = msg.enabled;
            paintAutoSend();
          }
        } else if (msg.kind === "scriptstyle:setting") {
          if (typeof msg.style === "string" && VIDEO_SCRIPT_STYLES.includes(msg.style)) {
            if (setScriptStyleLocal(msg.style)) refresh();
          }
        } else if (msg.kind === "markervocab:setting") {
          if (typeof msg.vocab === "string" && VIDEO_MARKER_VOCABS.includes(msg.vocab)) {
            if (setMarkerVocabLocal(msg.vocab)) refresh();
          }
        } else if (msg.kind === "voice:setting") {
          if (typeof msg.sessionKey === "string" && typeof msg.voice === "string" && VOICE_IDS.includes(msg.voice)) {
            const prev = voiceBySessionKey.get(msg.sessionKey);
            if (prev !== msg.voice) {
              voiceBySessionKey.set(msg.sessionKey, msg.voice);
              refresh();
            }
          }
        } else if (msg.kind === "script:beats" || msg.kind === "script:ready") {
          if (!msg.script || typeof msg.script.turnId !== "string") return;
          let m = scriptsByKey.get(msg.sessionKey);
          if (!m) { m = new Map(); scriptsByKey.set(msg.sessionKey, m); }
          m.set(msg.script.turnId, msg.script);
          refresh();
        } else if (msg.kind === "script:error") {
          const m = scriptsByKey.get(msg.sessionKey);
          if (!m) return;
          const existing = m.get(msg.turnId);
          if (existing) {
            existing.status = "error";
            existing.errorMessage = msg.message;
            refresh();
          }
        } else if (msg.kind === "export:rendering") {
          if (typeof msg.sessionKey !== "string" || typeof msg.turnId !== "string") return;
          let m = exportsByKey.get(msg.sessionKey);
          if (!m) { m = new Map(); exportsByKey.set(msg.sessionKey, m); }
          const startedTs = typeof msg.startedTs === "number" ? msg.startedTs : Date.now();
          m.set(msg.turnId, { turnId: msg.turnId, status: "rendering", ts: Date.now(), startedTs });
          refresh();
        } else if (msg.kind === "export:ready") {
          if (typeof msg.sessionKey !== "string" || typeof msg.turnId !== "string") return;
          let m = exportsByKey.get(msg.sessionKey);
          if (!m) { m = new Map(); exportsByKey.set(msg.sessionKey, m); }
          const prev = m.get(msg.turnId);
          m.set(msg.turnId, {
            turnId: msg.turnId,
            status: "ready",
            hash: typeof msg.hash === "string" ? msg.hash : undefined,
            mp4Url: typeof msg.mp4Url === "string" ? msg.mp4Url : (typeof msg.hash === "string" ? "/export/" + msg.hash + ".mp4" : undefined),
            durationS: typeof msg.durationS === "number" ? msg.durationS : undefined,
            bytes: typeof msg.bytes === "number" ? msg.bytes : undefined,
            ts: Date.now(),
            startedTs: prev ? prev.startedTs : Date.now(),
          });
          refresh();
        } else if (msg.kind === "bookmark:setting") {
          if (typeof msg.sessionKey !== "string" || typeof msg.turnId !== "string") return;
          const list = Array.isArray(msg.bookmarks) ? msg.bookmarks.filter(n => typeof n === "number") : [];
          setBookmarksForKey(msg.sessionKey, msg.turnId, list);
          refresh();
        } else if (msg.kind === "export:error") {
          if (typeof msg.sessionKey !== "string" || typeof msg.turnId !== "string") return;
          let m = exportsByKey.get(msg.sessionKey);
          if (!m) { m = new Map(); exportsByKey.set(msg.sessionKey, m); }
          const prev = m.get(msg.turnId);
          m.set(msg.turnId, {
            turnId: msg.turnId,
            status: "error",
            errorMessage: typeof msg.message === "string" ? msg.message : "render failed",
            ts: Date.now(),
            startedTs: prev ? prev.startedTs : Date.now(),
          });
          refresh();
        }
      });
      ws.addEventListener("close", () => {
        reconnectIndicator.hidden = false;
        setTimeout(connect, 1000);
      });
      ws.addEventListener("error", () => {
        reconnectIndicator.hidden = false;
      });
    }

    connect();
    refresh();
  </script>
</body>
</html>
