<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>chunk-to-chat</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #fafafb;
      --surface: #ffffff;
      --fg: #1a1a1f;
      --fg-soft: #6e6e7a;
      --fg-muted: #9090a0;
      --border: #e7e7ec;
      --border-strong: #d4d4dd;
      --accent: #6366f1;
      --accent-hover: #4f52e0;
      --accent-soft: #eef0fe;
      --coral: #ef5e5e;
      --coral-soft: #fdecec;
      --term-bg: #15151c;
      --term-fg: #e5e5ee;
      --term-prompt: #a8aafd;
      --term-muted: #65657a;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .app-header {
      max-width: 880px;
      margin: 0 auto;
      padding: 56px 24px 16px;
    }
    .app-header h1 {
      font-size: 26px;
      font-weight: 600;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }
    .app-header .tag {
      font-size: 13px;
      color: var(--fg-soft);
      margin: 0;
    }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px 24px 96px;
    }
    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 12px;
    }

    /* inbox */
    .cards { display: grid; gap: 16px; }
    .empty-inbox {
      text-align: center;
      padding: 56px 24px;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 14px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
    }

    .card {
      display: block;
      text-decoration: none;
      color: var(--fg);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      transition: border-color 0.12s, transform 0.12s, box-shadow 0.12s;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px -10px rgba(99, 102, 241, 0.25);
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
      gap: 12px;
    }
    .card-head h3 {
      font-size: 17px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .badge {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .badge.light { background: var(--accent-soft); color: var(--accent); }
    .badge.medium { background: var(--accent-soft); color: var(--accent); }
    .badge.heavy { background: var(--coral-soft); color: var(--coral); }
    .card .source {
      font-size: 12px;
      color: var(--fg-soft);
      margin: 0 0 18px;
      font-family: var(--mono);
    }
    .kv {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }
    .kv .k {
      font-size: 11px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }
    .kv .v {
      font-size: 14px;
      color: var(--fg);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rhythm { margin: 14px 0 4px; }
    .rhythm-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 36px;
    }
    .bar {
      flex: 1;
      min-width: 6px;
      max-width: 28px;
      border-radius: 2px 2px 0 0;
      background: var(--accent-soft);
      transition: background 0.12s;
    }
    .bar.user { background: var(--accent-soft); }
    .bar.agent { background: var(--accent); opacity: 0.8; }
    .bar.agent.latest { background: var(--coral); opacity: 1; }
    .rhythm-label {
      font-size: 11px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 8px;
    }
    .card-action {
      font-size: 13px;
      color: var(--accent);
      margin-top: 16px;
      text-align: right;
      font-weight: 500;
    }

    /* detail page */
    .back {
      display: inline-block;
      font-size: 13px;
      color: var(--fg-soft);
      text-decoration: none;
      margin-bottom: 24px;
      font-family: var(--mono);
    }
    .back:hover { color: var(--accent); }

    .session-head {
      margin-bottom: 32px;
    }
    .session-head h2 {
      font-size: 26px;
      font-weight: 600;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }
    .session-head .source {
      font-size: 13px;
      color: var(--fg-soft);
      margin: 0;
      font-family: var(--mono);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: 20px;
    }
    .panel .label {
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 10px;
    }
    .prose {
      font-size: 15px;
      color: var(--fg);
      margin: 0;
    }
    .prose.muted {
      color: var(--fg-soft);
      font-style: italic;
    }
    .constraints {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px dashed var(--border);
    }

    .terminal {
      background: var(--term-bg);
      color: var(--term-fg);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      padding: 18px 22px;
      border-radius: 10px;
      max-height: 360px;
      overflow-y: auto;
      margin: 0 0 20px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .terminal .prompt { color: var(--term-prompt); user-select: none; }
    .terminal.empty .prose-block { color: var(--term-muted); font-style: italic; }

    .load-line {
      font-size: 14px;
      color: var(--fg-soft);
      margin: 0 0 24px;
      padding-left: 4px;
    }
    .load-line strong { color: var(--fg); font-weight: 500; }

    .cta {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 22px 24px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: -0.005em;
      transition: background 0.12s, transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 6px 20px -10px rgba(99, 102, 241, 0.5);
    }
    .cta:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px -12px rgba(99, 102, 241, 0.6);
    }
    .cta:disabled {
      background: var(--border-strong);
      color: var(--fg-soft);
      cursor: not-allowed;
      box-shadow: none;
    }
    .cta .sub {
      display: block;
      font-size: 12px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 4px;
    }

    code, .mono { font-family: var(--mono); font-size: 13px; }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>chunk-to-chat</h1>
    <p class="tag">passive review layer for agent sessions</p>
  </header>

  <main id="view-inbox">
    <h2 class="section-label">sessions</h2>
    <div class="cards" id="cards">
      <div class="empty-inbox" id="inbox-empty">no active session detected — start claude code in a project</div>
    </div>
  </main>

  <main id="view-detail" hidden>
    <a class="back" href="#">← sessions</a>
    <div class="session-head">
      <h2 id="d-name">—</h2>
      <p class="source"><span id="d-source">claude-code</span> · <span id="d-elapsed">—</span></p>
    </div>

    <div class="panel">
      <p class="label">what happened so far</p>
      <p class="prose muted" id="d-summary">running summary lands in phase 3.</p>
      <div class="constraints" id="d-constraints" hidden>
        <p class="label">remembered constraints</p>
        <p class="prose" id="d-constraints-text"></p>
      </div>
    </div>

    <p class="label section-label" style="margin-top: 28px;">latest model output</p>
    <pre class="terminal empty" id="d-latest"><span class="prompt">$ </span><span class="prose-block">no output yet</span></pre>

    <p class="load-line">review load: <strong id="d-load">—</strong></p>

    <button class="cta" id="cta-break" disabled>
      break it down
      <span class="sub">one piece at a time</span>
    </button>
  </main>

  <script>
    // dom
    const inboxEl = document.getElementById("view-inbox");
    const detailEl = document.getElementById("view-detail");
    const cardsEl = document.getElementById("cards");
    const inboxEmpty = document.getElementById("inbox-empty");
    const dName = document.getElementById("d-name");
    const dElapsed = document.getElementById("d-elapsed");
    const dSummary = document.getElementById("d-summary");
    const dLatest = document.getElementById("d-latest");
    const dLoad = document.getElementById("d-load");
    const dBreak = document.getElementById("cta-break");

    // state
    let session = null;
    let events = [];
    let threads = [];
    let sessionStartTs = null;

    // utils
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }
    function clip(s, n) {
      s = String(s || "");
      return s.length > n ? s.slice(0, n) + "…" : s;
    }
    function sessionName(s) {
      if (!s || !s.slug) return "—";
      // -Users-oronans-workspace-reelmaker → reelmaker
      // -Users-oronans-workspace → workspace
      const parts = s.slug.replace(/^-+/, "").split("-");
      return parts[parts.length - 1] || s.slug;
    }
    function sourceLine() {
      return "claude-code · " + fmtElapsed();
    }
    function fmtElapsed() {
      if (sessionStartTs == null) return "—";
      const ms = Date.now() - sessionStartTs;
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h) return h + "h " + m + "m";
      if (m) return m + "m";
      return s + "s";
    }

    // derive turns from raw events (mirrors src/turns.ts)
    function deriveTurns(evs) {
      const turns = [];
      let cur = null;
      const close = () => { if (cur) { turns.push(cur); cur = null; } };
      for (const ev of evs) {
        if (ev.kind === "user_message") {
          close();
          cur = {
            id: ev.uuid,
            startTs: ev.ts,
            endTs: ev.ts,
            userText: ev.text || "",
            userChars: (ev.text || "").length,
            agentText: "",
            agentChars: 0,
            agentTokens: 0,
            toolUses: 0,
          };
        } else if (cur) {
          cur.endTs = ev.ts;
          if (ev.kind === "assistant_text") {
            cur.agentText += (cur.agentText ? "\n\n" : "") + (ev.text || "");
            cur.agentChars += (ev.text || "").length;
            if (typeof ev.tokens === "number") cur.agentTokens += ev.tokens;
          } else if (ev.kind === "tool_use") {
            cur.toolUses += 1;
          } else if (ev.kind === "stop") {
            close();
          }
        }
      }
      if (cur) turns.push(cur);
      return turns;
    }

    function rhythmBars(turns) {
      const last = turns.slice(-6);
      const items = [];
      for (const t of last) {
        items.push({ kind: "user", weight: t.userChars });
        const agentWeight = t.agentChars + t.toolUses * 200;
        items.push({ kind: "agent", weight: agentWeight });
      }
      const max = Math.max(40, ...items.map(it => it.weight));
      return items.map((it, i) => ({
        kind: it.kind,
        height: 14 + Math.round((it.weight / max) * 86),
        latest: i === items.length - 1 && it.kind === "agent",
      }));
    }

    function reviewLoad(turns, threads) {
      const items = threads.length;
      let severity;
      if (items === 0) severity = "light";
      else if (items <= 2) severity = "light";
      else if (items <= 5) severity = "medium";
      else severity = "heavy";
      const text = items === 1 ? "1 item" : items + " items";
      return { severity, text, items };
    }

    function latestThreadHint() {
      if (threads.length === 0) return "—";
      const t = threads[threads.length - 1];
      return t.hint || t.trigger?.reason || "—";
    }

    // render inbox (one card for the active session)
    function renderInbox() {
      if (!session) {
        cardsEl.innerHTML = "";
        cardsEl.appendChild(inboxEmpty);
        inboxEmpty.hidden = false;
        return;
      }
      cardsEl.innerHTML = "";
      const turns = deriveTurns(events);
      const load = reviewLoad(turns, threads);
      const bars = rhythmBars(turns);
      const card = document.createElement("a");
      card.className = "card";
      card.href = "#session/" + session.sessionId;

      const barsHtml = bars.map(b =>
        '<div class="bar ' + b.kind + (b.latest ? " latest" : "") + '" style="height: ' + b.height + '%"></div>'
      ).join("");

      card.innerHTML =
        '<div class="card-head">' +
          '<h3>' + escapeHtml(sessionName(session)) + '</h3>' +
          '<span class="badge ' + load.severity + '">' + load.severity + '</span>' +
        '</div>' +
        '<p class="source">' + escapeHtml(sourceLine()) + '</p>' +
        '<div class="kv"><div class="k">latest</div>' +
          '<div class="v">' + escapeHtml(clip(latestThreadHint(), 70)) + '</div></div>' +
        '<div class="kv"><div class="k">review load</div>' +
          '<div class="v">' + load.severity + ' · ' + escapeHtml(load.text) + '</div></div>' +
        (bars.length > 0 ?
          '<div class="rhythm"><div class="rhythm-bars">' + barsHtml + '</div>' +
          '<div class="rhythm-label">conversation rhythm</div></div>' : '') +
        '<div class="card-action">open session →</div>';
      cardsEl.appendChild(card);
    }

    function renderDetail() {
      if (!session) {
        location.hash = "";
        return;
      }
      dName.textContent = sessionName(session);
      dElapsed.textContent = fmtElapsed();
      const turns = deriveTurns(events);
      const load = reviewLoad(turns, threads);
      dLoad.innerHTML = load.severity + ' · ' + escapeHtml(load.text);

      // latest model output: most recent triggered thread's agent text
      const latestThread = threads[threads.length - 1];
      if (latestThread) {
        const turn = turns.find(t => t.id === latestThread.turnId);
        const text = turn?.agentText || latestThread.hint || "";
        if (text) {
          dLatest.classList.remove("empty");
          dLatest.innerHTML = '<span class="prompt">$ </span>' + escapeHtml(text);
          dBreak.disabled = false;
        }
      } else {
        dLatest.classList.add("empty");
        dLatest.innerHTML = '<span class="prompt">$ </span><span class="prose-block">no output yet</span>';
        dBreak.disabled = true;
      }
    }

    function showInbox() {
      inboxEl.hidden = false;
      detailEl.hidden = true;
      renderInbox();
    }
    function showDetail() {
      inboxEl.hidden = true;
      detailEl.hidden = false;
      renderDetail();
    }

    function route() {
      const h = location.hash || "";
      if (h.startsWith("#session/")) showDetail();
      else showInbox();
    }
    window.addEventListener("hashchange", route);

    function refresh() {
      if (detailEl.hidden) renderInbox();
      else renderDetail();
    }
    setInterval(refresh, 30000);

    function setSession(info) {
      if (!info) return;
      session = info;
      if (sessionStartTs == null) sessionStartTs = Date.now();
      refresh();
    }

    function connect() {
      const ws = new WebSocket("ws://" + location.host + "/ws");
      ws.addEventListener("message", e => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.kind === "hello") {
          if (msg.session) setSession(msg.session);
          events = Array.isArray(msg.events) ? msg.events : [];
          threads = Array.isArray(msg.threads) ? msg.threads : [];
          refresh();
        } else if (msg.kind === "session") {
          setSession(msg.session);
        } else if (msg.kind === "event") {
          events.push(msg.event);
          if (events.length > 6000) events.splice(0, events.length - 6000);
          refresh();
        } else if (msg.kind === "thread:new") {
          threads.push(msg.thread);
          refresh();
        }
      });
      ws.addEventListener("close", () => setTimeout(connect, 1000));
    }

    connect();
    route();
  </script>
</body>
</html>
