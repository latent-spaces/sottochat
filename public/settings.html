<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>settings · sottochat</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: oklch(98.4% 0.009 350);
      --surface: oklch(99.2% 0.006 350);
      --surface-soft: oklch(97.1% 0.012 350);
      --fg: oklch(23% 0.012 300);
      --fg-soft: oklch(49% 0.016 300);
      --fg-muted: oklch(62% 0.017 300);
      --border: oklch(92.5% 0.013 350);
      --border-strong: oklch(86.8% 0.018 350);
      --accent: oklch(65.5% 0.214 354);
      --accent-hover: oklch(58.5% 0.218 354);
      --accent-soft: oklch(94.8% 0.042 354);
      --success: oklch(52% 0.12 153);
      --warning: oklch(55% 0.13 63);
      --danger: oklch(52% 0.19 24);
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      --r-input: 8px;
      --r-panel: 14px;
      --r-pill: 999px;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html { scroll-behavior: smooth; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select { font: inherit; }
    button, a, input, select { -webkit-tap-highlight-color: transparent; }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 56px;
      padding: 8px 24px;
      background: color-mix(in oklch, var(--bg) 90%, transparent);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .nav-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .nav-logo { width: 32px; height: 32px; flex: 0 0 auto; }
    .nav-wordmark {
      color: var(--accent);
      font-size: 20px;
      font-weight: 650;
      letter-spacing: -0.02em;
      text-decoration: none;
    }
    .nav-tag { color: var(--fg-soft); font-size: 12px; white-space: nowrap; }
    .back-link {
      min-height: 40px;
      padding: 7px 13px 7px 10px;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-pill);
      color: var(--fg);
      background: var(--surface);
      font-size: 13px;
      font-weight: 650;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: border-color 180ms var(--ease-out), background 180ms var(--ease-out);
    }
    .back-link:hover { border-color: var(--accent); background: var(--accent-soft); }
    .back-arrow { color: var(--accent-hover); font: 700 17px/1 var(--sans); }

    main {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 60px 0 104px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border-strong);
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-hover);
      font: 600 10px/1.2 var(--mono);
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: -0.035em;
      font-weight: 650;
    }
    .page-intro {
      max-width: 67ch;
      margin: 10px 0 0;
      color: var(--fg-soft);
      font-size: 14px;
    }
    .storage-chip {
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: var(--r-pill);
      background: var(--surface-soft);
      color: var(--fg-muted);
      font: 10px/1.2 var(--mono);
      white-space: nowrap;
    }

    .status-line {
      min-height: 24px;
      margin: 15px 0 0;
      color: var(--success);
      font: 550 11px/1.4 var(--mono);
    }
    .status-line.error { color: var(--danger); }

    .settings-layout {
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr);
      gap: 40px;
      align-items: start;
      margin-top: 18px;
    }

    .settings-sidebar {
      position: sticky;
      top: 82px;
      padding-top: 18px;
    }
    .index-label {
      margin: 0 0 9px;
      color: var(--fg-muted);
      font: 600 10px/1.2 var(--mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .settings-index { display: grid; gap: 2px; }
    .index-link {
      min-height: 38px;
      padding: 8px 9px;
      border-radius: var(--r-input);
      color: var(--fg-soft);
      font-size: 12px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: color 160ms var(--ease-out), background 160ms var(--ease-out);
    }
    .index-link:hover { color: var(--fg); background: var(--surface-soft); }
    .index-count { color: var(--fg-muted); font: 10px/1 var(--mono); }

    .save-panel {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .change-summary {
      min-height: 34px;
      margin: 0 0 10px;
      color: var(--fg-muted);
      font-size: 11px;
      line-height: 1.45;
    }
    .change-summary.dirty { color: var(--fg-soft); }
    .save-button {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--accent);
      border-radius: var(--r-input);
      background: var(--accent);
      color: oklch(99% 0.006 350);
      font-size: 13px;
      font-weight: 650;
      cursor: pointer;
      transition: background 180ms var(--ease-out), border-color 180ms var(--ease-out), opacity 180ms var(--ease-out);
    }
    .save-button:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
    .save-button:disabled { cursor: default; opacity: 0.35; }
    .restart-hint {
      margin: 9px 0 0;
      color: var(--warning);
      font: 10px/1.45 var(--mono);
    }

    .settings-root { min-width: 0; }
    .settings-section {
      scroll-margin-top: 78px;
      margin: 18px 0 28px;
      border: 1px solid var(--border);
      border-radius: var(--r-panel);
      background: var(--surface);
      overflow: hidden;
    }
    .group-head {
      padding: 21px 24px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-soft);
    }
    .group-head h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
      letter-spacing: -0.02em;
      font-weight: 650;
    }
    .group-head p { margin: 4px 0 0; color: var(--fg-muted); font-size: 12px; }

    .setting-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(260px, 0.9fr);
      gap: 28px;
      align-items: center;
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
    }
    .setting-row:last-child { border-bottom: 0; }
    .setting-row.locked { background: color-mix(in oklch, var(--surface-soft) 52%, transparent); }
    .setting-label { margin: 0; font-size: 13px; font-weight: 650; }
    .setting-description {
      max-width: 58ch;
      margin: 5px 0 0;
      color: var(--fg-soft);
      font-size: 12px;
      line-height: 1.5;
    }
    .setting-env {
      min-height: 28px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 9px;
    }
    .env-key {
      min-height: 28px;
      max-width: 100%;
      padding: 4px 7px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: var(--surface-soft);
      color: var(--fg-muted);
      font: 500 9px/1.25 var(--mono);
      cursor: pointer;
      overflow-wrap: anywhere;
      text-align: left;
      transition: border-color 160ms var(--ease-out), color 160ms var(--ease-out);
    }
    .env-key:hover { border-color: var(--border-strong); color: var(--fg); }
    .source-label { color: var(--fg-muted); font: 9px/1.3 var(--mono); }

    .setting-control { min-width: 0; }
    .control-line { display: flex; align-items: center; gap: 8px; }
    .field-wrap { position: relative; flex: 1 1 auto; min-width: 0; }
    input, select {
      width: 100%;
      min-height: 44px;
      padding: 9px 11px;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-input);
      background: var(--surface);
      color: var(--fg);
      outline: none;
      transition: border-color 160ms var(--ease-out), box-shadow 160ms var(--ease-out), background 160ms var(--ease-out);
    }
    input { font-family: var(--mono); font-size: 12px; }
    select { padding-right: 34px; cursor: pointer; font-size: 13px; }
    input:hover:not(:disabled), select:hover:not(:disabled) { border-color: color-mix(in oklch, var(--accent) 45%, var(--border-strong)); }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 15%, transparent);
    }
    input:disabled, select:disabled {
      cursor: not-allowed;
      background: var(--surface-soft);
      color: var(--fg-muted);
      opacity: 0.8;
    }
    input.has-unit { padding-right: 92px; }
    .field-unit {
      position: absolute;
      top: 50%;
      right: 11px;
      transform: translateY(-50%);
      color: var(--fg-muted);
      font: 9px/1 var(--mono);
      pointer-events: none;
    }
    .reset-button {
      flex: 0 0 auto;
      min-width: 54px;
      min-height: 40px;
      padding: 7px 8px;
      border: 1px solid transparent;
      border-radius: var(--r-input);
      background: transparent;
      color: var(--fg-muted);
      font-size: 11px;
      cursor: pointer;
      transition: color 160ms var(--ease-out), background 160ms var(--ease-out);
    }
    .reset-button:hover:not(:disabled) { color: var(--fg); background: var(--surface-soft); }
    .reset-button:disabled { cursor: not-allowed; opacity: 0.35; }

    .value-meta {
      min-height: 19px;
      margin-top: 6px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px 9px;
      color: var(--fg-muted);
      font: 9px/1.35 var(--mono);
    }
    .meta-live { color: var(--accent-hover); }
    .meta-pending { color: var(--warning); }
    .locked-note { color: var(--warning); }
    .field-error { min-height: 17px; margin: 4px 0 0; color: var(--danger); font: 10px/1.3 var(--mono); }

    .skeleton-section {
      height: 240px;
      margin: 18px 0 28px;
      border: 1px solid var(--border);
      border-radius: var(--r-panel);
      background: var(--surface);
      overflow: hidden;
      position: relative;
    }
    .skeleton-section::after {
      content: "";
      position: absolute;
      top: 28px;
      left: 24px;
      width: min(480px, 68%);
      height: 14px;
      border-radius: 6px;
      background: var(--surface-soft);
      box-shadow: 0 72px 0 var(--surface-soft), 0 144px 0 var(--surface-soft);
      animation: loading 1.1s ease-in-out infinite alternate;
    }
    @keyframes loading { to { opacity: 0.48; } }

    .load-error {
      margin-top: 18px;
      padding: 22px 24px;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-panel);
      background: var(--surface);
      color: var(--fg-soft);
    }
    .load-error strong { color: var(--fg); }

    .mobile-save { display: none; }

    .back-link:focus-visible,
    .index-link:focus-visible,
    .env-key:focus-visible,
    .reset-button:focus-visible,
    .save-button:focus-visible {
      outline: 2px solid color-mix(in oklch, var(--accent) 55%, transparent);
      outline-offset: 2px;
    }

    @media (max-width: 820px) {
      .nav-tag { display: none; }
      main { width: min(100% - 28px, 680px); padding-top: 42px; }
      .page-head { align-items: start; flex-direction: column; gap: 16px; }
      .settings-layout { grid-template-columns: 1fr; gap: 0; }
      .settings-sidebar { position: static; padding-top: 14px; }
      .settings-index {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .index-link { flex: 0 0 auto; background: var(--surface-soft); }
      .save-panel { display: none; }
      .setting-row { grid-template-columns: 1fr; gap: 15px; }
      .mobile-save {
        position: sticky;
        bottom: 0;
        z-index: 15;
        margin: 0 -14px -104px;
        padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--border);
        background: color-mix(in oklch, var(--bg) 94%, transparent);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .mobile-save .change-summary { flex: 1 1 auto; min-height: 0; margin: 0; }
      .mobile-save .save-button { width: auto; min-width: 112px; }
    }

    @media (max-width: 520px) {
      .top-nav { padding-inline: 14px; }
      .back-link { padding-right: 11px; }
      main { padding-top: 34px; }
      .storage-chip { white-space: normal; }
      .setting-row, .group-head { padding-inline: 18px; }
      .control-line { align-items: stretch; }
      .reset-button { min-width: 48px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0ms !important;
        transition-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="nav-left">
      <img class="nav-logo" src="/assets/logo.svg" alt="" />
      <a class="nav-wordmark" href="/">sottochat</a>
      <span class="nav-tag">discuss the response, answer well</span>
    </div>
    <a class="back-link" href="/" aria-label="return to sessions">
      <span class="back-arrow" aria-hidden="true">←</span>
      <span>sessions</span>
    </a>
  </header>

  <main>
    <div class="page-head">
      <div>
        <p class="eyebrow">local configuration</p>
        <h1>settings</h1>
        <p class="page-intro" id="settings-note">Edit locally. Language applies immediately; startup settings apply after a restart.</p>
      </div>
      <span class="storage-chip" id="settings-storage">~/.sottochat/settings.json</span>
    </div>

    <p class="status-line" id="settings-status" role="status" aria-live="polite"></p>

    <form id="settings-form" novalidate>
      <div class="settings-layout">
        <aside class="settings-sidebar">
          <p class="index-label">sections</p>
          <nav class="settings-index" id="settings-index" aria-label="settings sections"></nav>
          <div class="save-panel">
            <p class="change-summary" id="change-summary">no unsaved changes</p>
            <button class="save-button" id="save-settings" type="submit" disabled>save changes</button>
            <p class="restart-hint" id="restart-hint" hidden>restart pending</p>
          </div>
        </aside>

        <div class="settings-root" id="settings-root" aria-busy="true">
          <div class="skeleton-section"></div>
          <div class="skeleton-section"></div>
        </div>
      </div>

      <div class="mobile-save">
        <p class="change-summary" id="mobile-change-summary">no unsaved changes</p>
        <button class="save-button" id="mobile-save-settings" type="submit" disabled>save</button>
      </div>
    </form>
  </main>

  <script src="/assets/settings.js"></script>
</body>
</html>
