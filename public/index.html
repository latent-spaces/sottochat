<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>cut-the-cake</title>
  <link rel="icon" type="image/webp" href="/assets/logo-cake-slice.webp" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      /* paper / surface */
      --bg: #fdf9fa;
      --surface: #ffffff;
      --fg: #1a1a1f;
      --fg-soft: #6e6e7a;
      --fg-muted: #9090a0;
      --border: #efe8eb;
      --border-strong: #dcd2d6;
      --chip-tint: #f5eef1;
      /* operative voice */
      --accent: #ec4899;          /* strawberry */
      --accent-hover: #db2777;
      --accent-soft: #fce7f3;
      /* chart-only second voice */
      --plum: #a855f7;
      /* glass — top nav only */
      --glass-paper: rgba(253, 249, 250, 0.72);
      /* data colors — quarantined to code-changes chart */
      --diff-green: #10b981;
      --diff-red: #ef4444;
      /* type stacks */
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      /* radii */
      --r-input: 8px;
      --r-card: 10px;
      --r-panel: 14px;
      --r-pill: 999px;
      /* motion */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      min-height: 100vh;
    }

    /* soft ambient layers — three large blurred blobs sit behind the page,
       a sprinkle layer drifts above them but below cards. neither catches
       pointer events; both respect prefers-reduced-motion. */
    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }
    .blob-1 { width: 520px; height: 520px; background: oklch(94% 0.05 0); top: -120px; left: -160px; opacity: 0.55; }
    .blob-2 { width: 420px; height: 420px; background: oklch(94% 0.06 305); top: 40px; right: -120px; opacity: 0.5; }
    .blob-3 { width: 600px; height: 600px; background: oklch(94% 0.04 280); top: 60vh; left: 28%; opacity: 0.35; }

    .sprinkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .sprinkle {
      position: absolute;
      width: 5px;
      height: 14px;
      border-radius: 999px;
      will-change: transform;
    }
    .sprinkle.round { width: 6px; height: 6px; }

    /* hover-burst sprinkles spawned out of a bar's frosting cap. positioned
       absolute inside the bar — the bar uses overflow:visible already so they
       can fly above the rim. removed from DOM after the gsap timeline finishes. */
    .sprinkle-burst {
      position: absolute;
      pointer-events: none;
      width: 4px;
      height: 9px;
      border-radius: 999px;
      will-change: transform, opacity;
    }
    .sprinkle-burst.round { width: 5px; height: 5px; }

    /* keep main content above the sprinkle layer */
    main.layout { position: relative; z-index: 1; }

    /* sticky frosted top nav — the only glass surface in the system. */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 56px;
      padding: 0 24px;
      background: var(--glass-paper);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .nav-logo {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      object-fit: contain;
      /* gsap brand-jump hovers will scale + spin from this anchor — cake bottom. */
      transform-origin: 50% 70%;
      will-change: transform;
    }
    .nav-wordmark {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-tag {
      font-size: 12px;
      color: var(--fg-soft);
      white-space: nowrap;
      margin-left: 6px;
    }
    @media (max-width: 720px) { .nav-tag { display: none; } }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .reconnect-indicator {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
    }
    .gh-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
      transition: border-color 200ms var(--ease-out);
    }
    .gh-pill:hover { border-color: var(--accent); }
    .gh-pill .gh-glyph {
      font-family: var(--mono);
      font-size: 13px;
    }
    .gh-pill .gh-star { color: #f4b942; }

    /* global auto-break-down toggle in the top nav. server-authoritative state,
       broadcast over ws so all connected clients stay in sync. */
    .nav-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-pill);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      cursor: pointer;
      transition: border-color 200ms var(--ease-out), background 200ms var(--ease-out);
    }
    .nav-toggle:hover { border-color: var(--accent); }
    .nav-toggle .toggle-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
      box-shadow: none;
      transition: background 160ms var(--ease-out), box-shadow 160ms var(--ease-out);
    }
    .nav-toggle[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .nav-toggle[aria-pressed="true"] .toggle-dot {
      background: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 28%, transparent);
    }
    .nav-toggle .toggle-glyph {
      font-family: var(--mono);
      font-size: 13px;
    }

    main.layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 24px 96px;
      display: flex;
      gap: 0;
      align-items: flex-start;
    }
    /* the panes carry barely-there gradients of two different temperatures —
       sidebar trends rose, detail trends cream — separated by a hairline.
       at full opacity it would read as two coloured panels; at these alphas
       the eye reads "single surface, gently divided." */
    .sidebar {
      flex: 0 0 320px;
      position: sticky;
      top: 80px;
      padding: 4px 22px 20px 0;
      border-right: 1px solid rgba(244, 114, 182, 0.10);
      background: linear-gradient(180deg, rgba(252, 231, 243, 0.32) 0%, rgba(252, 231, 243, 0) 70%);
    }
    .detail-pane {
      flex: 1;
      min-width: 0;
      padding: 4px 0 20px 22px;
      background: linear-gradient(180deg, rgba(255, 244, 232, 0.30) 0%, rgba(255, 244, 232, 0) 70%);
    }
    @media (max-width: 880px) {
      main.layout { flex-direction: column; }
      .sidebar {
        flex: 1 1 auto;
        position: static;
        width: 100%;
        padding: 0 0 16px;
        border-right: none;
        border-bottom: 1px solid rgba(244, 114, 182, 0.10);
      }
      .detail-pane { padding: 16px 0 0; }
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 12px;
    }

    /* detail empty — cake duo, replaces the dashed outline */
    .detail-empty {
      padding: 64px 24px;
      text-align: center;
    }
    .detail-empty img {
      width: 100%;
      max-width: 360px;
      height: auto;
      margin: 0 auto 16px;
      display: block;
    }
    .detail-empty p {
      color: var(--fg-soft);
      font-style: italic;
      font-size: 14px;
      margin: 0;
    }

    /* sidebar inbox */
    .cards { display: grid; gap: 8px; }
    .empty-inbox {
      text-align: center;
      padding: 32px 16px;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 13px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--r-card);
    }

    .card {
      position: relative;
      display: block;
      text-decoration: none;
      color: var(--fg);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 10px 12px;
      overflow: hidden;
      transition: border-color 400ms var(--ease-out),
                  background 200ms var(--ease-out),
                  opacity 400ms var(--ease-out);
    }
    .card:hover { border-color: var(--accent); opacity: 1; }
    .card.live { border-color: var(--accent); }
    .card.idle { opacity: 0.6; }
    /* update flash — fires when a card's data changes mid-session */
    .card.is-updated { animation: card-update 1.6s var(--ease-out); }
    @keyframes card-update {
      0%   { box-shadow: 0 0 0 0 var(--accent-soft); transform: scale(1); }
      18%  { box-shadow: 0 0 0 8px var(--accent-soft); transform: scale(1.022); }
      100% { box-shadow: 0 0 0 0 transparent; transform: scale(1); }
    }
    .card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      opacity: 1;
      padding-right: 64px;             /* room for the mascot peek */
    }
    .card-mascot {
      position: absolute;
      right: -4px;
      bottom: -8px;
      width: 76px;
      height: 76px;
      pointer-events: none;
      object-fit: contain;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
      gap: 8px;
    }
    .card-head h3 {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .model-tag {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg-soft);
      background: var(--chip-tint);
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      text-transform: lowercase;
      letter-spacing: 0.04em;
    }
    .card-insight {
      font-size: 13px;
      color: var(--fg);
      line-height: 1.45;
      margin: 4px 0 6px;
    }
    .card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .card-foot {
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      margin: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .card-foot .live-word { color: var(--accent); font-weight: 600; }
    .card-foot .sep { opacity: 0.55; }

    /* chart cards — turn complexity + code changes, panel-style with header pills */
    .chart-card {
      background: linear-gradient(180deg, oklch(98% 0.014 350) 0%, var(--surface) 100%);
      border: 1px solid var(--accent-soft);
      border-radius: var(--r-panel);
      padding: 14px 16px 12px;
      min-width: 0;
    }
    .chart-card.code {
      background: linear-gradient(180deg, oklch(98% 0.012 155) 0%, var(--surface) 100%);
      border-color: oklch(92% 0.06 155);
    }
    .chart-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      min-width: 0;
    }
    .chart-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      flex-shrink: 0;
    }
    .chart-card.code .chart-icon { background: oklch(94% 0.07 155); color: oklch(60% 0.16 155); }
    .chart-icon svg { width: 16px; height: 16px; }
    .chart-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chart-card.code .chart-title { color: oklch(50% 0.14 155); }
    .chart-legend {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .legend-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-soft);
      line-height: 1;
    }
    .legend-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .legend-pill .dot-input { background: var(--accent); opacity: 0.55; }
    .legend-pill .dot-output { background: var(--plum); }
    .legend-pill .dot-added { background: var(--diff-green); }
    .legend-pill .dot-removed { background: var(--diff-red); }

    .chart-body {
      display: flex;
      gap: 8px;
      min-width: 0;
    }
    .cx-yaxis { flex: 0 0 36px; position: relative; height: 130px; }
    .cx-yaxis .tick {
      position: absolute;
      right: 4px;
      transform: translateY(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--fg-muted);
      line-height: 1;
    }
    .cx-yaxis .tick.top { top: 0; }
    .cx-yaxis .tick.mid { top: 50%; }
    .cx-yaxis .tick.bot { top: 100%; }
    .cx-plot {
      flex: 1 1 auto;
      position: relative;
      height: 130px;
      min-width: 0;
    }
    .cx-grid {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px dashed var(--border);
      pointer-events: none;
    }
    .cx-grid.top { top: 0; }
    .cx-grid.mid { top: 50%; }
    .cx-grid.bot { top: 100%; border-top-style: solid; }
    .cx-bars {
      position: absolute;
      inset: 0 0 0 0;
      display: flex;
      align-items: flex-end;
      gap: 4px;
    }
    /* flex distribution — bars share the available width without scrolling */
    .cx-pair {
      flex: 1 1 0;
      min-width: 4px;
      max-width: 56px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      height: 100%;
      position: relative;
    }
    .cx-bar {
      flex: 1 1 0;
      min-height: 1px;
      border-radius: 3px 3px 0 0;
      max-width: 22px;
      position: relative;
      overflow: visible;
    }
    /* dripping-icing cap — silhouette comes from /assets/frosting-new.svg used as
       a mask, the fill is the bar's own `currentColor` (so the bar's opacity
       carries through and frost == bar). edit the svg file to change shape;
       the inline rendering follows automatically. */
    /* the cap is 36px tall; 20% (≈7px) peeks above the bar top, 80% (≈29px) overlaps
       into the bar — most of the drip silhouette lives inside the bar, just the rim
       spills over. only added on bars whose height pct passes BAR_FROST_MIN_PCT
       (see render code) so short bars aren't dwarfed by their own frosting. */
    .bar-frost {
      position: absolute;
      left: -50%;
      right: -50%;
      top: -7px;
      width: 200%;
      height: 36px;
      pointer-events: none;
      display: block;
      /* lighter than the bar so the icing reads as icing, not paint. */
      background-color: currentColor; /* fallback */
      background-color: color-mix(in oklab, currentColor 60%, white 40%);
      -webkit-mask: url("/assets/frosting-new.svg") no-repeat bottom center / contain;
              mask: url("/assets/frosting-new.svg") no-repeat bottom center / contain;
    }
    .bar-input { background: var(--accent); color: var(--accent); opacity: 0.55; }
    .bar-output { background: var(--plum); color: var(--plum); opacity: 0.9; }
    .cx-pair.latest .bar-output { background: var(--plum); color: var(--plum); opacity: 1; }
    .bar-added { background: var(--diff-green); color: var(--diff-green); opacity: 0.9; }
    .bar-removed { background: var(--diff-red); color: var(--diff-red); opacity: 0.9; }

    .chart-foot {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
      padding-right: 4px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
    }

    /* detail page */
    .session-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin: 4px 0 24px;
    }
    .session-head h2 {
      font-size: 26px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--accent);
    }
    .session-head .source {
      font-size: 13px;
      color: var(--fg-soft);
      margin: 0;
      font-family: var(--mono);
    }
    .session-head .source .src-glyph { color: var(--accent); margin-right: 4px; }

    .untouched-line {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
      margin: 0 0 8px;
      padding-left: 2px;
    }

    /* instrument band — sits between the summary panel and the conversation strip.
       two columns always; if one chart has nothing to render, its slot stays
       empty rather than the other chart stretching to full width. */
    .charts-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 0 0 20px;
    }
    .charts-band > * { min-width: 0; }
    #d-chart { grid-column: 1; }
    #d-code-chart { grid-column: 2; }
    @media (max-width: 880px) {
      .charts-band { grid-template-columns: 1fr; }
      #d-chart, #d-code-chart { grid-column: 1; }
    }

    /* conversation strip — three messages: prev-agent → you → agent */
    .conversation {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 4px 2px 16px;
      margin: 8px 0 16px;
      border-bottom: 1px solid var(--border);
    }
    .conv-turn { display: flex; flex-direction: column; gap: 4px; }
    .conv-role {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .conv-role.you { color: var(--accent); }
    .conv-text {
      font-size: 14px;
      line-height: 1.55;
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .conv-empty {
      text-align: center;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 13px;
      padding: 24px 0;
    }

    /* markdown body for agent messages — claude-session-style formatting */
    .conv-md { font-size: 14px; line-height: 1.6; color: var(--fg); max-width: 78ch; }
    .conv-md > *:first-child { margin-top: 0; }
    .conv-md > *:last-child { margin-bottom: 0; }
    .conv-md p { margin: 0 0 10px; }
    .conv-md h1, .conv-md h2, .conv-md h3, .conv-md h4 {
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 14px 0 6px;
    }
    .conv-md h1 { font-size: 17px; }
    .conv-md h2 { font-size: 16px; }
    .conv-md h3 { font-size: 15px; }
    .conv-md h4 { font-size: 14px; }
    .conv-md ul, .conv-md ol { padding-left: 22px; margin: 6px 0 10px; }
    .conv-md li { margin: 2px 0; }
    .conv-md li > p { margin: 0; }
    .conv-md code {
      font-family: var(--mono);
      font-size: 12.5px;
      background: var(--chip-tint);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .conv-md pre {
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.55;
      background: oklch(96% 0.012 340);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .conv-md pre code { background: none; padding: 0; border-radius: 0; font-size: 12.5px; }
    .conv-md a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .conv-md a:hover { color: var(--accent-hover); }
    .conv-md strong { font-weight: 600; }
    .conv-md em { font-style: italic; }
    .conv-md blockquote {
      margin: 8px 0;
      padding: 4px 0 4px 14px;
      border-left: 2px solid var(--border-strong);
      color: var(--fg-soft);
      font-style: italic;
    }
    .conv-md hr { border: 0; border-top: 1px dashed var(--border-strong); margin: 14px 0; }

    /* height-based tail: cap collapsed agent blocks, fade + toggle when truncated */
    .conv-body {
      position: relative;
      max-height: 240px;
      overflow: hidden;
      transition: max-height 280ms var(--ease-out);
    }
    .conv-body.is-truncated::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 70px;
      background: linear-gradient(to bottom, transparent, var(--bg) 90%);
      pointer-events: none;
    }
    .conv-body.is-expanded { max-height: none; }
    .conv-body.is-expanded::after { display: none; }
    .conv-toggle {
      align-self: flex-start;
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
    }
    .conv-toggle:hover { color: var(--accent-hover); }
    .conv-toggle.hidden { display: none; }

    .ambient-quiet {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fg-muted);
      padding: 8px 2px;
      margin: 0;
    }

    /* chat input — single row below the conversation tail */
    .chat-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-panel);
      padding: 14px 16px;
    }
    .chat-input .chat-context {
      font-size: 13px;
      color: var(--fg);
      margin: 0 0 10px;
      line-height: 1.5;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
    }
    .chat-input .chat-context.muted { font-style: italic; color: var(--fg-muted); }
    .chat-input .chat-context .chat-context-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 6px;
    }
    .chat-input .chat-context .chat-context-label::before { content: "⚡"; }
    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .chat-input-row textarea {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      padding: 10px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-input);
      resize: vertical;
      min-height: 44px;
      background: var(--bg);
      color: var(--fg);
      transition: border-color 160ms var(--ease-out), background 160ms var(--ease-out);
    }
    .chat-input-row textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
    }
    .chat-input-row .send-btn {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      align-self: flex-end;
      background: var(--accent);
      border: none;
      border-radius: var(--r-input);
      cursor: pointer;
      box-shadow: 0 6px 20px -10px rgba(236, 72, 153, 0.55);
      transition: background 0.15s var(--ease-out), transform 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .chat-input-row .send-btn svg {
      width: 20px;
      height: 20px;
      color: #fff;
      pointer-events: none;
    }
    .chat-input-row .send-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px -12px rgba(236, 72, 153, 0.65);
    }
    .chat-input-row .send-btn:disabled {
      background: var(--border-strong);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .chat-input-row .send-btn:disabled svg { opacity: 0.5; }
    .chat-tip {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
    }
    .chat-tip .tip-key { color: var(--accent); }
    .chat-sent {
      margin-top: 8px;
      font-size: 12px;
      color: var(--fg-soft);
      font-style: italic;
    }

    /* chat thread — between conversation and chat input. populated by /chat/send replies. */
    .chat-thread {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-thread:empty { display: none; }
    .chat-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chat-row .chat-role {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
    }
    .chat-row.you .chat-role { color: var(--accent); }
    .chat-row.agent .chat-role { color: var(--plum); }
    .chat-row .chat-auto-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 999px;
      vertical-align: middle;
    }
    .chat-row .chat-body {
      font-size: 14px;
      line-height: 1.55;
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-row.agent .chat-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-input);
      padding: 10px 12px;
    }
    .chat-status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
      font-style: italic;
    }
    .chat-status.thinking::before {
      content: "•";
      display: inline-block;
      margin-right: 6px;
      color: var(--accent);
      animation: chat-pulse 1.2s ease-in-out infinite;
    }
    @keyframes chat-pulse {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 1; }
    }

    code, .mono { font-family: var(--mono); font-size: 13px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0ms !important;
        animation-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>
  <div class="sprinkles" aria-hidden="true" data-sprinkles></div>

  <header class="top-nav">
    <div class="nav-left">
      <img class="nav-logo" src="/assets/logo-cake-slice.webp" alt="" />
      <a class="nav-wordmark" href="#">cut-the-cake</a>
      <span class="nav-tag">turn long agent runs into a quick iterative chat</span>
    </div>
    <div class="nav-right">
      <span class="reconnect-indicator" id="reconnect-indicator" hidden>reconnecting…</span>
      <button class="nav-toggle" id="autosend-toggle" type="button" aria-pressed="true" aria-label="auto break-down">
        <span class="toggle-dot" aria-hidden="true"></span>
        <span class="toggle-glyph">⚡</span>
        <span class="toggle-label">auto break-down</span>
      </button>
      <a class="gh-pill" href="https://github.com/oronanschel/cut-the-cake" target="_blank" rel="noreferrer noopener" aria-label="GitHub repo">
        <span class="gh-glyph">★</span>
        <span class="gh-star" id="gh-star">—</span>
      </a>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <h2 class="section-label">sessions</h2>
      <p class="ambient-quiet" id="ambient-quiet" hidden>quiet</p>
      <div class="cards" id="cards">
        <div class="empty-inbox" id="inbox-empty">no active session detected — start claude code in a project</div>
      </div>
    </aside>

    <section class="detail-pane" id="detail-pane">
      <div class="detail-empty" id="detail-empty">
        <img src="/assets/empty-state-cake-duo.webp" alt="" />
        <p>select a session</p>
      </div>
      <article class="detail-content" id="detail-content" hidden>
        <div class="session-head">
          <h2 id="d-name">—</h2>
          <p class="source"><span class="src-glyph">◆</span><span id="d-source">claude-code</span> · <span id="d-elapsed">—</span></p>
        </div>

        <p class="untouched-line" id="d-untouched" hidden>untouched for <span id="d-untouched-mins">—</span></p>

        <div class="charts-band">
          <div id="d-chart"></div>
          <div id="d-code-chart"></div>
        </div>

        <div class="conversation" id="d-conversation"></div>
        <div class="chat-thread" id="d-chat-thread"></div>
        <div class="chat-input" id="d-chat-input"></div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    // dom
    const cardsEl = document.getElementById("cards");
    const inboxEmpty = document.getElementById("inbox-empty");
    const ambientQuiet = document.getElementById("ambient-quiet");
    const reconnectIndicator = document.getElementById("reconnect-indicator");
    const detailEmpty = document.getElementById("detail-empty");
    const detailContent = document.getElementById("detail-content");
    const dName = document.getElementById("d-name");
    const dElapsed = document.getElementById("d-elapsed");
    const dUntouched = document.getElementById("d-untouched");
    const dUntouchedMins = document.getElementById("d-untouched-mins");
    const dChart = document.getElementById("d-chart");
    const dCodeChart = document.getElementById("d-code-chart");
    const dConversation = document.getElementById("d-conversation");
    const dChatThread = document.getElementById("d-chat-thread");
    const dChatInput = document.getElementById("d-chat-input");
    const autoSendToggle = document.getElementById("autosend-toggle");

    // global state for the auto-break-down toggle. authoritative value comes from
    // the server's hello payload + autosend:setting ws msgs; the local optimistic
    // flip on click is just snappier than waiting for the ws round-trip.
    let autoSendEnabled = true;
    function paintAutoSend() {
      if (!autoSendToggle) return;
      autoSendToggle.setAttribute("aria-pressed", autoSendEnabled ? "true" : "false");
      const lbl = autoSendToggle.querySelector(".toggle-label");
      if (lbl) lbl.textContent = autoSendEnabled ? "auto break-down" : "auto break-down · off";
    }
    paintAutoSend();
    if (autoSendToggle) {
      autoSendToggle.addEventListener("click", async () => {
        const next = !autoSendEnabled;
        autoSendEnabled = next; paintAutoSend(); // optimistic
        try {
          const res = await fetch("/chat/auto-send", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ enabled: next }),
          });
          if (!res.ok) {
            console.warn("[autosend] toggle failed", res.status);
            autoSendEnabled = !next; paintAutoSend(); // revert on failure
          }
        } catch (err) {
          console.warn("[autosend] toggle error", err);
          autoSendEnabled = !next; paintAutoSend();
        }
      });
    }

    // state thresholds
    const LIVE_MS = 30 * 1000;          // <30s = live
    const IDLE_MS = 5 * 60 * 1000;      // >5m = idle
    const AMBIENT_MS = 5 * 60 * 1000;   // all sessions idle this long → quiet collapse

    // assets
    const MASCOT_ACTIVE = "/assets/mascot-cupcake-wand.webp";
    const MASCOT_IDLE = "/assets/mascot-cupcake-fork.webp";

    // motion helpers — magicui-style ports.
    // blurFadeIn = the BlurFade pattern: opacity 0 + blur(8px) + small y offset → reveal.
    // blurFadeStagger = run blurFadeIn on a list of nodes with a small staggered delay.
    function reduceMotionOn() {
      return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    }
    function blurFadeIn(el, opts) {
      if (!el || typeof gsap === "undefined" || reduceMotionOn()) return;
      const o = opts || {};
      // ported from magicui blur-fade.tsx defaults: y: -offset (direction "down"),
      // blur 6px, ease easeOut, base delay 0.04. duration bumped above the 0.4s
      // source default to land closer to the slower feel we settled on.
      gsap.fromTo(el,
        { opacity: 0, filter: "blur(6px)", y: -6 },
        {
          opacity: 1,
          filter: "blur(0px)",
          y: 0,
          duration: o.duration || 0.7,
          delay: 0.04 + (o.delay || 0),
          ease: "power2.out",
          clearProps: "filter,y,opacity",
        }
      );
    }
    function blurFadeStagger(parent, selector, opts) {
      if (!parent) return;
      const o = opts || {};
      const step = o.step || 0.08;
      const start = o.start || 0;
      const els = parent.querySelectorAll(selector);
      els.forEach((el, i) => blurFadeIn(el, { delay: start + step * i, duration: o.duration }));
    }

    // per-session colour palette — each session hashes to one entry; the
    // resulting accent/plum/hover overrides --accent etc. on the card root
    // and on the detail pane while that session is open. all hues stay in the
    // dessert/patisserie register so the brand still reads.
    const SESSION_PALETTE = [
      // strawberry (default brand)
      { accent: "236, 72, 153",  hover: "219, 39, 119",  plum: "168, 85, 247" },
      // peach
      { accent: "249, 115, 22",  hover: "234, 88, 12",   plum: "236, 72, 153" },
      // mint
      { accent: "16, 185, 129",  hover: "5, 150, 105",   plum: "20, 184, 166" },
      // blueberry
      { accent: "59, 130, 246",  hover: "37, 99, 235",   plum: "129, 140, 248" },
      // lavender
      { accent: "168, 85, 247",  hover: "147, 51, 234",  plum: "236, 72, 153" },
      // honey
      { accent: "234, 179, 8",   hover: "202, 138, 4",   plum: "249, 115, 22" },
    ];
    function sessionColorIdx(sessionId) {
      const s = String(sessionId || "");
      let h = 5381;
      for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) >>> 0;
      return h % SESSION_PALETTE.length;
    }
    function sessionColorVars(sessionId) {
      const c = SESSION_PALETTE[sessionColorIdx(sessionId)];
      return (
        "--accent: rgb(" + c.accent + ");" +
        "--accent-hover: rgb(" + c.hover + ");" +
        "--accent-soft: rgba(" + c.accent + ", 0.12);" +
        "--plum: rgb(" + c.plum + ");"
      );
    }

    // state — one entry per discovered session, keyed by server-side key
    // ("<source>:<path>"). Each carries its own events/threads/lastEventTs.
    const sessionsByKey = new Map();

    // utils
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }
    function clip(s, n) {
      s = String(s || "");
      return s.length > n ? s.slice(0, n) + "…" : s;
    }
    function projectName(info) {
      if (!info || !info.slug) return "";
      const parts = info.slug.replace(/^-+/, "").split("-");
      return parts[parts.length - 1] || info.slug;
    }
    function sessionName(infoOrSess) {
      if (!infoOrSess) return "—";
      const sess = infoOrSess.info ? infoOrSess : null;
      const info = sess ? sess.info : infoOrSess;
      const project = projectName(info);
      const obs = sess && sess.sessionName ? sess.sessionName : null;
      if (!obs) return project || "—";
      if (obs === project) return project;
      return "[" + project + "] " + obs;
    }
    function fmtElapsed(sess) {
      const ts = sess?.lastEventTs;
      if (!ts) return "—";
      const ms = Date.now() - ts;
      if (ms < 5000) return "now";
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h) return h + "h " + m + "m ago";
      if (m) return m + "m ago";
      return s + "s ago";
    }
    function keyForSnapshot(sess) {
      return sess.key || (sess.info ? (sess.info.source + ":" + sess.info.path) : "");
    }
    function latestOpenInsight(decisions) {
      if (!Array.isArray(decisions)) return null;
      for (let i = decisions.length - 1; i >= 0; i--) {
        if (decisions[i].open && decisions[i].insight) return decisions[i];
      }
      return null;
    }

    function sessionState(sess) {
      const ts = sess?.lastEventTs || 0;
      const age = Date.now() - ts;
      if (age < LIVE_MS) return "live";
      if (age < IDLE_MS) return "recent";
      return "idle";
    }

    function fmtAge(ms) {
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h) return h + "h " + m + "m";
      if (m) return m + "m";
      return s + "s";
    }
    function shortModel(m) {
      if (!m) return "";
      const stripped = String(m).replace(/^claude-/, "").replace(/-\d{8}$/, "");
      return stripped.replace(/-(\d+)-(\d+)$/, " $1.$2");
    }

    // derive turns from raw events (mirrors src/turns.ts)
    function deriveTurns(evs) {
      const turns = [];
      let cur = null;
      const close = () => { if (cur) { turns.push(cur); cur = null; } };
      for (const ev of evs) {
        if (ev.kind === "user_message") {
          close();
          cur = {
            id: ev.uuid,
            startTs: ev.ts,
            endTs: ev.ts,
            userText: ev.text || "",
            userChars: (ev.text || "").length,
            agentText: "",
            agentChars: 0,
            agentTokens: 0,
            toolUses: 0,
            linesAdded: 0,
            linesRemoved: 0,
          };
        } else if (cur) {
          cur.endTs = ev.ts;
          if (ev.kind === "assistant_text") {
            cur.agentText += (cur.agentText ? "\n\n" : "") + (ev.text || "");
            cur.agentChars += (ev.text || "").length;
            if (typeof ev.tokens === "number") cur.agentTokens += ev.tokens;
          } else if (ev.kind === "tool_use") {
            cur.toolUses += 1;
            if (typeof ev.linesAdded === "number") cur.linesAdded += ev.linesAdded;
            if (typeof ev.linesRemoved === "number") cur.linesRemoved += ev.linesRemoved;
          } else if (ev.kind === "stop") {
            close();
          }
        }
      }
      if (cur) turns.push(cur);
      return turns;
    }

    function wordCount(s) {
      return (s || "").trim().split(/\s+/).filter(Boolean).length;
    }
    function fmtCount(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "k";
      return String(n);
    }
    function niceMax(v) {
      if (v <= 0) return 100;
      if (v <= 50) return 50;
      if (v <= 100) return 100;
      if (v <= 200) return 200;
      if (v <= 500) return 500;
      if (v <= 1000) return 1000;
      if (v <= 2000) return 2000;
      return Math.ceil(v / 500) * 500;
    }

    // chart icons — small inline svgs sitting in a tinted bubble in the card head
    const ICON_COMPLEXITY = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12 L5 8 L8 10 L11 5 L14 8"/></svg>';
    const ICON_CODE = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4 L2 8 L5 12 M11 4 L14 8 L11 12 M9.5 3.5 L6.5 12.5"/></svg>';
    // dripping-icing cap — shape lives in /assets/frosting-new.svg, applied here
    // only to bars taller than this threshold (% of yMax) so short bars don't get
    // crushed by their own frosting silhouette.
    const BAR_FROST_MIN_PCT = 25;
    // as a css mask so editing the svg file updates every bar. the span itself
    // carries no markup; the bar's currentColor fills the masked shape.
    const BAR_FROST = '<span class="bar-frost" aria-hidden="true"></span>';
    // charts cap at the last N turns — keeps bars wide and the panel uncluttered.
    const CHART_TURNS = 5;

    function complexityChart(turns, count) {
      const last = count ? turns.slice(-count) : turns.slice();
      if (last.length === 0) return null;
      const data = last.map(t => {
        const inputW = wordCount(t.userText);
        const outputW = wordCount(t.agentText);
        return {
          input: inputW,
          output: outputW + t.toolUses * 30,
          outputWords: outputW,
          tools: t.toolUses,
          ts: t.endTs,
        };
      });
      const peak = Math.max(20, ...data.map(d => Math.max(d.input, d.output)));
      return { data, yMax: niceMax(peak) };
    }

    function renderChartHtml(turns, count) {
      const cx = complexityChart(turns, count);
      if (!cx) return "";
      const yMax = cx.yMax;
      const lastTs = cx.data[cx.data.length - 1].ts;
      const lastAgeMs = Date.now() - lastTs;
      const lastAgeLabel = lastAgeMs < 5000 ? "now" : fmtAge(lastAgeMs) + " ago";
      const pairs = cx.data.map((d, i) => {
        const isLast = i === cx.data.length - 1;
        const inputH = Math.max(0.5, (d.input / yMax) * 100);
        const outputH = Math.max(0.5, (d.output / yMax) * 100);
        const tip =
          "agent: " + d.outputWords + "w" +
          (d.tools ? " · " + d.tools + "t" : "") +
          " · you: " + d.input + "w";
        return (
          '<div class="cx-pair' + (isLast ? " latest" : "") + '" title="' + escapeHtml(tip) + '">' +
            '<div class="cx-bar bar-input" style="height: ' + inputH + '%">' + (inputH >= BAR_FROST_MIN_PCT ? BAR_FROST : '') + '</div>' +
            '<div class="cx-bar bar-output" style="height: ' + outputH + '%">' + (outputH >= BAR_FROST_MIN_PCT ? BAR_FROST : '') + '</div>' +
          '</div>'
        );
      }).join("");
      return (
        '<div class="chart-card">' +
          '<div class="chart-head">' +
            '<span class="chart-icon">' + ICON_COMPLEXITY + '</span>' +
            '<span class="chart-title">turn complexity (words)</span>' +
            '<span class="chart-legend">' +
              '<span class="legend-pill"><span class="dot dot-input"></span>you</span>' +
              '<span class="legend-pill"><span class="dot dot-output"></span>agent</span>' +
            '</span>' +
          '</div>' +
          '<div class="chart-body">' +
            '<div class="cx-yaxis">' +
              '<span class="tick top">' + fmtCount(yMax) + '</span>' +
              '<span class="tick mid">' + fmtCount(Math.round(yMax / 2)) + '</span>' +
              '<span class="tick bot">0</span>' +
            '</div>' +
            '<div class="cx-plot">' +
              '<div class="cx-grid top"></div>' +
              '<div class="cx-grid mid"></div>' +
              '<div class="cx-grid bot"></div>' +
              '<div class="cx-bars">' + pairs + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="chart-foot">' + escapeHtml(lastAgeLabel) + '</div>' +
        '</div>'
      );
    }

    function renderCodeChartHtml(turns, count) {
      const last = count ? turns.slice(-count) : turns.slice();
      if (last.length === 0) return "";
      const data = last.map(t => ({ added: t.linesAdded || 0, removed: t.linesRemoved || 0, ts: t.endTs }));
      if (data.every(d => d.added === 0 && d.removed === 0)) return "";
      const peak = Math.max(20, ...data.map(d => Math.max(d.added, d.removed)));
      const yMax = niceMax(peak);
      const lastTs = data[data.length - 1].ts;
      const lastAgeMs = Date.now() - lastTs;
      const lastAgeLabel = lastAgeMs < 5000 ? "now" : fmtAge(lastAgeMs) + " ago";
      const pairs = data.map((d, i) => {
        const isLast = i === data.length - 1;
        const addedH = Math.max(0.5, (d.added / yMax) * 100);
        const removedH = Math.max(0.5, (d.removed / yMax) * 100);
        const tip = "+" + d.added + " / -" + d.removed + " lines";
        return (
          '<div class="cx-pair' + (isLast ? " latest" : "") + '" title="' + escapeHtml(tip) + '">' +
            '<div class="cx-bar bar-added" style="height: ' + addedH + '%">' + (addedH >= BAR_FROST_MIN_PCT ? BAR_FROST : '') + '</div>' +
            '<div class="cx-bar bar-removed" style="height: ' + removedH + '%">' + (removedH >= BAR_FROST_MIN_PCT ? BAR_FROST : '') + '</div>' +
          '</div>'
        );
      }).join("");
      return (
        '<div class="chart-card code">' +
          '<div class="chart-head">' +
            '<span class="chart-icon">' + ICON_CODE + '</span>' +
            '<span class="chart-title">code changes (lines)</span>' +
            '<span class="chart-legend">' +
              '<span class="legend-pill"><span class="dot dot-added"></span>added</span>' +
              '<span class="legend-pill"><span class="dot dot-removed"></span>removed</span>' +
            '</span>' +
          '</div>' +
          '<div class="chart-body">' +
            '<div class="cx-yaxis">' +
              '<span class="tick top">' + fmtCount(yMax) + '</span>' +
              '<span class="tick mid">' + fmtCount(Math.round(yMax / 2)) + '</span>' +
              '<span class="tick bot">0</span>' +
            '</div>' +
            '<div class="cx-plot">' +
              '<div class="cx-grid top"></div>' +
              '<div class="cx-grid mid"></div>' +
              '<div class="cx-grid bot"></div>' +
              '<div class="cx-bars">' + pairs + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="chart-foot">' + escapeHtml(lastAgeLabel) + '</div>' +
        '</div>'
      );
    }

    // collapse same-slug lineage: a `/clear` in claude code mints a new
    // sessionId + new jsonl in the same project dir, leaving the old jsonl
    // dormant. without coalescing, the user sees two cards for what's
    // logically one continuing project — and accumulated dead siblings
    // (bun --hot orphaning subprocesses, short-lived var-folders shells)
    // pile up indefinitely. rule: within a (source, slug) group, the
    // freshest is always shown; non-freshest siblings show only while they
    // *themselves* are still active (lastEventTs within LINEAGE_FRESH_MS of
    // now). this hides /clear predecessors after ~LINEAGE_FRESH_MS and the
    // dead-on-arrival subprocesses too. parallel terminals on the same
    // project keep emitting events and stay visible.
    // pattern adapted from abtop's `find_live_session_id`
    // (vendor/abtop/src/collector/claude.rs:1029-1041), without the PID-FD
    // resolution since bun has no native libproc binding.
    const LINEAGE_FRESH_MS = 60 * 1000;

    function sortedSessions() {
      const all = Array.from(sessionsByKey.values())
        .sort((a, b) => (b.lastEventTs || 0) - (a.lastEventTs || 0));

      const freshestByLineage = new Map();
      for (const s of all) {
        const key = (s.info?.source || "") + "␀" + (s.info?.slug || "");
        const ts = s.lastEventTs || 0;
        const cur = freshestByLineage.get(key) || 0;
        if (ts > cur) freshestByLineage.set(key, ts);
      }

      return all.filter(s => {
        const key = (s.info?.source || "") + "␀" + (s.info?.slug || "");
        const my = s.lastEventTs || 0;
        const fresh = freshestByLineage.get(key) || 0;
        // freshest in lineage → always show. non-freshest → only if *i*
        // had activity recently (parallel sessions / just-cleared edge cases).
        return my >= fresh || (Date.now() - my) < LINEAGE_FRESH_MS;
      });
    }

    function findSessionBySessionId(sessionId) {
      for (const s of sessionsByKey.values()) {
        if (s.info?.sessionId === sessionId) return s;
      }
      return null;
    }

    function buildCardInnerHtml(sess, opts) {
      const modelLabel = shortModel(sess.model);
      const latest = latestOpenInsight(sess.observerDecisions);
      const insightHtml = latest
        ? '<p class="card-insight">' + escapeHtml(latest.insight) + '</p>'
        : '';
      const state = sessionState(sess);
      const ts = sess?.lastEventTs || 0;
      const age = Date.now() - ts;
      const elapsedHtml = state === "live"
        ? '<span class="live-word">live</span>'
        : state === "idle"
          ? 'idle ' + fmtAge(age)
          : fmtAge(age) + ' ago';
      const tagsStr = latest && latest.tags && latest.tags.length
        ? latest.tags.join(" · ")
        : '';
      const sourceStr = opts.showSource ? (sess?.info?.source || 'claude-code') : '';
      const footParts = [sourceStr, tagsStr, elapsedHtml].filter(Boolean);
      const footHtml = footParts.join(' <span class="sep">·</span> ');

      let html =
        '<div class="card-head">' +
          '<h3>' + escapeHtml(sessionName(sess)) + '</h3>' +
          '<div class="card-meta">' +
            (modelLabel ? '<span class="model-tag">' + escapeHtml(modelLabel) + '</span>' : '') +
          '</div>' +
        '</div>' +
        insightHtml +
        '<p class="card-foot">' + footHtml + '</p>';

      if (opts.selected) {
        const mascotSrc = state === "idle" ? MASCOT_IDLE : MASCOT_ACTIVE;
        html += '<img class="card-mascot" src="' + mascotSrc + '" alt="" />';
      }
      return html;
    }

    function applyCardClasses(card, sess, opts) {
      const state = sessionState(sess);
      card.classList.toggle("live", state === "live");
      card.classList.toggle("idle", state === "idle");
      card.classList.toggle("selected", !!opts.selected);
    }

    function cardSig(sess) {
      // signature of "did the meaningful content change?" — avoids flashing
      // on every minute-tick or selection change. covers new events, new
      // observer insights, and rolling summary updates.
      const ins = latestOpenInsight(sess.observerDecisions);
      return [
        sess.lastEventTs || 0,
        ins?.insight || "",
        sess.sessionName || "",
      ].join("");
    }

    function buildCard(sess, opts) {
      opts = opts || {};
      const card = document.createElement("a");
      card.className = "card";
      card.href = "#session/" + encodeURIComponent(sess.info.sessionId);
      card.dataset.sessionId = sess.info.sessionId;
      card.dataset.sig = cardSig(sess);
      card.style.cssText = sessionColorVars(sess.info.sessionId);
      card.innerHTML = buildCardInnerHtml(sess, opts);
      applyCardClasses(card, sess, opts);
      return card;
    }

    function updateCard(card, sess, opts) {
      const newSig = cardSig(sess);
      const changed = card.dataset.sig !== newSig;
      card.dataset.sig = newSig;
      card.innerHTML = buildCardInnerHtml(sess, opts);
      applyCardClasses(card, sess, opts);
      if (changed && !reduceMotion()) {
        // re-trigger the keyframe by removing + reflowing + re-adding the class
        card.classList.remove("is-updated");
        void card.offsetWidth;
        card.classList.add("is-updated");
      }
    }

    function selectedSessionId() {
      return decodeURIComponent((location.hash.match(/^#session\/(.+)$/) || [])[1] || "");
    }

    // ambient quiet
    let ambientWoken = false;
    function shouldQuiet(list, sel) {
      if (sel) return false;
      if (list.length === 0) return false;
      if (ambientWoken) return false;
      const now = Date.now();
      return list.every(s => (now - (s.lastEventTs || 0)) >= AMBIENT_MS);
    }
    document.addEventListener("mousemove", () => {
      if (!ambientWoken) {
        ambientWoken = true;
        renderInbox();
        clearTimeout(window.__ambientReArm);
        window.__ambientReArm = setTimeout(() => {
          ambientWoken = false;
          renderInbox();
        }, 30 * 1000);
      } else {
        clearTimeout(window.__ambientReArm);
        window.__ambientReArm = setTimeout(() => {
          ambientWoken = false;
          renderInbox();
        }, 30 * 1000);
      }
    }, { passive: true });

    // persistent map of sessionId → card element. lets renderInbox diff against
    // the live dom so existing cards stay put across 5s ticks (no re-mount, no
    // animation flicker). only newly-added or removed cards animate.
    const cardEls = new Map();
    const reduceMotion = () => window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function clearAllCards() {
      cardEls.clear();
      cardsEl.innerHTML = "";
    }

    function renderInbox() {
      const list = sortedSessions();
      const sel = selectedSessionId();

      if (list.length === 0) {
        clearAllCards();
        cardsEl.appendChild(inboxEmpty);
        inboxEmpty.hidden = false;
        ambientQuiet.hidden = true;
        return;
      }
      if (inboxEmpty.parentNode === cardsEl) inboxEmpty.remove();
      inboxEmpty.hidden = true;

      if (shouldQuiet(list, sel)) {
        clearAllCards();
        const newest = list[0];
        const age = Date.now() - (newest.lastEventTs || 0);
        const n = list.length;
        ambientQuiet.textContent =
          "quiet — " + n + " agent" + (n === 1 ? "" : "s") +
          " running, last activity " + fmtAge(age) + " ago";
        ambientQuiet.hidden = false;
        return;
      }
      ambientQuiet.hidden = true;

      const sources = new Set(list.map(s => s?.info?.source || 'claude-code'));
      const showSource = sources.size > 1;

      // remove cards that are no longer in the list — fade + slide out
      const desiredIds = new Set(list.map(s => s.info.sessionId));
      for (const [id, el] of [...cardEls]) {
        if (!desiredIds.has(id)) {
          cardEls.delete(id);
          if (typeof gsap !== "undefined" && !reduceMotion()) {
            el.style.pointerEvents = "none";
            gsap.to(el, {
              opacity: 0,
              x: -24,
              height: 0,
              paddingTop: 0,
              paddingBottom: 0,
              marginTop: 0,
              marginBottom: 0,
              duration: 1.2,
              ease: "power2.in",
              onComplete: () => el.remove(),
            });
          } else {
            el.remove();
          }
        }
      }

      // FLIP snapshot: capture top of every persisting card BEFORE we mutate
      // the DOM, so we can animate them from their previous slot to the new
      // one when an insert/remove pushes them around. mirrors motion's `layout`
      // prop on AnimatedListItem (vendor/magicui/animated-list.tsx).
      const flipBefore = new Map();
      const canFlip = typeof gsap !== "undefined" && !reduceMotion();
      if (canFlip) {
        for (const [id, el] of cardEls) {
          flipBefore.set(id, el.getBoundingClientRect().top);
        }
      }

      // upsert + reorder
      let anchor = null;        // last placed card; new cards insert after it
      let staggerIdx = 0;       // stagger this tick's new cards (e.g. on first hello)
      for (const sess of list) {
        const id = sess.info.sessionId;
        const opts = { showSource, selected: id === sel };
        let card = cardEls.get(id);
        let isNew = false;
        if (!card) {
          card = buildCard(sess, opts);
          cardEls.set(id, card);
          isNew = true;
        } else {
          updateCard(card, sess, opts);
        }
        // place this card right after the previous one (or at the start)
        const target = anchor ? anchor.nextSibling : cardsEl.firstChild;
        if (card !== target) cardsEl.insertBefore(card, target);
        anchor = card;

        if (isNew && typeof gsap !== "undefined" && !reduceMotion()) {
          // spring-y enter, magicui AnimatedList flavour: scale up from 0.55,
          // small y-drop, opacity 0 → 1, with back.out for the soft overshoot.
          // transformOrigin pinned to top so the card grows down into its slot
          // (mirrors motion's `originY: 0` in vendor/magicui/animated-list.tsx)
          // instead of expanding from its center.
          gsap.from(card, {
            opacity: 0,
            y: -22,
            scale: 0.55,
            filter: "blur(6px)",
            transformOrigin: "50% 0%",
            duration: 1.4,
            ease: "back.out(1.3)",
            delay: staggerIdx * 0.07,
            clearProps: "transform,opacity,filter",
          });
          staggerIdx++;
        }
      }

      // FLIP playback: any card that was already in the DOM and has shifted
      // gets animated from its old top to the new one. new cards are skipped
      // (they have no `before` entry — their enter animation handles them).
      //
      // bug we hit: refresh runs every 5s, list reorders frequently. the old
      // version used gsap.from with overwrite: "auto" but no clearProps. when a
      // new FLIP fired mid-flight, the previous tween's residual translate3d()
      // stuck on the inline style — cards drifted out of layout, leaving gaps
      // and ghost overlaps. fix:
      //   1. killTweensOf on the y/transform channel before starting a new tween
      //      (overwrite:"auto" alone doesn't always catch transform tweens).
      //   2. clearProps:"transform" on completion so the inline style resets.
      if (canFlip && flipBefore.size) {
        for (const [id, el] of cardEls) {
          const before = flipBefore.get(id);
          if (before == null) continue;
          const after = el.getBoundingClientRect().top;
          const delta = before - after;
          if (Math.abs(delta) > 0.5) {
            gsap.killTweensOf(el, "y,transform");
            gsap.fromTo(
              el,
              { y: delta },
              {
                y: 0,
                duration: 0.55,
                ease: "power3.out",
                clearProps: "transform",
              }
            );
          }
        }
      }
    }

    // last-viewed tracking
    function lastViewedKey(sessionId) { return "viewed:" + sessionId; }
    function markViewed(sessionId) {
      try { localStorage.setItem(lastViewedKey(sessionId), String(Date.now())); } catch {}
    }
    function getLastViewed(sessionId) {
      try {
        const v = localStorage.getItem(lastViewedKey(sessionId));
        return v ? Number(v) : 0;
      } catch { return 0; }
    }

    let lastDetailSessionId = null;     // remembers what's currently open so we
                                        // only blur-fade when the open session changes
    function renderDetail() {
      const sessionId = selectedSessionId();
      if (!sessionId) {
        const wasOpen = lastDetailSessionId !== null;
        detailEmpty.hidden = false;
        detailContent.hidden = true;
        if (wasOpen) blurFadeIn(detailEmpty, { duration: 0.9 });
        lastDetailSessionId = null;
        return;
      }
      const sess = findSessionBySessionId(sessionId);
      if (!sess) {
        detailEmpty.hidden = false;
        detailContent.hidden = true;
        lastDetailSessionId = null;
        return;
      }
      const opening = sessionId !== lastDetailSessionId;
      lastDetailSessionId = sessionId;
      detailEmpty.hidden = true;
      detailContent.hidden = false;
      detailContent.style.cssText = sessionColorVars(sessionId);
      const events = sess.events || [];
      dName.textContent = sessionName(sess);
      const sourceEl = document.getElementById("d-source");
      if (sourceEl) sourceEl.textContent = sess?.info?.source || "claude-code";
      dElapsed.textContent = fmtElapsed(sess);
      const turns = deriveTurns(events);

      const latestFlag = latestOpenInsight(sess.observerDecisions);

      dChart.innerHTML = turns.length >= 2 ? renderChartHtml(turns, CHART_TURNS) : "";
      dCodeChart.innerHTML = renderCodeChartHtml(turns, CHART_TURNS);

      const lastViewed = getLastViewed(sessionId);
      const untouchedMs = lastViewed ? (Date.now() - lastViewed) : 0;
      if (lastViewed && untouchedMs >= 5 * 60 * 1000) {
        dUntouched.hidden = false;
        dUntouchedMins.textContent = fmtAge(untouchedMs);
      } else {
        dUntouched.hidden = true;
      }

      renderConversation(sess, turns);
      renderChatThread(sess);
      renderChatInput(sess, latestFlag);

      // when the open session changes (or first opens), blur-fade the detail
      // pane in with a two-tier cascade — the region step is the spine, the
      // leaf step gives every component its own beat. magicui BlurFade flavour,
      // ported. crucial: pre-hide leaves synchronously inside this same frame
      // so detailContent unhiding doesn't flash a fully-visible state for one
      // tick before the stagger starts.
      if (opening && typeof gsap !== "undefined" && !reduceMotionOn()) {
        const REGION_STEP = 0.12;
        const LEAF_STEP = 0.04;
        const plan = [
          { sel: ".session-head",  pick: r => r.querySelectorAll("#d-name, .source") },
          { sel: ".charts-band",   pick: r => r.querySelectorAll("#d-chart, #d-code-chart") },
          { sel: ".conversation",  pick: r => r.children },
          { sel: ".chat-thread",   pick: r => r.children },
          { sel: ".chat-input",    pick: r => r.children },
        ];
        let regionIdx = 0;
        for (const { sel, pick } of plan) {
          const region = detailContent.querySelector(sel);
          if (!region || region.hidden) continue;
          const leaves = Array.from(pick(region));
          if (!leaves.length) continue;
          const base = REGION_STEP * regionIdx;
          gsap.set(leaves, { opacity: 0, filter: "blur(6px)", y: -6 });
          leaves.forEach((el, i) => {
            gsap.to(el, {
              opacity: 1,
              filter: "blur(0px)",
              y: 0,
              duration: 0.75,
              delay: base + LEAF_STEP * i,
              ease: "power2.out",
              clearProps: "filter,y,opacity",
            });
          });
          regionIdx++;
        }
      }
    }

    const DEFAULT_PREFILL = "walk me through what you've done, one piece at a time. pause for my take after each.";
    const chatDrafts = new Map();
    // chat thread state — sessionKey → array of {role, text, ts}.
    // populated by ws "chat:chunk" messages (the server echoes user sends and streams assistant replies).
    const chatThreadByKey = new Map();
    const chatStatusByKey = new Map();
    let convoLastSession = null;
    let convoLastTurnCount = 0;
    // remember which conv-bodies the user has expanded so 5s refresh doesn't snap them shut.
    // keyed (sessionId, role, turnId).
    const expandedBodies = new Set();

    function renderAgentBody(text) {
      // markdown for agent text — feels like inside a claude session.
      // marked is loaded via cdn; if it didn't load, fall back to plain pre-wrap.
      if (typeof marked !== "undefined") {
        const html = marked.parse(String(text || ""), { breaks: true, gfm: true });
        return '<div class="conv-md">' + html + '</div>';
      }
      return '<div class="conv-text">' + escapeHtml(text) + '</div>';
    }

    function renderConversation(sess, turns) {
      const sessionId = sess.info?.sessionId || "";
      if (turns.length === 0) {
        dConversation.innerHTML = '<p class="conv-empty">no turns yet</p>';
        convoLastSession = sessionId;
        convoLastTurnCount = 0;
        return;
      }
      // strict three-message strip: prev-agent → you → agent.
      // older turns are intentionally not shown — the chat input below is the
      // surface for the current ask. agent blocks render as markdown and
      // height-truncate at 240px with a fade + show-full toggle.
      const last = turns[turns.length - 1];
      const prev = turns.length >= 2 ? turns[turns.length - 2] : null;
      const entries = [];
      if (prev && prev.agentText) entries.push({ role: "agent", text: prev.agentText, turnId: prev.id, latest: false });
      if (last.userText) entries.push({ role: "you", text: last.userText, turnId: last.id, latest: false });
      if (last.agentText) entries.push({ role: "agent", text: last.agentText, turnId: last.id, latest: true });

      const html = entries.map((e, i) => {
        const turnCls = "conv-turn" + (e.latest ? " latest" : "");
        const roleCls = "conv-role" + (e.role === "you" ? " you" : "");
        if (e.role === "agent") {
          const expandKey = sessionId + "::" + e.turnId + "::" + (e.latest ? "L" : "P");
          const expanded = expandedBodies.has(expandKey);
          const bodyCls = "conv-body" + (expanded ? " is-expanded" : "");
          return (
            '<div class="' + turnCls + '">' +
              '<div class="' + roleCls + '">' + e.role + '</div>' +
              '<div class="' + bodyCls + '" data-expand-key="' + escapeHtml(expandKey) + '" data-conv-idx="' + i + '">' +
                renderAgentBody(e.text) +
              '</div>' +
              '<button class="conv-toggle hidden" data-conv-idx="' + i + '">show full</button>' +
            '</div>'
          );
        }
        return (
          '<div class="' + turnCls + '">' +
            '<div class="' + roleCls + '">' + e.role + '</div>' +
            '<div class="conv-text">' + escapeHtml(e.text) + '</div>' +
          '</div>'
        );
      }).join("");

      dConversation.innerHTML = html;

      // measure each conv-body — if the rendered content overflows the cap,
      // mark it as truncated (turns on the fade) and reveal the toggle.
      // if the user previously expanded this body, keep it expanded and skip the toggle.
      dConversation.querySelectorAll('.conv-body').forEach((body) => {
        const idx = body.dataset.convIdx;
        const toggle = dConversation.querySelector('.conv-toggle[data-conv-idx="' + idx + '"]');
        const expandKey = body.dataset.expandKey;
        const alreadyExpanded = body.classList.contains('is-expanded');
        if (alreadyExpanded) {
          if (toggle) {
            toggle.classList.remove('hidden');
            toggle.textContent = 'show less';
            toggle.addEventListener('click', () => {
              body.classList.remove('is-expanded');
              body.classList.add('is-truncated');
              expandedBodies.delete(expandKey);
              toggle.textContent = 'show full';
            });
          }
          return;
        }
        const overflow = body.scrollHeight > body.clientHeight + 4;
        if (overflow) {
          body.classList.add('is-truncated');
          if (toggle) {
            toggle.classList.remove('hidden');
            toggle.textContent = 'show full';
            toggle.addEventListener('click', () => {
              body.classList.add('is-expanded');
              body.classList.remove('is-truncated');
              expandedBodies.add(expandKey);
              toggle.textContent = 'show less';
            });
          }
        }
      });

      convoLastSession = sessionId;
      convoLastTurnCount = turns.length;
    }

    /* ambient sprinkle layer — small dots/dashes drifting via gsap yoyo.
       respects prefers-reduced-motion. spawned once on first paint. */
    function spawnSprinkles() {
      const layer = document.querySelector("[data-sprinkles]");
      if (!layer) return;
      const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const COLORS = [
        "#ec4899", "#f9a8d4", "#a855f7", "#fbbf24", "#fde68a",
      ];
      const count = window.innerWidth < 720 ? 14 : 30;
      for (let i = 0; i < count; i++) {
        const s = document.createElement("span");
        s.className = Math.random() < 0.3 ? "sprinkle round" : "sprinkle";
        s.style.background = COLORS[i % COLORS.length];
        s.style.left = (Math.random() * 100) + "%";
        s.style.top = (Math.random() * 200) + "%";
        s.style.transform = "rotate(" + (Math.random() * 360) + "deg)";
        s.style.opacity = (0.5 + Math.random() * 0.35).toFixed(2);
        layer.appendChild(s);
        if (!reduce && typeof gsap !== "undefined") {
          gsap.to(s, {
            y: "+=" + (20 + Math.random() * 30),
            x: "+=" + (-10 + Math.random() * 20),
            rotation: "+=" + (30 + Math.random() * 60),
            duration: 4 + Math.random() * 4,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
            delay: Math.random() * 3,
          });
        }
      }
    }
    spawnSprinkles();

    // hover-burst: when the cursor enters a frosted bar, fling a handful of
    // sprinkles out of its frosting cap. delegated via mouseover (mouseenter
    // doesn't bubble), throttled per bar via dataset timestamp so re-entries
    // don't stack. only bars that actually carry a .bar-frost cap participate
    // (short bars below BAR_FROST_MIN_PCT are skipped automatically).
    const BURST_COLORS = ["#ec4899", "#f9a8d4", "#a855f7", "#fbbf24", "#5dd0c2", "#7c8cf0"];
    function burstSprinkles(bar) {
      if (typeof gsap === "undefined" || reduceMotionOn()) return;
      // radial burst: each sprinkle picks a random angle on the full circle
      // and radiates outward, no fan/fountain. produces a round pop instead of
      // an upward spray. one-stage tween — no second-stage fall.
      // colour palette is dominated by the bar's own color (read from computed
      // style — same source as the frosting `currentColor`), then sprinkled with
      // accent contrast picks from BURST_COLORS for variety.
      const barColor = getComputedStyle(bar).color || "#ec4899";
      const count = 9;
      for (let i = 0; i < count; i++) {
        const s = document.createElement("span");
        s.className = Math.random() < 0.4 ? "sprinkle-burst round" : "sprinkle-burst";
        // ~60% bar-color, ~40% accent palette mix-in
        s.style.background = Math.random() < 0.6
          ? barColor
          : BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
        // start from the rim — center of the bar's top edge.
        s.style.left = "50%";
        s.style.top = "-6px"; // matches the frosting cap rim
        s.style.opacity = "0";
        s.style.transform = "translate(-50%, 0) rotate(" + (Math.random() * 360) + "deg)";
        bar.appendChild(s);
        // angle distributed roughly uniformly on the full circle (small jitter
        // around the index slice so the ring doesn't look perfectly geometric).
        const slice = (Math.PI * 2) / count;
        const angle = slice * i + (Math.random() - 0.5) * slice * 0.7;
        const dist = 30 + Math.random() * 22;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;
        const rot = (Math.random() < 0.5 ? -1 : 1) * (180 + Math.random() * 220);
        const dur = 0.6 + Math.random() * 0.25;
        gsap.timeline({
          onComplete: () => s.remove(),
        })
          .to(s, { opacity: 1, duration: 0.08, ease: "power1.out" }, 0)
          .to(
            s,
            {
              x: dx,
              y: dy,
              rotation: "+=" + rot,
              duration: dur,
              ease: "power2.out",
            },
            0
          )
          .to(s, { opacity: 0, duration: 0.25, ease: "power1.in" }, "-=0.3");
      }
    }
    document.addEventListener("mouseover", (ev) => {
      const target = ev.target;
      if (!(target instanceof Element)) return;
      const bar = target.closest(".cx-bar");
      if (!bar) return;
      if (!bar.querySelector(".bar-frost")) return; // only frosted bars
      const last = parseInt(bar.dataset.burstTs || "0", 10);
      if (Date.now() - last < 800) return; // cooldown so re-entries don't stack
      bar.dataset.burstTs = String(Date.now());
      burstSprinkles(bar);
    });

    // brand mark hover: jump up + 360° roll + drop (port of cutcake's brandJumpRoll).
    // trigger on the brand area (logo + wordmark) so hovering either fires it.
    function brandJumpRoll() {
      if (typeof gsap === "undefined" || reduceMotionOn()) return;
      const mark = document.querySelector(".top-nav .nav-logo");
      const trigger = document.querySelector(".top-nav .nav-left");
      if (!mark || !trigger) return;
      let playing = false;
      trigger.addEventListener("mouseenter", () => {
        if (playing) return;
        playing = true;
        gsap.timeline({
          onComplete: () => {
            gsap.set(mark, { rotation: 0 });
            playing = false;
          },
        })
          .to(mark, { y: -16, duration: 0.28, ease: "expo.out" })
          .to(mark, { rotation: 360, duration: 0.55, ease: "power2.inOut" }, "<0.05")
          .to(mark, { y: 0, duration: 0.45, ease: "expo.out" }, "-=0.25");
      });
    }
    brandJumpRoll();

    function renderChatInput(sess, latestFlag) {
      const sessionKey = sess.key || (sess.info ? sess.info.source + ":" + sess.info.path : "");
      const ctxHtml = latestFlag && latestFlag.insight
        ? '<p class="chat-context">' +
            '<span class="chat-context-label">break it down</span>' +
            escapeHtml(latestFlag.insight) +
          '</p>'
        : '<p class="chat-context muted">' +
            '<span class="chat-context-label">break it down</span>' +
            'no observer flag yet — pick this up and edit it.' +
          '</p>';

      const prefill = (latestFlag && latestFlag.prefill) || DEFAULT_PREFILL;
      const initial = chatDrafts.has(sessionKey) ? chatDrafts.get(sessionKey) : prefill;

      dChatInput.innerHTML =
        ctxHtml +
        '<div class="chat-input-row">' +
          '<textarea rows="2" placeholder="walk me through it…">' + escapeHtml(initial) + '</textarea>' +
          '<button class="send-btn" title="send" aria-label="send">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
              '<line x1="12" y1="19" x2="12" y2="5"/>' +
              '<polyline points="5 12 12 5 19 12"/>' +
            '</svg>' +
          '</button>' +
        '</div>' +
        '<div class="chat-tip">' +
          '<span>tip: ask for smaller steps, rationale, or alternatives</span>' +
          '<span><span class="tip-key">⌘ ↵</span> to send</span>' +
        '</div>';

      const ta = dChatInput.querySelector('textarea');
      const btn = dChatInput.querySelector('.send-btn');
      if (ta) {
        ta.addEventListener('input', e => {
          chatDrafts.set(sessionKey, e.target.value);
        });
        ta.addEventListener('keydown', e => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            btn?.click();
          }
        });
      }
      if (btn) {
        btn.addEventListener('click', async () => {
          const text = (ta && ta.value || "").trim();
          if (!text) return;
          btn.disabled = true;
          try {
            const res = await fetch('/chat/send', {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ sessionKey, text }),
            });
            if (!res.ok) {
              const body = await res.text();
              console.warn('[chat] send failed', res.status, body);
              btn.disabled = false;
              return;
            }
            // server will broadcast chat:chunk back; we just clear the draft so
            // the textarea is ready for the next ask.
            chatDrafts.delete(sessionKey);
            if (ta) ta.value = '';
          } catch (err) {
            console.warn('[chat] send error', err);
            btn.disabled = false;
          }
        });
      }
    }

    function renderChatThread(sess) {
      const sessionKey = sess.key || (sess.info ? sess.info.source + ":" + sess.info.path : "");
      const thread = chatThreadByKey.get(sessionKey) || [];
      const status = chatStatusByKey.get(sessionKey);
      if (!thread.length && (!status || status.status === "idle" || status.status === "spawned")) {
        dChatThread.innerHTML = "";
        return;
      }
      const rowsHtml = thread.map(c => {
        const role = c.role === "user" ? "you" : "agent";
        const cls = c.role === "user" ? "chat-row you" : "chat-row agent";
        const autoBadge = c.role === "user" && c.kind === "auto"
          ? '<span class="chat-auto-tag" title="auto-sent by observer flag">auto</span>'
          : '';
        const body = c.role === "assistant" && typeof marked !== "undefined"
          ? '<div class="chat-body conv-md">' + marked.parse(c.text || "", { breaks: true, gfm: true }) + '</div>'
          : '<div class="chat-body">' + escapeHtml(c.text || "") + '</div>';
        return '<div class="' + cls + '">' +
                 '<div class="chat-role">' + role + autoBadge + '</div>' +
                 body +
               '</div>';
      }).join("");
      let statusHtml = "";
      if (status && status.status === "thinking") {
        statusHtml = '<div class="chat-status thinking">thinking…</div>';
      } else if (status && status.status === "respawning") {
        statusHtml = '<div class="chat-status">reconnecting…</div>';
      } else if (status && status.status === "error") {
        statusHtml = '<div class="chat-status">error: ' + escapeHtml(status.message || "agent stopped") + '</div>';
      }
      dChatThread.innerHTML = rowsHtml + statusHtml;
    }

    function refresh() {
      renderInbox();
      renderDetail();
    }
    window.addEventListener("hashchange", () => {
      const sid = selectedSessionId();
      if (sid) markViewed(sid);
      refresh();
    });
    (() => { const sid = selectedSessionId(); if (sid) markViewed(sid); })();

    setInterval(refresh, 5000);

    function upsertSession(snap) {
      if (!snap || !snap.info) return;
      const key = keyForSnapshot(snap);
      sessionsByKey.set(key, {
        key,
        info: snap.info,
        events: Array.isArray(snap.events) ? snap.events.slice() : [],
        threads: Array.isArray(snap.threads) ? snap.threads.slice() : [],
        lastEventTs: snap.lastEventTs || 0,
        model: snap.model,
        contextTokens: snap.contextTokens || 0,
        totalOutputTokens: snap.totalOutputTokens || 0,
        observerDecisions: Array.isArray(snap.observerDecisions) ? snap.observerDecisions.slice() : [],
        sessionName: snap.sessionName || null,
      });
      // chat thread + status come alongside the snapshot — restore on hello
      // so a page reload doesn't wipe a live conversation.
      if (Array.isArray(snap.chatThread) && snap.chatThread.length) {
        chatThreadByKey.set(key, snap.chatThread.slice());
      }
      if (snap.chatStatus && typeof snap.chatStatus.status === "string") {
        chatStatusByKey.set(key, { status: snap.chatStatus.status, message: snap.chatStatus.message, ts: snap.chatStatus.ts || 0 });
      }
    }

    function appendEvent(sessionKey, ev) {
      const s = sessionsByKey.get(sessionKey);
      if (!s) return false;
      s.events.push(ev);
      if (s.events.length > 6000) s.events.splice(0, s.events.length - 6000);
      if (typeof ev.ts === "number" && ev.ts > (s.lastEventTs || 0)) s.lastEventTs = ev.ts;
      if (ev.kind === "assistant_text") {
        if (ev.model) s.model = ev.model;
        if (typeof ev.inputTokens === "number") s.contextTokens = ev.inputTokens;
        if (typeof ev.tokens === "number") s.totalOutputTokens = (s.totalOutputTokens || 0) + ev.tokens;
      }
      return true;
    }

    function appendThread(sessionKey, thread) {
      const s = sessionsByKey.get(sessionKey);
      if (!s) return false;
      s.threads.push(thread);
      return true;
    }

    function connect() {
      const ws = new WebSocket("ws://" + location.host + "/ws");
      ws.addEventListener("open", () => { reconnectIndicator.hidden = true; });
      ws.addEventListener("message", e => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.kind === "hello") {
          if (typeof msg.autoSendEnabled === "boolean") {
            autoSendEnabled = msg.autoSendEnabled;
            paintAutoSend();
          }
          sessionsByKey.clear();
          const list = Array.isArray(msg.sessions) ? msg.sessions : [];
          for (const snap of list) upsertSession(snap);
          refresh();
        } else if (msg.kind === "session:upsert") {
          upsertSession(msg.session);
          refresh();
        } else if (msg.kind === "event") {
          if (appendEvent(msg.sessionKey, msg.event)) refresh();
        } else if (msg.kind === "thread:new") {
          if (appendThread(msg.sessionKey, msg.thread)) refresh();
        } else if (msg.kind === "observer:decision") {
          const s = sessionsByKey.get(msg.sessionKey);
          if (s) {
            if (!Array.isArray(s.observerDecisions)) s.observerDecisions = [];
            const idx = s.observerDecisions.findIndex(d => d.turnId === msg.decision.turnId);
            if (idx >= 0) s.observerDecisions[idx] = msg.decision;
            else s.observerDecisions.push(msg.decision);
            refresh();
          }
        } else if (msg.kind === "observer:name") {
          const s = sessionsByKey.get(msg.sessionKey);
          if (s) {
            if (msg.name) s.sessionName = msg.name;
            refresh();
          }
        } else if (msg.kind === "chat:chunk") {
          if (msg.chunk && typeof msg.chunk.role === "string" && typeof msg.chunk.text === "string") {
            let arr = chatThreadByKey.get(msg.sessionKey);
            if (!arr) { arr = []; chatThreadByKey.set(msg.sessionKey, arr); }
            arr.push({ role: msg.chunk.role, text: msg.chunk.text, ts: msg.chunk.ts || Date.now(), ...(msg.chunk.kind ? { kind: msg.chunk.kind } : {}) });
            if (arr.length > 200) arr.splice(0, arr.length - 200);
            refresh();
          }
        } else if (msg.kind === "chat:status") {
          if (typeof msg.status === "string") {
            chatStatusByKey.set(msg.sessionKey, { status: msg.status, message: msg.message, ts: msg.ts || Date.now() });
            refresh();
          }
        } else if (msg.kind === "autosend:setting") {
          if (typeof msg.enabled === "boolean") {
            autoSendEnabled = msg.enabled;
            paintAutoSend();
          }
        }
      });
      ws.addEventListener("close", () => {
        reconnectIndicator.hidden = false;
        setTimeout(connect, 1000);
      });
      ws.addEventListener("error", () => {
        reconnectIndicator.hidden = false;
      });
    }

    connect();
    refresh();
  </script>
</body>
</html>
