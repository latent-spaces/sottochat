<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>cut-the-cake</title>
  <link rel="icon" type="image/webp" href="/assets/logo-cake-slice.webp" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      /* paper / surface */
      --bg: #fdf9fa;
      --surface: #ffffff;
      --fg: #1a1a1f;
      --fg-soft: #6e6e7a;
      --fg-muted: #9090a0;
      --border: #efe8eb;
      --border-strong: #dcd2d6;
      --chip-tint: #f5eef1;
      /* operative voice */
      --accent: #ec4899;          /* strawberry */
      --accent-hover: #db2777;
      --accent-soft: #fce7f3;
      /* chart-only second voice */
      --plum: #a855f7;
      /* glass — top nav only */
      --glass-paper: rgba(253, 249, 250, 0.72);
      /* data colors — quarantined to code-changes chart */
      --diff-green: #10b981;
      --diff-red: #ef4444;
      /* type stacks */
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      /* radii */
      --r-input: 8px;
      --r-card: 10px;
      --r-panel: 14px;
      --r-pill: 999px;
      /* motion */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    /* the UA [hidden] rule loses to any explicit `display:` on a class — force it. */
    [hidden] { display: none !important; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      min-height: 100vh;
    }

    /* soft ambient layers — three large blurred blobs sit behind the page,
       a sprinkle layer drifts above them but below cards. neither catches
       pointer events; both respect prefers-reduced-motion. */
    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }
    .blob-1 { width: 520px; height: 520px; background: oklch(94% 0.05 0); top: -120px; left: -160px; opacity: 0.55; }
    .blob-2 { width: 420px; height: 420px; background: oklch(94% 0.06 305); top: 40px; right: -120px; opacity: 0.5; }
    .blob-3 { width: 600px; height: 600px; background: oklch(94% 0.04 280); top: 60vh; left: 28%; opacity: 0.35; }

    .sprinkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .sprinkle {
      position: absolute;
      width: 5px;
      height: 14px;
      border-radius: 999px;
      will-change: transform;
    }
    .sprinkle.round { width: 6px; height: 6px; }

    /* hover-burst sprinkles spawned out of a bar's frosting cap. positioned
       absolute inside the bar — the bar uses overflow:visible already so they
       can fly above the rim. removed from DOM after the gsap timeline finishes. */
    .sprinkle-burst {
      position: absolute;
      pointer-events: none;
      width: 4px;
      height: 9px;
      border-radius: 999px;
      will-change: transform, opacity;
    }
    .sprinkle-burst.round { width: 5px; height: 5px; }

    /* a single cake icon perches somewhere in the detail pane, picked at random
       on every session-open. lives inside its target so it scrolls with it.
       size + anchor are set per-target via inline custom props + an anchor class.
       gsap entrance: drop in from above with blur-fade + soft overshoot. */
    .cake-perch {
      position: absolute;
      width: var(--cake-size, 26px);
      height: var(--cake-size, 26px);
      /* hover trigger needs pointer events; the inner img is what visually
         responds with the jump-roll, so we keep the outer span clickable but
         the cursor stays default. */
      pointer-events: auto;
      cursor: default;
      z-index: 5;
      transform-origin: 50% 100%;
      filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.12));
    }
    .cake-perch img {
      width: 100%;
      height: 100%;
      display: block;
      transform-origin: 50% 100%;
      will-change: transform;
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
    }
    /* anchor variants — left/top/right resolved relative to the target's offset parent. */
    .cake-perch.bar-top {
      left: 50%;
      top: calc(-1 * var(--cake-size, 26px) - 2px);
      transform: translate(-50%, 0) rotate(var(--cake-tilt, 0deg));
    }
    .cake-perch.card-top-right {
      right: 12px;
      top: calc(-1 * var(--cake-size, 36px) * 0.55);
      transform: rotate(var(--cake-tilt, 0deg));
    }
    .cake-perch.head-right {
      right: -8px;
      top: calc(-1 * var(--cake-size, 30px) * 0.4);
      transform: rotate(var(--cake-tilt, 0deg));
    }
    .cake-perch.input-top-right {
      right: 14px;
      top: calc(-1 * var(--cake-size, 36px) * 0.6);
      transform: rotate(var(--cake-tilt, 0deg));
    }
    .cake-perch.legend-corner {
      right: -14px;
      top: -14px;
      transform: rotate(var(--cake-tilt, 0deg));
    }

    /* keep main content above the sprinkle layer */
    main.layout { position: relative; z-index: 1; }

    /* sticky frosted top nav — the only glass surface in the system. */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 56px;
      padding: 0 24px;
      background: var(--glass-paper);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .nav-logo {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      object-fit: contain;
      /* gsap brand-jump hovers will scale + spin from this anchor — cake bottom. */
      transform-origin: 50% 70%;
      will-change: transform;
    }
    .nav-wordmark {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-tag {
      font-size: 12px;
      color: var(--fg-soft);
      white-space: nowrap;
      margin-left: 6px;
    }
    @media (max-width: 720px) { .nav-tag { display: none; } }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .reconnect-indicator {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
    }
    .gh-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
      transition: border-color 200ms var(--ease-out);
    }
    .gh-pill:hover { border-color: var(--accent); }
    .gh-pill .gh-glyph {
      font-family: var(--mono);
      font-size: 13px;
    }
    .gh-pill .gh-star { color: #f4b942; }

    /* global auto-break-down toggle in the top nav. server-authoritative state,
       broadcast over ws so all connected clients stay in sync. */
    .nav-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-pill);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      cursor: pointer;
      transition: border-color 200ms var(--ease-out), background 200ms var(--ease-out);
    }
    .nav-toggle:hover { border-color: var(--accent); }
    .nav-toggle .toggle-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
      box-shadow: none;
      transition: background 160ms var(--ease-out), box-shadow 160ms var(--ease-out);
    }
    .nav-toggle[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .nav-toggle[aria-pressed="true"] .toggle-dot {
      background: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 28%, transparent);
    }
    .nav-toggle .toggle-glyph {
      font-family: var(--mono);
      font-size: 13px;
    }

    main.layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 24px 96px;
      display: flex;
      gap: 0;
      align-items: flex-start;
    }
    /* the panes carry barely-there gradients of two different temperatures —
       sidebar trends rose, detail trends cream — separated by a hairline.
       at full opacity it would read as two coloured panels; at these alphas
       the eye reads "single surface, gently divided." */
    .sidebar {
      flex: 0 0 320px;
      position: sticky;
      top: 80px;
      padding: 4px 22px 20px 0;
      border-right: 1px solid rgba(244, 114, 182, 0.10);
      background: linear-gradient(180deg, rgba(252, 231, 243, 0.32) 0%, rgba(252, 231, 243, 0) 70%);
    }
    .detail-pane {
      flex: 1;
      min-width: 0;
      padding: 4px 0 20px 22px;
      background: linear-gradient(180deg, rgba(255, 244, 232, 0.30) 0%, rgba(255, 244, 232, 0) 70%);
    }
    @media (max-width: 880px) {
      main.layout { flex-direction: column; }
      .sidebar {
        flex: 1 1 auto;
        position: static;
        width: 100%;
        padding: 0 0 16px;
        border-right: none;
        border-bottom: 1px solid rgba(244, 114, 182, 0.10);
      }
      .detail-pane { padding: 16px 0 0; }
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 12px;
    }

    /* detail empty — italic prompt, no illustration */
    .detail-empty {
      padding: 64px 24px;
      text-align: center;
    }
    .detail-empty p {
      color: var(--fg-soft);
      font-style: italic;
      font-size: 14px;
      margin: 0;
    }

    /* inbox separator — divides user-driven sessions (top) from sdk
       subprocesses we spawned ourselves (bottom: chat-agent, observer).
       centered hairline label, mono, muted. sits inline in the cards-list
       flow so the FLIP layout snapshot still works. */
    .inbox-separator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 4px 6px;
      color: var(--fg-muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .inbox-separator::before,
    .inbox-separator::after {
      content: "";
      flex: 1 1 auto;
      height: 0;
      border-top: 1px dashed var(--border);
    }
    .inbox-separator-label {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    /* sidebar inbox */
    .cards { display: grid; gap: 8px; }
    .empty-inbox {
      text-align: center;
      padding: 32px 16px;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 13px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--r-card);
    }

    .card {
      position: relative;
      display: block;
      text-decoration: none;
      color: var(--fg);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 10px 12px;
      overflow: hidden;
      transition: border-color 400ms var(--ease-out),
                  background 200ms var(--ease-out),
                  opacity 400ms var(--ease-out);
    }
    .card:hover { border-color: var(--accent); opacity: 1; }
    .card.live { border-color: var(--accent); }
    .card.idle { opacity: 0.6; }
    /* update flash — fires when a card's data changes mid-session */
    .card.is-updated { animation: card-update 1.6s var(--ease-out); }
    @keyframes card-update {
      0%   { box-shadow: 0 0 0 0 var(--accent-soft); transform: scale(1); }
      18%  { box-shadow: 0 0 0 8px var(--accent-soft); transform: scale(1.022); }
      100% { box-shadow: 0 0 0 0 transparent; transform: scale(1); }
    }
    .card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      opacity: 1;
      /* mascot overlays the card via z-index — no padding reserve, so the
         model tag + other items keep their natural positions. */
    }
    .card-mascot {
      position: absolute;
      right: -2px;
      bottom: 1px;
      width: 36px;
      height: 36px;
      pointer-events: none;
      object-fit: contain;
      z-index: 2;      /* float over the card's text content */
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
      gap: 8px;
    }
    .card-head h3 {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .model-tag {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg-soft);
      background: var(--chip-tint);
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      text-transform: lowercase;
      letter-spacing: 0.04em;
    }
    .card-insight {
      font-size: 13px;
      color: var(--fg);
      line-height: 1.45;
      margin: 4px 0 6px;
    }
    .card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .card-foot {
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      margin: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .card-foot .live-word { color: var(--accent); font-weight: 600; }
    .card-foot .sep { opacity: 0.55; }

    /* chart cards — turn complexity + code changes, panel-style with header pills */
    .chart-card {
      background: linear-gradient(180deg, oklch(98% 0.014 350) 0%, var(--surface) 100%);
      border: 1px solid var(--accent-soft);
      border-radius: var(--r-panel);
      padding: 14px 16px 12px;
      min-width: 0;
    }
    .chart-card.code {
      background: linear-gradient(180deg, oklch(98% 0.012 155) 0%, var(--surface) 100%);
      border-color: oklch(92% 0.06 155);
    }
    .chart-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      min-width: 0;
    }
    .chart-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      flex-shrink: 0;
    }
    .chart-card.code .chart-icon { background: oklch(94% 0.07 155); color: oklch(60% 0.16 155); }
    .chart-icon svg { width: 16px; height: 16px; }
    .chart-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chart-card.code .chart-title { color: oklch(50% 0.14 155); }
    .chart-legend {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .legend-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-soft);
      line-height: 1;
    }
    .legend-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .legend-pill .dot-input { background: var(--accent); opacity: 0.55; }
    .legend-pill .dot-output { background: var(--plum); }
    .legend-pill .dot-added { background: var(--diff-green); }
    .legend-pill .dot-removed { background: var(--diff-red); }

    .chart-body {
      display: flex;
      gap: 8px;
      min-width: 0;
    }
    .cx-yaxis { flex: 0 0 36px; position: relative; height: 130px; }
    .cx-yaxis .tick {
      position: absolute;
      right: 4px;
      transform: translateY(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--fg-muted);
      line-height: 1;
    }
    .cx-yaxis .tick.top { top: 0; }
    .cx-yaxis .tick.mid { top: 50%; }
    .cx-yaxis .tick.bot { top: 100%; }
    .cx-plot {
      flex: 1 1 auto;
      position: relative;
      height: 130px;
      min-width: 0;
    }
    .cx-grid {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px dashed var(--border);
      pointer-events: none;
    }
    .cx-grid.top { top: 0; }
    .cx-grid.mid { top: 50%; }
    .cx-grid.bot { top: 100%; border-top-style: solid; }
    .cx-bars {
      position: absolute;
      inset: 0 0 0 0;
      display: flex;
      align-items: flex-end;
      gap: 4px;
    }
    /* flex distribution — bars share the available width without scrolling */
    .cx-pair {
      flex: 1 1 0;
      min-width: 4px;
      max-width: 56px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      height: 100%;
      position: relative;
    }
    .cx-bar {
      flex: 1 1 0;
      min-height: 1px;
      border-radius: 3px 3px 0 0;
      max-width: 22px;
      position: relative;
      overflow: visible;
    }
    /* dripping-icing cap — silhouette comes from /assets/frosting-new.svg used as
       a mask, the fill is the bar's own `currentColor` (so the bar's opacity
       carries through and frost == bar). edit the svg file to change shape;
       the inline rendering follows automatically. */
    /* the cap is 36px tall; 20% (≈7px) peeks above the bar top, 80% (≈29px) overlaps
       into the bar — most of the drip silhouette lives inside the bar, just the rim
       spills over. only added on bars whose height pct passes BAR_FROST_MIN_PCT
       (see render code) so short bars aren't dwarfed by their own frosting. */
    .bar-frost {
      position: absolute;
      left: -50%;
      right: -50%;
      top: -7px;
      width: 200%;
      height: 36px;
      pointer-events: none;
      display: block;
      /* lighter than the bar so the icing reads as icing, not paint. */
      background-color: currentColor; /* fallback */
      background-color: color-mix(in oklab, currentColor 60%, white 40%);
      -webkit-mask: url("/assets/frosting-new.svg") no-repeat bottom center / contain;
              mask: url("/assets/frosting-new.svg") no-repeat bottom center / contain;
    }
    .bar-input { background: var(--accent); color: var(--accent); opacity: 0.55; }
    .bar-output { background: var(--plum); color: var(--plum); opacity: 0.9; }
    .cx-pair.latest .bar-output { background: var(--plum); color: var(--plum); opacity: 1; }
    .bar-added { background: var(--diff-green); color: var(--diff-green); opacity: 0.9; }
    .bar-removed { background: var(--diff-red); color: var(--diff-red); opacity: 0.9; }

    .chart-foot {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
      padding-right: 4px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
    }

    /* detail page */
    .session-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin: 4px 0 24px;
    }
    .session-head h2 {
      font-size: 26px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--accent);
    }
    .session-head .source {
      font-size: 13px;
      color: var(--fg-soft);
      margin: 0;
      font-family: var(--mono);
    }
    .session-head .source .src-glyph { color: var(--accent); margin-right: 4px; }

    /* inline glance — agent-message bar + added/removed bars on each session card.
       latest-turn summary; the chevron in the detail header toggles the full charts band. */
    .mini-stats {
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      height: 16px;
      pointer-events: none;
    }
    .mini-stats .mini-bar {
      width: 4px;
      min-height: 2px;
      border-radius: 2px 2px 0 0;
      align-self: flex-end;
      transition: height 0.45s var(--ease-out);
    }
    .mini-stats .mb-output  { background: var(--plum); }
    .mini-stats .mb-added   { background: var(--diff-green); }
    .mini-stats .mb-removed { background: var(--diff-red); }
    .mini-stats .mini-sep {
      width: 1px;
      height: 10px;
      background: var(--border);
      align-self: flex-end;
      margin: 0 2px 1px;
    }

    .charts-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 22px;
      padding: 0 8px;
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--fg-soft);
      cursor: pointer;
      transition: background 0.15s var(--ease-out), color 0.15s var(--ease-out), border-color 0.15s var(--ease-out);
    }
    .charts-toggle:hover { background: var(--chip-tint); color: var(--accent); border-color: var(--accent-soft); }
    .charts-toggle .chev { transition: transform 0.2s var(--ease-out); display: block; }
    .charts-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
    .charts-toggle[aria-expanded="true"] { color: var(--accent); border-color: var(--accent-soft); background: var(--accent-soft); }

    .untouched-line {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
      margin: 0 0 8px;
      padding-left: 2px;
    }

    /* instrument band — sits between the summary panel and the conversation strip.
       two columns always; if one chart has nothing to render, its slot stays
       empty rather than the other chart stretching to full width. */
    .charts-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 0 0 20px;
    }
    .charts-band > * { min-width: 0; }
    #d-chart { grid-column: 1; }
    #d-code-chart { grid-column: 2; }
    /* when only one of the two charts has content, give it the full row instead
       of leaving an empty half-column slot. */
    .charts-band.single-chart { grid-template-columns: 1fr; }
    .charts-band.single-chart > * { grid-column: 1; }
    @media (max-width: 880px) {
      .charts-band { grid-template-columns: 1fr; }
      #d-chart, #d-code-chart { grid-column: 1; }
    }

    /* video-pane — karaoke playback of the latest scriptifier turn. lives between
       the charts-band and the conversation strip and offers an alternative way
       to consume the same turn. soft pink wash on top so it reads as its own
       surface. all motion respects prefers-reduced-motion. */
    .video-pane {
      background: linear-gradient(180deg, color-mix(in oklab, var(--accent) 8%, var(--surface)) 0%, var(--surface) 60%);
      border: 1px solid color-mix(in oklab, var(--accent) 20%, transparent);
      border-radius: var(--r-panel);
      padding: 16px 20px;
      margin: 0 0 20px;
    }
    .video-pane-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .video-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
    }
    .video-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.04em;
      color: var(--fg-muted);
      text-transform: lowercase;
      margin-left: auto;
    }
    .video-status-pill .vsp-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .video-status-pill.rendering .vsp-dot {
      background: var(--accent);
      animation: vsp-pulse 1.4s infinite ease-in-out;
    }
    .video-status-pill.ready .vsp-dot { background: #10b981; }
    .video-status-pill.error .vsp-dot { background: #ef4444; }
    @keyframes vsp-pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.85); }
      50%      { opacity: 1;    transform: scale(1.15); }
    }
    .video-duration {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg-soft);
      letter-spacing: 0.04em;
    }
    .video-pane-stage {
      position: relative;
      min-height: 120px;
      max-height: 320px;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: color-mix(in oklab, var(--accent) 30%, transparent) transparent;
    }
    .video-pane-stage::-webkit-scrollbar { width: 6px; }
    .video-pane-stage::-webkit-scrollbar-thumb {
      background: color-mix(in oklab, var(--accent) 30%, transparent);
      border-radius: 3px;
    }
    .video-beat {
      font-size: 16px;
      line-height: 1.45;
      color: var(--fg);
      opacity: 0.35;
      font-weight: 400;
      transition: opacity 380ms cubic-bezier(0.22, 1, 0.36, 1),
                  font-size 380ms cubic-bezier(0.22, 1, 0.36, 1),
                  font-weight 380ms cubic-bezier(0.22, 1, 0.36, 1),
                  color 380ms cubic-bezier(0.22, 1, 0.36, 1);
      word-break: break-word;
    }
    .video-beat.past    { opacity: 0.55; }
    .video-beat.current {
      opacity: 1;
      font-size: 22px;
      font-weight: 500;
      color: var(--fg);
    }
    .video-beat.future  { opacity: 0.35; }
    .video-beat.has-marker {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .vb-word {
      display: inline-block;
      padding: 0 1px;
      border-radius: 3px;
      transition: background 200ms cubic-bezier(0.22, 1, 0.36, 1),
                  color 200ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .vb-word.played {
      background: color-mix(in oklab, var(--accent) 12%, transparent);
    }
    .vb-word.active {
      background: var(--marker-tint, color-mix(in oklab, var(--accent) 28%, transparent));
      padding: 0 2px;
      border-radius: 3px;
      font-weight: 600;
    }
    .vb-word.emph {
      color: var(--accent);
      font-weight: 600;
    }
    .video-marker {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      margin-right: 8px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 11px;
      flex-shrink: 0;
    }
    .video-marker.INSIGHT,
    .video-marker.PUNCHLINE   { background: #fde68a; color: #78350f; border: 1px solid #fbbf24; }
    .video-marker.BE_CAREFUL,
    .video-marker.GOTCHA      { background: #fed7aa; color: #7c2d12; border: 1px solid #fb923c; }
    .video-marker.STEP,
    .video-marker.PIVOT       { background: #dbeafe; color: #1e3a8a; border: 1px solid #60a5fa; }
    .video-marker.NOTE,
    .video-marker.ASIDE       { background: var(--bg); color: var(--fg-muted); border: 1px dashed color-mix(in oklab, var(--fg-muted) 40%, transparent); }

    /* marker-style picker — three small toggles in the video-pane-head row.
       hidden if the active script has no markers. mono uppercase, current style
       carries aria-pressed=true + accent border. */
    .video-marker-picker {
      display: inline-flex;
      align-items: center;
      gap: 0;
      margin-left: 8px;
      padding: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      overflow: hidden;
      flex-shrink: 0;
    }
    .vmp-btn {
      appearance: none;
      background: transparent;
      border: none;
      padding: 0 8px;
      height: 18px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--fg-muted);
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.12s var(--ease-out), background 0.12s var(--ease-out);
    }
    .vmp-btn:hover { color: var(--fg); }
    .vmp-btn[aria-pressed="true"] {
      color: var(--accent);
      background: color-mix(in oklab, var(--accent) 14%, transparent);
      font-weight: 600;
    }
    .vmp-divider {
      width: 1px;
      align-self: stretch;
      background: var(--border);
      flex: 0 0 auto;
    }

    /* voice picker — per-session TTS voice override. lives in the head row at
       the leftmost picker slot (voice → script-style → markers reads L→R, since
       voice and style affect the SCRIPT itself while markers are render-only).
       compact at rest (just current label + chevron); click expands a popover
       with all three options. shares .vmp-btn typography with the other pickers
       but the wrapper is position:relative for the dropdown. */
    .video-voice-picker {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .video-voice-current {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      height: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--fg-muted);
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.12s var(--ease-out), border-color 0.12s var(--ease-out), background 0.12s var(--ease-out);
    }
    .video-voice-current:hover {
      color: var(--fg);
      border-color: var(--border-strong);
    }
    .video-voice-current[aria-expanded="true"] {
      color: var(--accent);
      border-color: color-mix(in oklab, var(--accent) 50%, transparent);
      background: color-mix(in oklab, var(--accent) 10%, transparent);
    }
    .video-voice-current .vvp-chev {
      width: 8px;
      height: 8px;
      opacity: 0.6;
    }
    .video-voice-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      z-index: 10;
      min-width: 130px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 28px -12px rgba(0, 0, 0, 0.22);
    }
    .video-voice-option {
      appearance: none;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 8px;
      background: transparent;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s var(--ease-out), color 0.1s var(--ease-out);
    }
    .video-voice-option:hover {
      background: color-mix(in oklab, var(--accent) 10%, transparent);
    }
    .video-voice-option[aria-pressed="true"] {
      background: color-mix(in oklab, var(--accent) 14%, transparent);
    }
    .video-voice-option .vvp-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--fg);
      text-transform: uppercase;
    }
    .video-voice-option[aria-pressed="true"] .vvp-label {
      color: var(--accent);
      font-weight: 600;
    }
    .video-voice-option .vvp-accent {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg-muted);
      letter-spacing: 0.04em;
    }

    /* style 2: banner — full-bleed overlay across the stage when entering a
       marked beat. lives inside .video-pane-stage (position:relative).
       z-index above beat stack but below page-level controls. */
    .video-banner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 18px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
      pointer-events: none;
      z-index: 5;
      border-bottom: 1px solid color-mix(in oklab, var(--fg) 12%, transparent);
      box-shadow: 0 6px 24px -16px rgba(0, 0, 0, 0.35);
    }
    .video-banner .vbn-label {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .video-banner .vbn-text {
      font-size: 22px;
      line-height: 1.3;
      font-weight: 500;
    }
    .video-banner.INSIGHT,
    .video-banner.PUNCHLINE   { background: #fde68a; color: #78350f; }
    .video-banner.BE_CAREFUL,
    .video-banner.GOTCHA      { background: #fed7aa; color: #7c2d12; }
    .video-banner.STEP,
    .video-banner.PIVOT       { background: #dbeafe; color: #1e3a8a; }
    .video-banner.NOTE,
    .video-banner.ASIDE       { background: var(--bg); color: var(--fg-muted); border-bottom: 1px dashed color-mix(in oklab, var(--fg-muted) 40%, transparent); }

    /* style 3: corner — small glyph + label in the video-pane-head while the
       current beat is marked. tints the active-word highlight via --marker-tint
       set on .video-pane inline. */
    .video-marker-corner {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 18px;
      padding: 0 8px;
      border-radius: var(--r-pill);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .video-marker-corner svg { width: 12px; height: 12px; flex-shrink: 0; }
    .video-marker-corner.INSIGHT,
    .video-marker-corner.PUNCHLINE  { background: #fde68a; color: #78350f; border: 1px solid #fbbf24; }
    .video-marker-corner.BE_CAREFUL,
    .video-marker-corner.GOTCHA     { background: #fed7aa; color: #7c2d12; border: 1px solid #fb923c; }
    .video-marker-corner.STEP,
    .video-marker-corner.PIVOT      { background: #dbeafe; color: #1e3a8a; border: 1px solid #60a5fa; }
    .video-marker-corner.NOTE,
    .video-marker-corner.ASIDE      { background: var(--bg); color: var(--fg-muted); border: 1px dashed color-mix(in oklab, var(--fg-muted) 40%, transparent); }

    /* style 4: stamp — round rubber-stamp svg lands inline before the beat
       text. lives inside .video-beat.has-marker-stamp; the beat element flips
       to a horizontal flex layout so the stamp sits to the left of the line.
       per-marker tint is set via inline style from MARKER_COLORS. */
    .video-beat.has-marker-stamp {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }
    .video-stamp {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform-origin: center;
      will-change: transform, opacity;
    }
    .video-stamp svg { width: 100%; height: 100%; display: block; }
    .video-stamp .vst-text {
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    /* style 5: ticker — pill scrolls horizontally across the stage bottom on
       entry. queue handled in JS so multiple markers stack instead of stomp. */
    .video-ticker-track {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 6px;
      height: 22px;
      pointer-events: none;
      overflow: hidden;
      z-index: 4;
    }
    .video-ticker {
      position: absolute;
      top: 0;
      left: 0;
      height: 22px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 11px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      will-change: transform, opacity;
    }
    .video-ticker .vtk-label { font-weight: 700; }
    .video-ticker .vtk-text {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0.85;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .video-ticker.INSIGHT,
    .video-ticker.PUNCHLINE   { background: #fde68a; color: #78350f; border: 1px solid #fbbf24; }
    .video-ticker.BE_CAREFUL,
    .video-ticker.GOTCHA      { background: #fed7aa; color: #7c2d12; border: 1px solid #fb923c; }
    .video-ticker.STEP,
    .video-ticker.PIVOT       { background: #dbeafe; color: #1e3a8a; border: 1px solid #60a5fa; }
    .video-ticker.NOTE,
    .video-ticker.ASIDE       { background: var(--bg); color: var(--fg-muted); border: 1px dashed color-mix(in oklab, var(--fg-muted) 40%, transparent); }

    /* style 6: halo — soft pulsing box-shadow on the active marked beat.
       no inline marker treatment; the colour comes from the per-marker class
       so JS only toggles the wrapper class, gsap drives the box-shadow tween.
       persistent-but-soft alternative to discrete pill/banner treatments. */
    .video-beat.video-halo {
      border-radius: 10px;
      padding: 6px 10px;
      margin: 0 -10px;
      will-change: box-shadow;
    }
    .video-pane-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid color-mix(in oklab, var(--accent) 14%, transparent);
    }

    /* per-beat bookmark icon — tucked in the top-right of every .video-beat.
       hidden at rest (opacity 0); revealed on hover or while the beat is the
       .current one. .is-on flips it to filled accent so already-bookmarked
       beats show up clearly. small right-padding on the beat so the long-form
       wordSpans don't flow under the icon. */
    .video-beat { position: relative; padding-right: 22px; }
    .vb-bookmark {
      position: absolute;
      top: 2px;
      right: 0;
      width: 18px;
      height: 18px;
      padding: 2px;
      border: 0;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      opacity: 0;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 160ms var(--ease-out), color 160ms var(--ease-out), background 160ms var(--ease-out);
    }
    .vb-bookmark svg { width: 14px; height: 14px; display: block; }
    .video-beat:hover .vb-bookmark,
    .video-beat.current .vb-bookmark { opacity: 0.7; }
    .vb-bookmark:hover {
      opacity: 1 !important;
      color: var(--accent);
      background: color-mix(in oklab, var(--accent) 12%, transparent);
    }
    .vb-bookmark.is-on {
      opacity: 1 !important;
      color: var(--accent);
    }

    /* bookmark chips row — sits between the karaoke stage and the controls
       row. mono caption-style; chips are pills with the beat number; each
       chip click seeks the audio to that beat. hidden when zero bookmarks. */
    .video-bookmarks {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 11px;
    }
    .video-bookmarks-label {
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 10px;
      font-weight: 600;
    }
    .video-bookmark-chip {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 8px;
      background: var(--surface);
      border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
      border-radius: var(--r-pill);
      color: var(--fg);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      transition: transform 140ms var(--ease-out), border-color 140ms var(--ease-out), background 140ms var(--ease-out);
    }
    .video-bookmark-chip:hover {
      transform: scale(1.04);
      border-color: var(--accent);
      background: color-mix(in oklab, var(--accent) 10%, transparent);
    }
    .video-bookmark-clear {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: transparent;
      border: 0;
      cursor: pointer;
      padding: 2px 4px;
      text-transform: lowercase;
    }
    .video-bookmark-clear:hover { text-decoration: underline; }

    .video-play-btn {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      background: var(--accent);
      border: none;
      border-radius: var(--r-input);
      cursor: pointer;
      box-shadow: 0 6px 20px -10px rgba(236, 72, 153, 0.55);
      transition: background 0.15s var(--ease-out), transform 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .video-play-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px -12px rgba(236, 72, 153, 0.65);
    }
    .video-play-btn:disabled {
      background: var(--border-strong);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .video-play-btn svg {
      width: 18px;
      height: 18px;
      color: #fff;
      pointer-events: none;
    }
    /* frosting cap for the play button — same mask-trick as .bar-frost.
       sits ~25% above the rim, ~75% inside; lighter than the button so the
       icing reads as icing not paint. button is 44px wide, cap is ~24px tall.
       hidden when the button is disabled (loading/rendering) so the brand
       flourish only shows up when the script is actually ready to play. */
    .video-play-btn { position: relative; overflow: visible; }
    .play-frost {
      position: absolute;
      left: -20%;
      right: -20%;
      top: -6px;
      width: 140%;
      height: 24px;
      pointer-events: none;
      display: block;
      background-color: var(--accent);
      background-color: color-mix(in oklab, var(--accent) 60%, white 40%);
      -webkit-mask: url("/assets/frosting-new.svg") no-repeat bottom center / contain;
              mask: url("/assets/frosting-new.svg") no-repeat bottom center / contain;
      transition: opacity 160ms var(--ease-out);
    }
    .video-play-btn:disabled .play-frost { opacity: 0.3; }
    .video-scrub {
      flex: 1 1 auto;
      position: relative;
      height: 4px;
      background: color-mix(in oklab, var(--accent) 14%, transparent);
      border-radius: 999px;
      cursor: pointer;
      transition: height 160ms var(--ease-out);
    }
    .video-scrub:hover { height: 6px; }
    .video-scrub-fill {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 0%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 80ms linear;
    }
    .video-time {
      flex: 0 0 auto;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-soft);
      letter-spacing: 0.04em;
      min-width: 80px;
      text-align: right;
    }
    .video-attribution {
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg-muted);
      font-style: italic;
      text-align: right;
      letter-spacing: 0.04em;
    }
    .video-error-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: #b91c1c;
      padding: 6px 0;
    }

    /* export-mp4 button — small action chip in the video-pane-controls row.
       three states share one slot: "export mp4" (idle, clickable),
       "rendering 0:23" (mid-render with elapsed timer), "download mp4" (anchor).
       sits at the right edge of the controls row, after the time label. */
    .video-export {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      padding: 0 12px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--surface);
      border: 1px solid color-mix(in oklab, var(--accent) 35%, transparent);
      border-radius: var(--r-pill);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.12s var(--ease-out), color 0.12s var(--ease-out), border-color 0.12s var(--ease-out);
      appearance: none;
    }
    .video-export:hover {
      background: color-mix(in oklab, var(--accent) 12%, transparent);
      border-color: color-mix(in oklab, var(--accent) 55%, transparent);
    }
    .video-export:disabled {
      cursor: default;
      color: var(--fg-muted);
      border-color: var(--border);
      background: transparent;
    }
    .video-export.is-rendering {
      color: var(--fg-muted);
      cursor: progress;
    }
    .video-export.is-ready {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }
    .video-export.is-ready:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    .video-export.is-error {
      color: #b91c1c;
      border-color: #fecaca;
    }
    .video-export .ve-spinner {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: vsp-pulse 1.4s infinite ease-in-out;
    }
    .video-export-error-msg {
      flex: 0 0 auto;
      font-family: var(--mono);
      font-size: 10px;
      color: #b91c1c;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* conversation panel — last user/agent exchange, panel-style like the chart cards
       and chat-input. messages render as whatsapp-style chat bubbles: user on the
       right (accent tint), agent on the left (paper tint). when the latest signal
       is from the user, a typing indicator stands in for the not-yet-arrived agent
       reply and the chat-input below is hidden. */
    .conversation {
      background: linear-gradient(180deg, oklch(98% 0.014 350) 0%, var(--surface) 100%);
      border: 1px solid var(--accent-soft);
      border-radius: var(--r-panel);
      padding: 14px 16px 16px;
      margin: 0 0 20px;
    }
    .conv-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      min-width: 0;
    }
    .conv-head-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      flex-shrink: 0;
    }
    .conv-head-icon svg { width: 16px; height: 16px; }
    .conv-head-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 1 1 auto;
    }
    .conv-head-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      flex-shrink: 0;
    }
    .conv-stream {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .conv-msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }
    .conv-msg.from-agent { align-self: flex-start; align-items: flex-start; }
    .conv-msg.from-you   { align-self: flex-end;   align-items: flex-end; }
    .conv-msg-meta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin: 0 6px 3px;
    }
    .conv-msg.from-you .conv-msg-meta { color: var(--accent); }
    .conv-bubble {
      position: relative;
      padding: 10px 14px;
      border: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .conv-msg.from-agent .conv-bubble {
      background: oklch(98% 0.014 340);
      border-radius: 14px 14px 14px 4px;
    }
    .conv-msg.from-you .conv-bubble {
      background: var(--accent-soft);
      border-color: oklch(92% 0.07 340);
      color: var(--fg);
      border-radius: 14px 14px 4px 14px;
      white-space: pre-wrap;
    }
    /* typing indicator — three dots inside an agent-style bubble. */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--fg-muted);
      animation: conv-typing 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes conv-typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .typing-dots span { animation: none; opacity: 0.6; }
    }
    .conv-turn { display: flex; flex-direction: column; gap: 4px; }
    .conv-role {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .conv-role.you { color: var(--accent); }
    .conv-text {
      font-size: 14px;
      line-height: 1.55;
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .conv-empty {
      text-align: center;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 13px;
      padding: 16px 0 4px;
    }

    /* markdown body for agent messages — claude-session-style formatting */
    .conv-md { font-size: 14px; line-height: 1.6; color: var(--fg); max-width: 78ch; }
    .conv-md > *:first-child { margin-top: 0; }
    .conv-md > *:last-child { margin-bottom: 0; }
    .conv-md p { margin: 0 0 10px; }
    .conv-md h1, .conv-md h2, .conv-md h3, .conv-md h4 {
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 14px 0 6px;
    }
    .conv-md h1 { font-size: 17px; }
    .conv-md h2 { font-size: 16px; }
    .conv-md h3 { font-size: 15px; }
    .conv-md h4 { font-size: 14px; }
    .conv-md ul, .conv-md ol { padding-left: 22px; margin: 6px 0 10px; }
    .conv-md li { margin: 2px 0; }
    .conv-md li > p { margin: 0; }
    .conv-md code {
      font-family: var(--mono);
      font-size: 12.5px;
      background: var(--chip-tint);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .conv-md pre {
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.55;
      background: oklch(96% 0.012 340);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .conv-md pre code { background: none; padding: 0; border-radius: 0; font-size: 12.5px; }
    .conv-md a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .conv-md a:hover { color: var(--accent-hover); }
    .conv-md strong { font-weight: 600; }
    .conv-md em { font-style: italic; }
    .conv-md blockquote {
      margin: 8px 0;
      padding: 4px 0 4px 14px;
      border-left: 2px solid var(--border-strong);
      color: var(--fg-soft);
      font-style: italic;
    }
    .conv-md hr { border: 0; border-top: 1px dashed var(--border-strong); margin: 14px 0; }

    /* height-based tail: cap collapsed agent blocks, fade + toggle when truncated */
    .conv-body {
      position: relative;
      max-height: 240px;
      overflow: hidden;
      transition: max-height 280ms var(--ease-out);
    }
    .conv-body.is-truncated::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 70px;
      background: linear-gradient(to bottom, transparent, oklch(98% 0.014 340) 90%);
      pointer-events: none;
    }
    .conv-body.is-expanded { max-height: none; }
    .conv-body.is-expanded::after { display: none; }
    .conv-toggle {
      align-self: flex-start;
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
    }
    .conv-toggle:hover { color: var(--accent-hover); }
    .conv-toggle.hidden { display: none; }

    .ambient-quiet {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fg-muted);
      padding: 8px 2px;
      margin: 0;
    }

    /* chat input — single row below the conversation tail */
    .chat-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-panel);
      padding: 14px 16px;
    }
    /* quick-reply pills — sit above the textarea once the conversation is live.
       click sends the pill's text through the same /chat/send path. */
    .chat-quickreplies {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .quick-pill {
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s var(--ease-out), border-color 0.15s var(--ease-out), color 0.15s var(--ease-out);
    }
    .quick-pill:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
    .quick-pill:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .chat-input-row textarea {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      padding: 10px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-input);
      resize: vertical;
      min-height: 44px;
      background: var(--bg);
      color: var(--fg);
      transition: border-color 160ms var(--ease-out), background 160ms var(--ease-out);
    }
    .chat-input-row textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
    }
    .chat-input-row .send-btn {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      align-self: flex-end;
      background: var(--accent);
      border: none;
      border-radius: var(--r-input);
      cursor: pointer;
      box-shadow: 0 6px 20px -10px rgba(236, 72, 153, 0.55);
      transition: background 0.15s var(--ease-out), transform 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .chat-input-row .send-btn svg {
      width: 20px;
      height: 20px;
      color: #fff;
      pointer-events: none;
    }
    .chat-input-row .send-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px -12px rgba(236, 72, 153, 0.65);
    }
    .chat-input-row .send-btn:disabled {
      background: var(--border-strong);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .chat-input-row .send-btn:disabled svg { opacity: 0.5; }
    .chat-sent {
      margin-top: 8px;
      font-size: 12px;
      color: var(--fg-soft);
      font-style: italic;
    }

    /* chat thread — between conversation and chat input. populated by /chat/send
       replies. visually mirrors the conversation panel: user on the right with
       an accent-soft bubble, agent on the left with a paper-soft bubble. when
       the chat-agent is thinking, a typing bubble stands in for the next reply. */
    .chat-thread {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 0 0 16px;
    }
    .chat-thread:empty { display: none; }
    /* "show N earlier" toggle that appears at the top of a chat-thread once
       there are more than two messages. matches .conv-toggle's muted-mono
       look so it sits as a quiet meta-control above the bubbles. */
    .chat-history-toggle {
      align-self: center;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--fg-muted);
      background: none;
      border: 1px dashed var(--border);
      border-radius: 999px;
      cursor: pointer;
    }
    .chat-history-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .chat-row {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }
    .chat-row.you   { align-self: flex-end;   align-items: flex-end; }
    .chat-row.agent { align-self: flex-start; align-items: flex-start; }
    .chat-row .chat-role {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin: 0 6px 3px;
    }
    .chat-row.you .chat-role { color: var(--accent); }
    .chat-row .chat-auto-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 999px;
      vertical-align: middle;
    }
    .chat-row .chat-body {
      position: relative;
      padding: 10px 14px;
      border: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.55;
      color: var(--fg);
      word-break: break-word;
    }
    .chat-row.agent .chat-body {
      background: oklch(98% 0.014 340);
      border-radius: 14px 14px 14px 4px;
    }
    .chat-row.you .chat-body {
      background: var(--accent-soft);
      border-color: oklch(92% 0.07 340);
      border-radius: 14px 14px 4px 14px;
      white-space: pre-wrap;
    }
    /* status row — paper-bubble with a typing dots animation while the
       chat-agent is generating, plain hairline note for respawn / error. */
    .chat-status {
      align-self: flex-start;
      max-width: 78%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
      background: oklch(98% 0.014 340);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
    }
    .chat-status.thinking { color: var(--fg-muted); }
    .chat-status.respawn,
    .chat-status.error { font-style: italic; }

    code, .mono { font-family: var(--mono); font-size: 13px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0ms !important;
        animation-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>
  <div class="sprinkles" aria-hidden="true" data-sprinkles></div>

  <header class="top-nav">
    <div class="nav-left">
      <img class="nav-logo" src="/assets/logo-cake-slice.webp" alt="" />
      <a class="nav-wordmark" href="#">cut-the-cake</a>
      <span class="nav-tag">turn long agent runs into a quick iterative chat</span>
    </div>
    <div class="nav-right">
      <span class="reconnect-indicator" id="reconnect-indicator" hidden>reconnecting…</span>
      <button class="nav-toggle" id="autosend-toggle" type="button" aria-pressed="true" aria-label="auto break-down">
        <span class="toggle-dot" aria-hidden="true"></span>
        <span class="toggle-glyph">⚡</span>
        <span class="toggle-label">auto break-down</span>
      </button>
      <a class="gh-pill" href="https://github.com/oronanschel/cut-the-cake" target="_blank" rel="noreferrer noopener" aria-label="GitHub repo">
        <span class="gh-glyph">★</span>
        <span class="gh-star" id="gh-star">—</span>
      </a>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <h2 class="section-label">sessions</h2>
      <p class="ambient-quiet" id="ambient-quiet" hidden>quiet</p>
      <div class="cards" id="cards">
        <div class="empty-inbox" id="inbox-empty">no active session detected — start claude code in a project</div>
      </div>
    </aside>

    <section class="detail-pane" id="detail-pane">
      <div class="detail-empty" id="detail-empty">
        <p>select a session</p>
      </div>
      <article class="detail-content" id="detail-content" hidden>
        <div class="session-head">
          <h2 id="d-name">—</h2>
          <p class="source"><span class="src-glyph">◆</span><span id="d-source">claude-code</span> · <span id="d-elapsed">—</span></p>
          <button class="charts-toggle" id="d-charts-toggle" type="button" aria-expanded="false" aria-controls="d-charts-band" title="show charts">
            <svg class="chev" viewBox="0 0 12 8" width="10" height="7" aria-hidden="true"><path d="M1 1.5l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <p class="untouched-line" id="d-untouched" hidden>untouched for <span id="d-untouched-mins">—</span></p>

        <div class="charts-band" id="d-charts-band" hidden>
          <div id="d-chart"></div>
          <div id="d-code-chart"></div>
        </div>

        <div class="video-pane" id="d-video-pane" hidden></div>

        <div class="conversation" id="d-conversation"></div>
        <div class="chat-thread" id="d-chat-thread"></div>
        <div class="chat-input" id="d-chat-input"></div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    // dom
    const cardsEl = document.getElementById("cards");
    const inboxEmpty = document.getElementById("inbox-empty");
    const ambientQuiet = document.getElementById("ambient-quiet");
    const reconnectIndicator = document.getElementById("reconnect-indicator");
    const detailEmpty = document.getElementById("detail-empty");
    const detailContent = document.getElementById("detail-content");
    const dName = document.getElementById("d-name");
    const dElapsed = document.getElementById("d-elapsed");
    const dUntouched = document.getElementById("d-untouched");
    const dUntouchedMins = document.getElementById("d-untouched-mins");
    const dChart = document.getElementById("d-chart");
    const dCodeChart = document.getElementById("d-code-chart");
    const dChartsToggle = document.getElementById("d-charts-toggle");
    const dChartsBand = document.getElementById("d-charts-band");
    const dConversation = document.getElementById("d-conversation");
    const dVideoPane = document.getElementById("d-video-pane");
    const dChatThread = document.getElementById("d-chat-thread");
    const dChatInput = document.getElementById("d-chat-input");
    const autoSendToggle = document.getElementById("autosend-toggle");

    // global state for the auto-break-down toggle. authoritative value comes from
    // the server's hello payload + autosend:setting ws msgs; the local optimistic
    // flip on click is just snappier than waiting for the ws round-trip.
    let autoSendEnabled = true;
    function paintAutoSend() {
      if (!autoSendToggle) return;
      autoSendToggle.setAttribute("aria-pressed", autoSendEnabled ? "true" : "false");
      const lbl = autoSendToggle.querySelector(".toggle-label");
      if (lbl) lbl.textContent = autoSendEnabled ? "auto break-down" : "auto break-down · off";
    }
    paintAutoSend();
    if (autoSendToggle) {
      autoSendToggle.addEventListener("click", async () => {
        const next = !autoSendEnabled;
        autoSendEnabled = next; paintAutoSend(); // optimistic
        try {
          const res = await fetch("/chat/auto-send", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ enabled: next }),
          });
          if (!res.ok) {
            console.warn("[autosend] toggle failed", res.status);
            autoSendEnabled = !next; paintAutoSend(); // revert on failure
          }
        } catch (err) {
          console.warn("[autosend] toggle error", err);
          autoSendEnabled = !next; paintAutoSend();
        }
      });
    }

    // state thresholds
    const LIVE_MS = 30 * 1000;          // <30s = live
    const IDLE_MS = 5 * 60 * 1000;      // >5m = idle
    const AMBIENT_MS = 5 * 60 * 1000;   // all sessions idle this long → quiet collapse

    // assets
    const MASCOT_ACTIVE = "/assets/mascot-uni-2.svg";
    const MASCOT_IDLE = "/assets/mascot-uni-1.svg";

    // motion helpers — magicui-style ports.
    // blurFadeIn = the BlurFade pattern: opacity 0 + blur(8px) + small y offset → reveal.
    // blurFadeStagger = run blurFadeIn on a list of nodes with a small staggered delay.
    function reduceMotionOn() {
      return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    }
    function blurFadeIn(el, opts) {
      if (!el || typeof gsap === "undefined" || reduceMotionOn()) return;
      const o = opts || {};
      // ported from magicui blur-fade.tsx defaults: y: -offset (direction "down"),
      // blur 6px, ease easeOut, base delay 0.04. duration bumped above the 0.4s
      // source default to land closer to the slower feel we settled on.
      gsap.fromTo(el,
        { opacity: 0, filter: "blur(6px)", y: -6 },
        {
          opacity: 1,

          " · you: " + d.input + "w";
        return (
          '<div class="cx-pair' + (isLast ? " latest" : "") + '" title="' + escapeHtml(tip) + '">' +
            '<div class="cx-bar bar-input" style="height: ' + inputH + '%">' + (inputH >= BAR_FROST_MIN_PCT ? BAR_FROST : '') + '</div>' +
            '<div class="cx-bar bar-output" style="height: ' + outputH + '%">' + (outputH >= BAR_FROST_MIN_PCT ? BAR_FROST : '') + '</div>' +
          '</div>'
        );
      }).join("");
      return (
        '<div class="chart-card">' +
          '<div class="chart-head">' +
            '<span class="chart-icon">' + ICON_COMPLEXITY + '</span>' +
            '<span class="chart-title">turn complexity (words)</span>' +
            '<span class="chart-legend">' +
              '<span class="legend-pill"><span class="dot dot-input"></span>you</span>' +
              '<span class="legend-pill"><span class="dot dot-output"></span>agent</span>' +
            '</span>' +
          '</div>' +
          '<div class="chart-body">' +
            '<div class="cx-yaxis">' +
              '<span class="tick top">' + fmtCount(yMax) + '</span>' +
              '<span class="tick mid">' + fmtCount(Math.round(yMax / 2)) + '</span>' +
              '<span class="tick bot">0</span>' +
            '</div>' +
            '<div class="cx-plot">' +
              '<div class="cx-grid top"></div>' +
              '<div class="cx-grid mid"></div>' +
              '<div class="cx-grid bot"></div>' +
              '<div class="cx-bars">' + pairs + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="chart-foot">' + escapeHtml(lastAgeLabel) + '</div>' +
        '</div>'
      );
    }

    function renderCodeChartHtml(turns, count) {
      const last = count ? turns.slice(-count) : turns.slice();
      if (last.length === 0) return "";
      const data = last.map(t => ({ added: t.linesAdded || 0, removed: t.linesRemoved || 0, ts: t.endTs }));
      if (data.every(d => d.added === 0 && d.removed === 0)) return "";
      const peak = Math.max(20, ...data.map(d => Math.max(d.added, d.removed)));
      const yMax = niceMax(peak);
      const lastTs = data[data.length - 1].ts;
      const lastAgeMs = Date.now() - lastTs;
      const lastAgeLabel = lastAgeMs < 5000 ? "now" : fmtAge(lastAgeMs) + " ago";
      const pairs = data.map((d, i) => {
        const isLast = i === data.length - 1;
        const addedH = Math.max(0.5, (d.added / yMax) * 100);
        const removedH = Math.max(0.5, (d.removed / yMax) * 100);
        const tip = "+" + d.added + " / -" + d.removed + " lines";
        return (
          '<div class="cx-pair' + (isLast ? " latest" : "") + '" title="' + escapeHtml(tip) + '">' +
            '<div class="cx-bar bar-added" style="height: ' + addedH + '%">' + (addedH >= BAR_FROST_MIN_PCT ? BAR_FROST : '') + '</div>' +
            '<div class="cx-bar bar-removed" style="height: ' + removedH + '%">' + (removedH >= BAR_FROST_MIN_PCT ? BAR_FROST : '') + '</div>' +
          '</div>'
        );
      }).join("");
      return (
        '<div class="chart-card code">' +
          '<div class="chart-head">' +
            '<span class="chart-icon">' + ICON_CODE + '</span>' +
            '<span class="chart-title">code changes (lines)</span>' +
            '<span class="chart-legend">' +
              '<span class="legend-pill"><span class="dot dot-added"></span>added</span>' +
              '<span class="legend-pill"><span class="dot dot-removed"></span>removed</span>' +
            '</span>' +
          '</div>' +
          '<div class="chart-body">' +
            '<div class="cx-yaxis">' +
              '<span class="tick top">' + fmtCount(yMax) + '</span>' +
              '<span class="tick mid">' + fmtCount(Math.round(yMax / 2)) + '</span>' +
              '<span class="tick bot">0</span>' +
            '</div>' +
            '<div class="cx-plot">' +
              '<div class="cx-grid top"></div>' +
              '<div class="cx-grid mid"></div>' +
              '<div class="cx-grid bot"></div>' +
              '<div class="cx-bars">' + pairs + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="chart-foot">' + escapeHtml(lastAgeLabel) + '</div>' +
        '</div>'
      );
    }

    // collapse same-slug lineage: a `/clear` in claude code mints a new
    // sessionId + new jsonl in the same project dir, leaving the old jsonl
    // dormant. without coalescing, the user sees two cards for what's
    // logically one continuing project — and accumulated dead siblings
    // (bun --hot orphaning subprocesses, short-lived var-folders shells)
    // pile up indefinitely. rule: within a (source, slug) group, the
    // freshest is always shown; non-freshest siblings show only while they
    // *themselves* are still active (lastEventTs within LINEAGE_FRESH_MS of
    // now). this hides /clear predecessors after ~LINEAGE_FRESH_MS and the
    // dead-on-arrival subprocesses too. parallel terminals on the same
    // project keep emitting events and stay visible.
    // pattern adapted from abtop's `find_live_session_id`
    // (vendor/abtop/src/collector/claude.rs:1029-1041), without the PID-FD
    // resolution since bun has no native libproc binding.
    const LINEAGE_FRESH_MS = 60 * 1000;

    // sessions whose cwd lives under our own sandbox dirs — these are the
    // sdk subprocesses the server itself spawns (chat-agent under
    // ~/.cut-the-cake/chat/<hash>/, observer under ~/.chunk-to-chat/observer/
    // on the legacy path). they're real cc sessions from the tailer's POV,
    // but they aren't user-driven work — render them grouped under a divider
    // at the bottom of the inbox so the user-driven cards are never
    // interleaved with our own machinery.
    function isInternalSession(sess) {
      const slug = sess?.info?.slug || '';
      return slug.includes('cut-the-cake-chat') ||
             slug.includes('chunk-to-chat-observer') ||
             slug.includes('cut-the-cake-observer') ||
             slug.includes('cut-the-cake-scriptifier');
    }

    function sortedSessions() {
      const all = Array.from(sessionsByKey.values())
        .sort((a, b) => (b.lastEventTs || 0) - (a.lastEventTs || 0));

      const freshestByLineage = new Map();
      for (const s of all) {
        const key = (s.info?.source || "") + "␀" + (s.info?.slug || "");
        const ts = s.lastEventTs || 0;
        const cur = freshestByLineage.get(key) || 0;
        if (ts > cur) freshestByLineage.set(key, ts);
      }

      return all.filter(s => {
        const key = (s.info?.source || "") + "␀" + (s.info?.slug || "");
        const my = s.lastEventTs || 0;
        const fresh = freshestByLineage.get(key) || 0;
        // freshest in lineage → always show. non-freshest → only if *i*
        // had activity recently (parallel sessions / just-cleared edge cases).
        return my >= fresh || (Date.now() - my) < LINEAGE_FRESH_MS;
      });
    }

    function findSessionBySessionId(sessionId) {
      for (const s of sessionsByKey.values()) {
        if (s.info?.sessionId === sessionId) return s;
      }
      return null;
    }

    function buildCardInnerHtml(sess, opts) {
      const modelLabel = shortModel(sess.model);
      const latest = latestOpenInsight(sess.observerDecisions);
      const insightHtml = latest
        ? '<p class="card-insight">' + escapeHtml(latest.insight) + '</p>'
        : '';
      const state = sessionState(sess);
      const ts = sess?.lastEventTs || 0;
      const age = Date.now() - ts;
      const elapsedHtml = state === "live"
        ? '<span class="live-word">live</span>'
        : state === "idle"
          ? 'idle ' + fmtAge(age)
          : fmtAge(age) + ' ago';
      const tagsStr = latest && latest.tags && latest.tags.length
        ? latest.tags.join(" · ")
        : '';
      const sourceStr = opts.showSource ? (sess?.info?.source || 'claude-code') : '';
      const footParts = [sourceStr, tagsStr, elapsedHtml].filter(Boolean);
      const footHtml = footParts.join(' <span class="sep">·</span> ');

      const miniStats = miniStatsHtmlForSession(sess);

      let html =
        '<div class="card-head">' +
          '<h3>' + escapeHtml(sessionName(sess)) + '</h3>' +
          '<div class="card-meta">' +
            miniStats +
            (modelLabel ? '<span class="model-tag">' + escapeHtml(modelLabel) + '</span>' : '') +
          '</div>' +
        '</div>' +
        insightHtml +
        '<p class="card-foot">' + footHtml + '</p>';

      if (opts.selected) {
        const mascotSrc = state === "idle" ? MASCOT_IDLE : MASCOT_ACTIVE;
        html += '<img class="card-mascot" src="' + mascotSrc + '" alt="" draggable="false" />';
      }
      return html;
    }

    function applyCardClasses(card, sess, opts) {
      const state = sessionState(sess);
      card.classList.toggle("live", state === "live");
      card.classList.toggle("idle", state === "idle");
      card.classList.toggle("selected", !!opts.selected);
    }

    function cardSig(sess) {
      // signature of "did the meaningful content change?" — avoids flashing
      // on every minute-tick or selection change. covers new events, new
      // observer insights.
      const ins = latestOpenInsight(sess.observerDecisions);
      return [
        sess.lastEventTs || 0,
        ins?.insight || "",
      ].join("");
    }

    function buildCard(sess, opts) {
      opts = opts || {};
      const card = document.createElement("a");
      card.className = "card";
      card.href = "#session/" + encodeURIComponent(sess.info.sessionId);
      card.dataset.sessionId = sess.info.sessionId;
      card.dataset.sig = cardSig(sess);
      card.style.cssText = sessionColorVars(sess.info.sessionId);
      card.innerHTML = buildCardInnerHtml(sess, opts);
      applyCardClasses(card, sess, opts);
      return card;
    }

    function updateCard(card, sess, opts) {
      const newSig = cardSig(sess);
      const changed = card.dataset.sig !== newSig;
      card.dataset.sig = newSig;
      card.innerHTML = buildCardInnerHtml(sess, opts);
      applyCardClasses(card, sess, opts);
      if (changed && !reduceMotion()) {
        // re-trigger the keyframe by removing + reflowing + re-adding the class
        card.classList.remove("is-updated");
        void card.offsetWidth;
        card.classList.add("is-updated");
      }
    }

    function selectedSessionId() {
      return decodeURIComponent((location.hash.match(/^#session\/(.+)$/) || [])[1] || "");
    }

    // ambient quiet
    let ambientWoken = false;
    function shouldQuiet(list, sel) {
      if (sel) return false;
      if (list.length === 0) return false;
      if (ambientWoken) return false;
      const now = Date.now();
      return list.every(s => (now - (s.lastEventTs || 0)) >= AMBIENT_MS);
    }
    document.addEventListener("mousemove", () => {
      if (!ambientWoken) {
        ambientWoken = true;
        renderInbox();
        clearTimeout(window.__ambientReArm);
        window.__ambientReArm = setTimeout(() => {
          ambientWoken = false;
          renderInbox();
        }, 30 * 1000);
      } else {
        clearTimeout(window.__ambientReArm);
        window.__ambientReArm = setTimeout(() => {
          ambientWoken = false;
          renderInbox();
        }, 30 * 1000);
      }
    }, { passive: true });

    // persistent map of sessionId → card element. lets renderInbox diff against
    // the live dom so existing cards stay put across 5s ticks (no re-mount, no
    // animation flicker). only newly-added or removed cards animate.
    const cardEls = new Map();
    const reduceMotion = () => window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function clearAllCards() {
      cardEls.clear();
      cardsEl.innerHTML = "";
    }

    function renderInbox() {
      const list = sortedSessions();
      const sel = selectedSessionId();

      if (list.length === 0) {
        clearAllCards();
        cardsEl.appendChild(inboxEmpty);
        inboxEmpty.hidden = false;
        ambientQuiet.hidden = true;
        return;
      }
      if (inboxEmpty.parentNode === cardsEl) inboxEmpty.remove();
      inboxEmpty.hidden = true;

      if (shouldQuiet(list, sel)) {
        clearAllCards();
        const newest = list[0];
        const age = Date.now() - (newest.lastEventTs || 0);
        const n = list.length;
        ambientQuiet.textContent =
          "quiet — " + n + " agent" + (n === 1 ? "" : "s") +
          " running, last activity " + fmtAge(age) + " ago";
        ambientQuiet.hidden = false;
        return;
      }
      ambientQuiet.hidden = true;

      const sources = new Set(list.map(s => s?.info?.source || 'claude-code'));
      const showSource = sources.size > 1;

      // remove cards that are no longer in the list — fade + slide out
      const desiredIds = new Set(list.map(s => s.info.sessionId));
      for (const [id, el] of [...cardEls]) {
        if (!desiredIds.has(id)) {
          cardEls.delete(id);
          if (typeof gsap !== "undefined" && !reduceMotion()) {
            el.style.pointerEvents = "none";
            gsap.to(el, {
              opacity: 0,
              x: -24,
              height: 0,
              paddingTop: 0,
              paddingBottom: 0,
              marginTop: 0,
              marginBottom: 0,
              duration: 1.2,
              ease: "power2.in",
