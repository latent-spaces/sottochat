<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>chunk-to-chat</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #fafafb;
      --surface: #ffffff;
      --fg: #1a1a1f;
      --fg-soft: #6e6e7a;
      --fg-muted: #9090a0;
      --border: #e7e7ec;
      --border-strong: #d4d4dd;
      --accent: #6366f1;
      --accent-hover: #4f52e0;
      --accent-soft: #eef0fe;
      --coral: #ef5e5e;
      --coral-soft: #fdecec;
      --diff-green: #10b981;
      --diff-red: #ef4444;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      --radius: 12px;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .app-header {
      max-width: 880px;
      margin: 0 auto;
      padding: 56px 24px 16px;
    }
    .app-header h1 {
      font-size: 26px;
      font-weight: 600;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }
    .app-header .tag {
      font-size: 13px;
      color: var(--fg-soft);
      margin: 0;
    }

    main.layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 24px 96px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    .sidebar {
      flex: 0 0 320px;
      position: sticky;
      top: 16px;
    }
    .detail-pane {
      flex: 1;
      min-width: 0;
    }
    .detail-empty {
      padding: 80px 24px;
      text-align: center;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 14px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
    }
    @media (max-width: 880px) {
      main.layout { flex-direction: column; }
      .sidebar { flex: 1 1 auto; position: static; width: 100%; }
    }
    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 12px;
    }

    /* inbox */
    .cards { display: grid; gap: 8px; }
    .empty-inbox {
      text-align: center;
      padding: 32px 16px;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 13px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
    }

    .card {
      display: block;
      text-decoration: none;
      color: var(--fg);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      transition: border-color 400ms var(--ease-out),
                  background 200ms var(--ease-out),
                  opacity 400ms var(--ease-out);
    }
    .card:hover { border-color: var(--accent); opacity: 1; }
    .card.live { border-color: var(--accent); }
    .card.idle { opacity: 0.55; }
    .card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      opacity: 1;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
      gap: 8px;
    }
    .card-head h3 {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .model-tag {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg-soft);
      background: #f3f3f7;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    /* observer insight: detail-pane callout. cards inline the prose directly. */
    .observer-insight {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      background: var(--accent-soft);
      border-radius: 6px;
      font-size: 13px;
      color: var(--fg);
      line-height: 1.5;
    }
    .observer-insight .obs-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
      padding-top: 3px;
    }
    .observer-insight .obs-tags {
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
    }
    /* card-inline insight: no callout chrome, just promoted prose */
    .card-insight {
      font-size: 13px;
      color: var(--fg);
      line-height: 1.45;
      margin: 4px 0 6px;
    }
    .card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .card-foot {
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      margin: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .card-foot .live-word { color: var(--accent); }
    .card-foot .sep { opacity: 0.55; }

    /* turn complexity chart — paired bars with horizontal grid */
    .cx { margin: 0; }
    .cx-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .cx-legend {
      display: flex;
      gap: 14px;
      text-transform: none;
      letter-spacing: 0;
      font-size: 11px;
      color: var(--fg-soft);
    }
    .cx-legend .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: middle;
    }
    .cx-legend .dot-input { background: var(--fg-muted); opacity: 0.55; }
    .cx-legend .dot-output { background: var(--accent); }
    .cx-chart {
      display: flex;
      height: 96px;
      gap: 6px;
    }
    .cx-yaxis {
      flex: 0 0 30px;
      position: relative;
    }
    .cx-yaxis .tick {
      position: absolute;
      right: 4px;
      transform: translateY(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--fg-muted);
      line-height: 1;
    }
    .cx-yaxis .tick.top { top: 0; }
    .cx-yaxis .tick.mid { top: 50%; }
    .cx-yaxis .tick.bot { top: 100%; }
    .cx-plot {
      flex: 0 0 auto;
      position: relative;
      border-left: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .cx-grid {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px dashed var(--border);
      pointer-events: none;
    }
    .cx-grid.top { top: 0; }
    .cx-grid.mid { top: 50%; }
    .cx-bars {
      padding: 0 10px;
      display: flex;
      align-items: flex-end;
      gap: 14px;
      height: 100%;
    }
    .cx-scroll {
      max-width: 100%;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .cx-pair {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 100%;
    }
    .cx-bar {
      width: 14px;
      min-height: 1px;
      border-radius: 2px 2px 0 0;
    }
    .bar-input { background: var(--fg-muted); opacity: 0.55; }
    .bar-output { background: var(--accent); opacity: 0.9; }
    .cx-pair.latest .bar-output { background: var(--coral); opacity: 1; }
    .bar-added { background: var(--diff-green); opacity: 0.9; }
    .bar-removed { background: var(--diff-red); opacity: 0.9; }
    .cx-legend .dot-added { background: var(--diff-green); }
    .cx-legend .dot-removed { background: var(--diff-red); }
    .cx-xaxis {
      display: flex;
      justify-content: space-between;
      padding: 6px 8px 0 36px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--fg-muted);
    }
    /* detail page */
    .back {
      display: inline-block;
      font-size: 13px;
      color: var(--fg-soft);
      text-decoration: none;
      margin-bottom: 24px;
      font-family: var(--mono);
    }
    .back:hover { color: var(--accent); }

    .session-head {
      margin-bottom: 32px;
    }
    .session-head h2 {
      font-size: 26px;
      font-weight: 600;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }
    .session-head .source {
      font-size: 13px;
      color: var(--fg-soft);
      margin: 0;
      font-family: var(--mono);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: 20px;
    }
    .panel .label {
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 10px;
    }
    .prose {
      font-size: 15px;
      color: var(--fg);
      margin: 0;
    }
    .prose.muted {
      color: var(--fg-soft);
      font-style: italic;
    }

    /* untouched-for line — sits above chat slots */
    .untouched-line {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
      margin: 0 0 8px;
      padding-left: 2px;
    }

    /* rolling session summary from the observer (sits above chat slots).
       fades to ink-soft + (stale) tag when the underlying session has gone
       quiet for >5 minutes since the summary's timestamp. */
    .session-summary {
      font-size: 15px;
      line-height: 1.5;
      color: var(--fg);
      margin: 0 0 16px;
      padding-left: 2px;
    }
    .session-summary.stale {
      color: var(--fg-soft);
      font-style: italic;
    }
    .session-summary .stale-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 6px;
    }

    /* instrument band — paired charts in one frame */
    .charts-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 32px;
    }
    .charts-band > * { min-width: 0; }      /* allow tracks to shrink past content */
    .charts-band > div:empty { display: none; }
    .charts-band:has(> div:only-child),
    .charts-band:has(> div:empty) { grid-template-columns: 1fr; }
    @media (max-width: 880px) { .charts-band { grid-template-columns: 1fr; } }

    /* conversation tail — chat-style view of the last N turns */
    .conversation {
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-height: 480px;
      overflow-y: auto;
      padding: 4px 2px 16px;
      margin: 8px 0 16px;
      border-bottom: 1px solid var(--border);
    }
    .conv-turn { display: flex; flex-direction: column; gap: 4px; }
    .conv-role {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .conv-text {
      font-size: 14px;
      line-height: 1.55;
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .conv-empty {
      text-align: center;
      color: var(--fg-soft);
      font-style: italic;
      font-size: 13px;
      padding: 24px 0;
    }

    /* ambient quiet — collapses sidebar when all sessions idle */
    .ambient-quiet {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fg-muted);
      padding: 8px 2px;
      margin: 0;
    }

    /* reconnecting indicator */
    .reconnect-indicator {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-muted);
      margin-left: 12px;
      vertical-align: middle;
    }

    /* chat input — single row below the conversation tail */
    .chat-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .chat-input .chat-context {
      font-size: 12px;
      color: var(--fg-soft);
      margin: 0 0 8px;
      line-height: 1.5;
    }
    .chat-input .chat-context.muted { font-style: italic; color: var(--fg-muted); }
    .chat-input .chat-context .chat-tags {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      margin-left: 6px;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .chat-input-row textarea {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      padding: 8px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      resize: vertical;
      min-height: 40px;
      background: var(--bg);
      color: var(--fg);
    }
    .chat-input-row textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
    }
    .chat-input-row .send-btn {
      flex: 0 0 auto;
      width: 40px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .chat-input-row .send-btn:hover { background: var(--accent-hover); }
    .chat-input-row .send-btn:disabled {
      background: var(--border-strong);
      color: var(--fg-soft);
      cursor: not-allowed;
    }
    .chat-sent {
      margin-top: 8px;
      font-size: 12px;
      color: var(--fg-soft);
      font-style: italic;
    }

    code, .mono { font-family: var(--mono); font-size: 13px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0ms !important;
        animation-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>chunk-to-chat<span class="reconnect-indicator" id="reconnect-indicator" hidden>reconnecting…</span></h1>
    <p class="tag">turn long agent runs into a quick iterative chat</p>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <h2 class="section-label">sessions</h2>
      <p class="ambient-quiet" id="ambient-quiet" hidden>quiet</p>
      <div class="cards" id="cards">
        <div class="empty-inbox" id="inbox-empty">no active session detected — start claude code in a project</div>
      </div>
    </aside>

    <section class="detail-pane" id="detail-pane">
      <div class="detail-empty" id="detail-empty">select a session</div>
      <article class="detail-content" id="detail-content" hidden>
        <div class="session-head">
          <h2 id="d-name">—</h2>
          <p class="source"><span id="d-source">claude-code</span> · <span id="d-elapsed">—</span></p>
        </div>

        <p class="session-summary" id="d-summary" hidden></p>
        <p class="untouched-line" id="d-untouched" hidden>untouched for <span id="d-untouched-mins">—</span></p>

        <div class="conversation" id="d-conversation"></div>
        <div class="chat-input" id="d-chat-input"></div>

        <div class="charts-band">
          <div id="d-chart"></div>
          <div id="d-code-chart"></div>
        </div>
      </article>
    </section>
  </main>

  <script>
    // dom
    const cardsEl = document.getElementById("cards");
    const inboxEmpty = document.getElementById("inbox-empty");
    const ambientQuiet = document.getElementById("ambient-quiet");
    const reconnectIndicator = document.getElementById("reconnect-indicator");
    const detailEmpty = document.getElementById("detail-empty");
    const detailContent = document.getElementById("detail-content");
    const dName = document.getElementById("d-name");
    const dElapsed = document.getElementById("d-elapsed");
    const dSummary = document.getElementById("d-summary");
    const dUntouched = document.getElementById("d-untouched");
    const dUntouchedMins = document.getElementById("d-untouched-mins");
    const dChart = document.getElementById("d-chart");
    const dCodeChart = document.getElementById("d-code-chart");
    const dConversation = document.getElementById("d-conversation");
    const dChatInput = document.getElementById("d-chat-input");

    // state thresholds
    const LIVE_MS = 30 * 1000;          // <30s = live
    const IDLE_MS = 5 * 60 * 1000;      // >5m = idle
    const AMBIENT_MS = 5 * 60 * 1000;   // all sessions idle this long → quiet collapse

    // state — one entry per discovered session, keyed by server-side key
    // ("<source>:<path>"). Each carries its own events/threads/lastEventTs.
    const sessionsByKey = new Map();

    // utils
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }
    function clip(s, n) {
      s = String(s || "");
      return s.length > n ? s.slice(0, n) + "…" : s;
    }
    function projectName(info) {
      // -Users-oronans-workspace-reelmaker → reelmaker
      // -Users-oronans-workspace → workspace
      if (!info || !info.slug) return "";
      const parts = info.slug.replace(/^-+/, "").split("-");
      return parts[parts.length - 1] || info.slug;
    }
    function sessionName(infoOrSess) {
      // accepts either a SessionState (with .sessionName) or just info (slug only).
      // when the observer has named the session, prefix it with the project folder
      // in brackets so [reelmaker] auth migration tells you both what + where.
      // bare info or no observer name → just the project folder name.
      if (!infoOrSess) return "—";
      const sess = infoOrSess.info ? infoOrSess : null;
      const info = sess ? sess.info : infoOrSess;
      const project = projectName(info);
      const obs = sess && sess.sessionName ? sess.sessionName : null;
      if (!obs) return project || "—";
      if (obs === project) return project;
      return "[" + project + "] " + obs;
    }
    function fmtElapsed(sess) {
      const ts = sess?.lastEventTs;
      if (!ts) return "—";
      const ms = Date.now() - ts;
      if (ms < 5000) return "now";
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h) return h + "h " + m + "m ago";
      if (m) return m + "m ago";
      return s + "s ago";
    }
    function keyForSnapshot(sess) {
      return sess.key || (sess.info ? (sess.info.source + ":" + sess.info.path) : "");
    }
    function latestOpenInsight(decisions) {
      if (!Array.isArray(decisions)) return null;
      for (let i = decisions.length - 1; i >= 0; i--) {
        if (decisions[i].open && decisions[i].insight) return decisions[i];
      }
      return null;
    }

    // detail-pane callout (full tinted box, with label + tags)
    function renderObserverHtml(decisions) {
      const latest = latestOpenInsight(decisions);
      if (!latest) return "";
      const tagsHtml = latest.tags && latest.tags.length
        ? '<div class="obs-tags">' + escapeHtml(latest.tags.join(" · ")) + '</div>'
        : "";
      return (
        '<div class="observer-insight">' +
          '<div class="obs-label">open</div>' +
          '<div>' +
            escapeHtml(latest.insight) +
            tagsHtml +
          '</div>' +
        '</div>'
      );
    }

    function sessionState(sess) {
      const ts = sess?.lastEventTs || 0;
      const age = Date.now() - ts;
      if (age < LIVE_MS) return "live";
      if (age < IDLE_MS) return "recent";
      return "idle";
    }

    function fmtAge(ms) {
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h) return h + "h " + m + "m";
      if (m) return m + "m";
      return s + "s";
    }
    function shortModel(m) {
      if (!m) return "";
      // claude-opus-4-7 → opus 4.7 ; claude-sonnet-4-6-20250929 → sonnet 4.6
      const stripped = String(m).replace(/^claude-/, "").replace(/-\d{8}$/, "");
      return stripped.replace(/-(\d+)-(\d+)$/, " $1.$2");
    }

    // derive turns from raw events (mirrors src/turns.ts)
    function deriveTurns(evs) {
      const turns = [];
      let cur = null;
      const close = () => { if (cur) { turns.push(cur); cur = null; } };
      for (const ev of evs) {
        if (ev.kind === "user_message") {
          close();
          cur = {
            id: ev.uuid,
            startTs: ev.ts,
            endTs: ev.ts,
            userText: ev.text || "",
            userChars: (ev.text || "").length,
            agentText: "",
            agentChars: 0,
            agentTokens: 0,
            toolUses: 0,
            linesAdded: 0,
            linesRemoved: 0,
          };
        } else if (cur) {
          cur.endTs = ev.ts;
          if (ev.kind === "assistant_text") {
            cur.agentText += (cur.agentText ? "\n\n" : "") + (ev.text || "");
            cur.agentChars += (ev.text || "").length;
            if (typeof ev.tokens === "number") cur.agentTokens += ev.tokens;
          } else if (ev.kind === "tool_use") {
            cur.toolUses += 1;
            if (typeof ev.linesAdded === "number") cur.linesAdded += ev.linesAdded;
            if (typeof ev.linesRemoved === "number") cur.linesRemoved += ev.linesRemoved;
          } else if (ev.kind === "stop") {
            close();
          }
        }
      }
      if (cur) turns.push(cur);
      return turns;
    }

    function wordCount(s) {
      return (s || "").trim().split(/\s+/).filter(Boolean).length;
    }
    function fmtCount(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "k";
      return String(n);
    }

    function niceMax(v) {
      if (v <= 0) return 100;
      if (v <= 50) return 50;
      if (v <= 100) return 100;
      if (v <= 200) return 200;
      if (v <= 500) return 500;
      if (v <= 1000) return 1000;
      if (v <= 2000) return 2000;
      return Math.ceil(v / 500) * 500;
    }

    function complexityChart(turns, count) {
      const last = count ? turns.slice(-count) : turns.slice();
      if (last.length === 0) return null;
      const data = last.map(t => {
        const inputW = wordCount(t.userText);
        const outputW = wordCount(t.agentText);
        return {
          input: inputW,
          output: outputW + t.toolUses * 30,
          outputWords: outputW,
          tools: t.toolUses,
        };
      });
      const peak = Math.max(20, ...data.map(d => Math.max(d.input, d.output)));
      return { data, yMax: niceMax(peak) };
    }

    function renderChartHtml(turns, count) {
      const cx = complexityChart(turns, count);
      if (!cx) return "";
      const yMax = cx.yMax;
      const pairs = cx.data.map((d, i) => {
        const last = i === cx.data.length - 1;
        const inputH = Math.max(0.5, (d.input / yMax) * 100);
        const outputH = Math.max(0.5, (d.output / yMax) * 100);
        const tip =
          "output: " + d.outputWords + "w" +
          (d.tools ? " · " + d.tools + "t" : "") +
          " · input: " + d.input + "w";
        return (
          '<div class="cx-pair' + (last ? " latest" : "") + '" title="' + escapeHtml(tip) + '">' +
            '<div class="cx-bar bar-input" style="height: ' + inputH + '%"></div>' +
            '<div class="cx-bar bar-output" style="height: ' + outputH + '%"></div>' +
          '</div>'
        );
      }).join("");
      return (
        '<div class="cx">' +
          '<div class="cx-head">' +
            '<span>turn complexity (words)</span>' +
            '<span class="cx-legend">' +
              '<span><span class="dot dot-input"></span>input</span>' +
              '<span><span class="dot dot-output"></span>output</span>' +
            '</span>' +
          '</div>' +
          '<div class="cx-scroll">' +
            '<div class="cx-chart">' +
              '<div class="cx-yaxis">' +
                '<span class="tick top">' + fmtCount(yMax) + '</span>' +
                '<span class="tick mid">' + fmtCount(Math.round(yMax / 2)) + '</span>' +
                '<span class="tick bot">0</span>' +
              '</div>' +
              '<div class="cx-plot">' +
                '<div class="cx-grid top"></div>' +
                '<div class="cx-grid mid"></div>' +
                '<div class="cx-bars">' + pairs + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    }

    function renderCodeChartHtml(turns, count) {
      const last = count ? turns.slice(-count) : turns.slice();
      if (last.length === 0) return "";
      const data = last.map(t => ({ added: t.linesAdded || 0, removed: t.linesRemoved || 0 }));
      if (data.every(d => d.added === 0 && d.removed === 0)) return "";
      const peak = Math.max(20, ...data.map(d => Math.max(d.added, d.removed)));
      const yMax = niceMax(peak);
      const pairs = data.map((d, i) => {
        const last = i === data.length - 1;
        const addedH = Math.max(0.5, (d.added / yMax) * 100);
        const removedH = Math.max(0.5, (d.removed / yMax) * 100);
        const tip = "+" + d.added + " / -" + d.removed + " lines";
        return (
          '<div class="cx-pair' + (last ? " latest" : "") + '" title="' + escapeHtml(tip) + '">' +
            '<div class="cx-bar bar-added" style="height: ' + addedH + '%"></div>' +
            '<div class="cx-bar bar-removed" style="height: ' + removedH + '%"></div>' +
          '</div>'
        );
      }).join("");
      return (
        '<div class="cx">' +
          '<div class="cx-head">' +
            '<span>code changes (lines)</span>' +
            '<span class="cx-legend">' +
              '<span><span class="dot dot-added"></span>added</span>' +
              '<span><span class="dot dot-removed"></span>removed</span>' +
            '</span>' +
          '</div>' +
          '<div class="cx-scroll">' +
            '<div class="cx-chart">' +
              '<div class="cx-yaxis">' +
                '<span class="tick top">' + fmtCount(yMax) + '</span>' +
                '<span class="tick mid">' + fmtCount(Math.round(yMax / 2)) + '</span>' +
                '<span class="tick bot">0</span>' +
              '</div>' +
              '<div class="cx-plot">' +
                '<div class="cx-grid top"></div>' +
                '<div class="cx-grid mid"></div>' +
                '<div class="cx-bars">' + pairs + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    }

    function sortedSessions() {
      return Array.from(sessionsByKey.values())
        .filter(s => (s.threads && s.threads.length > 0))
        .sort((a, b) => (b.lastEventTs || 0) - (a.lastEventTs || 0));
    }

    function findSessionBySessionId(sessionId) {
      for (const s of sessionsByKey.values()) {
        if (s.info?.sessionId === sessionId) return s;
      }
      return null;
    }

    function buildCard(sess, opts) {
      opts = opts || {};
      const card = document.createElement("a");
      card.className = "card";
      const sessionId = sess.info.sessionId;
      card.href = "#session/" + encodeURIComponent(sessionId);
      card.dataset.sessionId = sessionId;
      const modelLabel = shortModel(sess.model);

      // promote latest open insight to card body (no tinted callout, no label).
      // placement is the role: if a sentence sits here, observer flagged it.
      const latest = latestOpenInsight(sess.observerDecisions);
      const insightHtml = latest
        ? '<p class="card-insight">' + escapeHtml(latest.insight) + '</p>'
        : '';

      // single mono foot line: source (only when multi-source) · tags · live/elapsed.
      const state = sessionState(sess);
      const ts = sess?.lastEventTs || 0;
      const age = Date.now() - ts;
      const elapsedHtml = state === "live"
        ? '<span class="live-word">live</span>'
        : state === "idle"
          ? 'idle ' + fmtAge(age)
          : fmtAge(age) + ' ago';
      const tagsStr = latest && latest.tags && latest.tags.length
        ? latest.tags.join(" · ")
        : '';
      const sourceStr = opts.showSource ? (sess?.info?.source || 'claude-code') : '';
      const footParts = [sourceStr, tagsStr, elapsedHtml].filter(Boolean);
      const footHtml = footParts.join(' <span class="sep">·</span> ');

      card.innerHTML =
        '<div class="card-head">' +
          '<h3>' + escapeHtml(sessionName(sess)) + '</h3>' +
          '<div class="card-meta">' +
            (modelLabel ? '<span class="model-tag">' + escapeHtml(modelLabel) + '</span>' : '') +
          '</div>' +
        '</div>' +
        insightHtml +
        '<p class="card-foot">' + footHtml + '</p>';

      if (state === "live") card.classList.add("live");
      if (state === "idle") card.classList.add("idle");
      return card;
    }

    function selectedSessionId() {
      return decodeURIComponent((location.hash.match(/^#session\/(.+)$/) || [])[1] || "");
    }

    // ambient quiet: when every session is idle 5m+ AND nothing's selected,
    // collapse the sidebar to a single mono "quiet — N agents, last activity Xm ago" line.
    // mouse hover anywhere on the page wakes the inbox back up temporarily.
    let ambientWoken = false;
    function shouldQuiet(list, sel) {
      if (sel) return false;
      if (list.length === 0) return false;
      if (ambientWoken) return false;
      const now = Date.now();
      return list.every(s => (now - (s.lastEventTs || 0)) >= AMBIENT_MS);
    }
    document.addEventListener("mousemove", () => {
      if (!ambientWoken) {
        ambientWoken = true;
        renderInbox();
        // re-arm after 30s of stillness — cheap timer reset on each move.
        clearTimeout(window.__ambientReArm);
        window.__ambientReArm = setTimeout(() => {
          ambientWoken = false;
          renderInbox();
        }, 30 * 1000);
      } else {
        clearTimeout(window.__ambientReArm);
        window.__ambientReArm = setTimeout(() => {
          ambientWoken = false;
          renderInbox();
        }, 30 * 1000);
      }
    }, { passive: true });

    function renderInbox() {
      const list = sortedSessions();
      const sel = selectedSessionId();
      cardsEl.innerHTML = "";

      if (list.length === 0) {
        cardsEl.appendChild(inboxEmpty);
        inboxEmpty.hidden = false;
        ambientQuiet.hidden = true;
        return;
      }
      inboxEmpty.hidden = true;

      if (shouldQuiet(list, sel)) {
        const newest = list[0]; // sortedSessions returns most-recent first
        const age = Date.now() - (newest.lastEventTs || 0);
        const n = list.length;
        ambientQuiet.textContent =
          "quiet — " + n + " agent" + (n === 1 ? "" : "s") +
          " running, last activity " + fmtAge(age) + " ago";
        ambientQuiet.hidden = false;
        return;
      }
      ambientQuiet.hidden = true;

      // show source on cards only if multiple sources are present in the inbox
      const sources = new Set(list.map(s => s?.info?.source || 'claude-code'));
      const showSource = sources.size > 1;

      for (const sess of list) {
        const card = buildCard(sess, { showSource });
        if (sess.info.sessionId === sel) card.classList.add("selected");
        cardsEl.appendChild(card);
      }
    }

    // per-session "last viewed by user" timestamp. updated when the user navigates
    // into a session detail; persisted to localStorage so it survives reload.
    function lastViewedKey(sessionId) { return "viewed:" + sessionId; }
    function markViewed(sessionId) {
      try { localStorage.setItem(lastViewedKey(sessionId), String(Date.now())); } catch {}
    }
    function getLastViewed(sessionId) {
      try {
        const v = localStorage.getItem(lastViewedKey(sessionId));
        return v ? Number(v) : 0;
      } catch { return 0; }
    }

    function renderDetail() {
      const sessionId = selectedSessionId();
      if (!sessionId) {
        detailEmpty.hidden = false;
        detailContent.hidden = true;
        return;
      }
      const sess = findSessionBySessionId(sessionId);
      if (!sess) {
        detailEmpty.hidden = false;
        detailContent.hidden = true;
        return;
      }
      detailEmpty.hidden = true;
      detailContent.hidden = false;
      const events = sess.events || [];
      dName.textContent = sessionName(sess);
      const sourceEl = document.getElementById("d-source");
      if (sourceEl) sourceEl.textContent = sess?.info?.source || "claude-code";
      dElapsed.textContent = fmtElapsed(sess);
      const turns = deriveTurns(events);

      // rolling observer summary — fade to ink-soft + (stale) tag when the
      // *session* (not the summary) has been quiet for >5 minutes.
      const summary = sess.sessionSummary;
      if (summary && summary.text) {
        const sessionAge = Date.now() - (sess.lastEventTs || summary.ts || 0);
        const isStale = sessionAge >= 5 * 60 * 1000;
        dSummary.hidden = false;
        dSummary.classList.toggle("stale", isStale);
        dSummary.innerHTML = (isStale ? '<span class="stale-tag">(stale)</span>' : '')
          + escapeHtml(summary.text);
      } else {
        dSummary.hidden = true;
      }

      // suppress complexity chart on <2 turns (a single bar reads as broken).
      // code-changes chart already self-suppresses on zero changes.
      dChart.innerHTML = turns.length >= 2 ? renderChartHtml(turns, null) : "";
      dCodeChart.innerHTML = renderCodeChartHtml(turns, null);

      // untouched-for line: minutes since the user last opened this session.
      const lastViewed = getLastViewed(sessionId);
      const untouchedMs = lastViewed ? (Date.now() - lastViewed) : 0;
      if (lastViewed && untouchedMs >= 5 * 60 * 1000) {
        dUntouched.hidden = false;
        dUntouchedMins.textContent = fmtAge(untouchedMs);
      } else {
        dUntouched.hidden = true;
      }

      renderConversation(sess, turns);
      renderChatInput(sess);
    }

    // shown when the observer hasn't (yet) flagged any turn for the active
    // session — keeps a usable chat surface available from the first click.
    const DEFAULT_PREFILL = "Walk me through what you've done, one piece at a time. Pause for my take after each.";

    // tail length for the conversation view — last N turns, user+agent interleaved.
    const TAIL_TURNS = 5;

    // per-session draft + sent state. keeps user typing across 5s render ticks
    // and ws updates. keyed by sessionKey (one input per session now).
    const chatDrafts = new Map();
    const chatSent = new Set();

    // remember last (sessionId, turnCount) so we only auto-scroll the
    // conversation when the session changes or a new turn arrives — not on
    // every 5s refresh tick (would yank the user mid-read).
    let convoLastSession = null;
    let convoLastTurnCount = 0;

    function renderConversation(sess, turns) {
      const sessionId = sess.info?.sessionId || "";
      const tail = turns.slice(-TAIL_TURNS);
      if (tail.length === 0) {
        dConversation.innerHTML = '<p class="conv-empty">no turns yet</p>';
        convoLastSession = sessionId;
        convoLastTurnCount = 0;
        return;
      }
      const html = tail.map(t => {
        const userBlock = t.userText
          ? '<div class="conv-turn">' +
              '<div class="conv-role">you</div>' +
              '<div class="conv-text">' + escapeHtml(t.userText) + '</div>' +
            '</div>'
          : "";
        const agentBlock = t.agentText
          ? '<div class="conv-turn">' +
              '<div class="conv-role">agent</div>' +
              '<div class="conv-text">' + escapeHtml(t.agentText) + '</div>' +
            '</div>'
          : "";
        return userBlock + agentBlock;
      }).join("");
      dConversation.innerHTML = html;
      const sessionChanged = convoLastSession !== sessionId;
      const newTurns = turns.length > convoLastTurnCount;
      if (sessionChanged || newTurns) {
        dConversation.scrollTop = dConversation.scrollHeight;
      }
      convoLastSession = sessionId;
      convoLastTurnCount = turns.length;
    }

    function renderChatInput(sess) {
      const sessionKey = sess.key || (sess.info ? sess.info.source + ":" + sess.info.path : "");
      const latestOpen = (sess.observerDecisions || [])
        .filter(d => d.open && d.prefill)
        .sort((a, b) => (b.ts || 0) - (a.ts || 0))[0];

      const tagsHtml = latestOpen && latestOpen.tags && latestOpen.tags.length
        ? '<span class="chat-tags">' + escapeHtml(latestOpen.tags.join(" · ")) + '</span>'
        : "";
      const ctxHtml = latestOpen && latestOpen.insight
        ? '<p class="chat-context">' + escapeHtml(latestOpen.insight) + tagsHtml + '</p>'
        : '<p class="chat-context muted">no observer flag yet — pick this up and edit it.</p>';

      const prefill = (latestOpen && latestOpen.prefill) || DEFAULT_PREFILL;
      const initial = chatDrafts.has(sessionKey) ? chatDrafts.get(sessionKey) : prefill;
      const sent = chatSent.has(sessionKey);

      dChatInput.innerHTML =
        ctxHtml +
        '<div class="chat-input-row">' +
          '<textarea rows="2">' + escapeHtml(initial) + '</textarea>' +
          '<button class="send-btn" title="send">›</button>' +
        '</div>' +
        (sent ? '<div class="chat-sent">queued (agent not wired yet)</div>' : '');

      const ta = dChatInput.querySelector('textarea');
      const btn = dChatInput.querySelector('.send-btn');
      if (ta) {
        ta.addEventListener('input', e => {
          chatDrafts.set(sessionKey, e.target.value);
        });
      }
      if (btn) {
        btn.addEventListener('click', () => {
          const text = (ta && ta.value || "").trim();
          if (!text) return;
          chatSent.add(sessionKey);
          // M-stub: log; real spawn lands when we wire the new agent
          console.log("[chat] send", { sessionKey, text });
          renderChatInput(sess);
        });
      }
    }

    function refresh() {
      renderInbox();
      renderDetail();
    }
    window.addEventListener("hashchange", () => {
      const sid = selectedSessionId();
      if (sid) markViewed(sid);
      refresh();
    });
    // initial mark on load if a session is already selected via #hash
    (() => { const sid = selectedSessionId(); if (sid) markViewed(sid); })();

    setInterval(refresh, 5000);

    function upsertSession(snap) {
      if (!snap || !snap.info) return;
      const key = keyForSnapshot(snap);
      sessionsByKey.set(key, {
        key,
        info: snap.info,
        events: Array.isArray(snap.events) ? snap.events.slice() : [],
        threads: Array.isArray(snap.threads) ? snap.threads.slice() : [],
        lastEventTs: snap.lastEventTs || 0,
        model: snap.model,
        contextTokens: snap.contextTokens || 0,
        totalOutputTokens: snap.totalOutputTokens || 0,
        observerDecisions: Array.isArray(snap.observerDecisions) ? snap.observerDecisions.slice() : [],
        sessionSummary: snap.sessionSummary || null,
        sessionName: snap.sessionName || null,
      });
    }

    function appendEvent(sessionKey, ev) {
      const s = sessionsByKey.get(sessionKey);
      if (!s) return false;
      s.events.push(ev);
      if (s.events.length > 6000) s.events.splice(0, s.events.length - 6000);
      if (typeof ev.ts === "number" && ev.ts > (s.lastEventTs || 0)) s.lastEventTs = ev.ts;
      if (ev.kind === "assistant_text") {
        if (ev.model) s.model = ev.model;
        // overwrite, not sum — input_tokens reports current context size, not delta.
        if (typeof ev.inputTokens === "number") s.contextTokens = ev.inputTokens;
        if (typeof ev.tokens === "number") s.totalOutputTokens = (s.totalOutputTokens || 0) + ev.tokens;
      }
      return true;
    }

    function appendThread(sessionKey, thread) {
      const s = sessionsByKey.get(sessionKey);
      if (!s) return false;
      s.threads.push(thread);
      return true;
    }

    function connect() {
      const ws = new WebSocket("ws://" + location.host + "/ws");
      ws.addEventListener("open", () => {
        reconnectIndicator.hidden = true;
      });
      ws.addEventListener("message", e => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.kind === "hello") {
          sessionsByKey.clear();
          const list = Array.isArray(msg.sessions) ? msg.sessions : [];
          for (const snap of list) upsertSession(snap);
          refresh();
        } else if (msg.kind === "session:upsert") {
          upsertSession(msg.session);
          refresh();
        } else if (msg.kind === "event") {
          if (appendEvent(msg.sessionKey, msg.event)) refresh();
        } else if (msg.kind === "thread:new") {
          if (appendThread(msg.sessionKey, msg.thread)) refresh();
        } else if (msg.kind === "observer:decision") {
          const s = sessionsByKey.get(msg.sessionKey);
          if (s) {
            if (!Array.isArray(s.observerDecisions)) s.observerDecisions = [];
            const idx = s.observerDecisions.findIndex(d => d.turnId === msg.decision.turnId);
            if (idx >= 0) s.observerDecisions[idx] = msg.decision;
            else s.observerDecisions.push(msg.decision);
            refresh();
          }
        } else if (msg.kind === "observer:summary") {
          const s = sessionsByKey.get(msg.sessionKey);
          if (s) {
            s.sessionSummary = msg.summary;
            if (msg.name) s.sessionName = msg.name;
            refresh();
          }
        }
      });
      ws.addEventListener("close", () => {
        reconnectIndicator.hidden = false;
        setTimeout(connect, 1000);
      });
      ws.addEventListener("error", () => {
        reconnectIndicator.hidden = false;
      });
    }

    connect();
    refresh();
  </script>
</body>
</html>
